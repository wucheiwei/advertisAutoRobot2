</head>

  ]},
  {t:'👥 你在團隊裡通常是什麼角色？',o:[
    {i:'🥺',t:'需要大家一起加油才能撐下去的那個',c:'chiikawa'},
    {i:'📢',t:'幫大家溝通調解、讓氣氛活絡的那個',c:'hachiware'},
    {i:'🛡️',t:'默默守護大家、關鍵時刻頂上去的那個',c:'rakko'},
    {i:'🪑',t:'沉穩的資深老手，不慌不忙穩住全場',c:'kurimanjuu'},
  ]},
  {t:'💬 哪一句話最像你的心聲？',o:[
    {i:'💭',t:'「好害怕⋯⋯但如果是為了朋友，我可以的！」',c:'chiikawa'},
    {i:'🔥',t:'「行動了！至於結果？走著瞧！Ura！」',c:'usagi'},
    {i:'⭐',t:'「只要全力以赴，師父一定會看見的！」',c:'shisa'},
    {i:'🍰',t:'「外表再強，私底下偷吃蛋糕很正常嘛」',c:'rakko'},
  ]},
];

let scores={},cur=0,winner='';

function show(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function orbHTML(c, emSize){
  // 優先顯示圖片，失敗退回 emoji
  const fb=`<span style="font-size:${emSize}">${c.emoji}</span>`;
  if(!c.img) return fb;
  return `<img src="${c.img}" alt="${c.zh}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${c.emoji}',style:'font-size:${emSize}'}))">`;
}

function setOrb(elId, c, size){
  const el=document.getElementById(elId);
  el.style.background=c.bg;
  el.style.fontSize='';
  el.innerHTML=orbHTML(c, size==='lg'?'86px':'42px');
}

function startQuiz(){
  scores={};Object.keys(CHARS).forEach(k=>scores[k]=0);
  cur=0;show('s1');renderQ();
}

function renderQ(){
  const q=QS[cur];
  document.getElementById('qlabel').textContent='第 '+(cur+1)+' 題';
  document.getElementById('qof').textContent='共 '+QS.length+' 題';
  document.getElementById('pf').style.width=((cur+1)/QS.length*100)+'%';
  document.getElementById('qtxt').textContent=q.t;
  const el=document.getElementById('qopts');
  el.innerHTML='';
  q.o.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-ic">${opt.i}</span><span>${opt.t}</span>`;
    btn.onclick=()=>pick(opt.c,btn);
    el.appendChild(btn);
  });
}

function pick(key,btn){
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true});
  btn.classList.add('sel');
  scores[key]++;
  setTimeout(()=>{cur++;if(cur>=QS.length)showResult();else renderQ();},360);
}

function showResult(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  winner=sorted[0][0];
  const ch=CHARS[winner],cp=CHARS[ch.compat];

  setOrb('rOrb',ch,'lg');
  document.getElementById('rName').textContent=ch.zh;
  document.getElementById('rJp').textContent=ch.jp;
  document.getElementById('rTags').innerHTML=ch.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('rDesc').textContent=ch.desc;

  setOrb('cOrb',cp,'sm');
  document.getElementById('cName').textContent=cp.zh;
  document.getElementById('cJp').textContent=cp.jp;
  document.getElementById('cWhy').textContent=ch.compatWhy;

  const max=Math.max(...Object.values(scores));
  document.getElementById('scoreBars').innerHTML=sorted.map(([k,v])=>{
    const c=CHARS[k];
    const pct=max>0?Math.round(v/max*100):0;
    return `<div class="sr"><span class="sr-name"><span class="sr-em">${c.emoji}</span>${c.zh}</span>`+
      `<div class="sr-bar"><div class="sr-fill" style="width:${pct}%"></div></div>`+
      `<span class="sr-n">${v}</span></div>`;
  }).join('');

  show('s2');
}

function buildIntro(){
  const BG={chiikawa:'#FFE8EC,#FFCCD8',hachiware:'#DFF0FF,#C2DFFF',usagi:'#FFFAE0,#FFE870'};
  document.getElementById('introBanner').innerHTML=
    ['hachiware','chiikawa','usagi'].map((k,i)=>{
      const c=CHARS[k];
      const lift=i===1?'transform:translateY(-14px)':'';
      const inner=c.img
        ?`<img src="${c.img}" alt="${c.zh}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${c.emoji}',style:'font-size:52px'}))">`
        :`<span style="font-size:52px">${c.emoji}</span>`;
      return `<div class="i-chara" style="${lift}">
        <div class="orb orb-lg" style="background:linear-gradient(135deg,${BG[k]})">${inner}</div>
        <div class="i-name">${c.zh}</div>
      </div>`;
    }).join('');
}

function shareResult(){
  const ch=CHARS[winner];
  const txt=`我在吉伊卡哇性格測驗中測出是「${ch.zh}」（${ch.jp}）！你又是哪一隻？`;
  if(navigator.share){
    navigator.share({title:'你是哪隻吉伊卡哇？',text:txt,url:location.href});
  } else {
    navigator.clipboard.writeText(txt+'\n'+location.href)
      .then(()=>alert('已複製！去分享給朋友吧 '+ch.emoji))
      .catch(()=>alert(txt));
  }
}

buildIntro();
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
</body>
