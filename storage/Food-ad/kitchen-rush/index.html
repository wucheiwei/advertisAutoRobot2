<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>翻鍋食堂｜廚房大亂鬥 🍳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--red:#E23B44;--warm:#FF7A2F;--gold:#FFC233;--green:#2FB28C;--cream:#FFF6E6;--ink:#3A2A1C;--brown:#7A4A22;
    --disp:"Fredoka","Noto Sans TC",system-ui,sans-serif;--body:"Noto Sans TC","PingFang TC",system-ui,sans-serif;}
  html,body{height:100%}
  body{font-family:var(--body);color:var(--ink);background:#221a14;background-image:radial-gradient(120% 80% at 50% -10%,#46352a,#201812 70%);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:none}
  img{-webkit-user-drag:none}
  .wrap{flex:1;display:flex;flex-direction:column;max-width:440px;width:100%;margin:0 auto;padding:8px 10px 12px;gap:7px;position:relative;z-index:2}

  .hud{background:linear-gradient(135deg,#E23B44,#FF7A2F);color:#fff;border-radius:16px;padding:8px 13px;box-shadow:0 6px 16px rgba(180,40,40,.32);position:relative;overflow:hidden}
  .hud::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.07) 0 16px,transparent 16px 32px)}
  .hrow{display:flex;justify-content:space-between;align-items:center;position:relative;gap:8px}
  .brand{font-family:var(--disp);font-size:1.02rem;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
  .brand .lg{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.6)}
  .hearts{display:flex;gap:2px}
  .hearts svg{width:18px;height:18px}
  .hearts .gone{opacity:.3}
  .score{font-family:var(--disp);font-size:1.35rem;font-weight:700;line-height:1}
  .plates{font-size:.62rem;font-weight:700;text-align:right;opacity:.95;line-height:1.3}
  .plates b{font-family:var(--disp)}

  .orders{display:flex;gap:7px;overflow-x:auto;min-height:74px;padding:1px;scrollbar-width:none}
  .orders::-webkit-scrollbar{display:none}
  .orders:empty::before{content:"準備接單…";color:#cdaf86;font-size:.78rem;margin:auto;font-weight:700}
  .ord{flex:0 0 auto;width:118px;background:linear-gradient(180deg,#fffdf6,#f3e9d4);border-radius:9px;padding:5px 7px 6px;box-shadow:0 3px 8px rgba(0,0,0,.26);animation:pp .25s ease}
  @keyframes pp{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .ord.warn{box-shadow:0 0 0 2px var(--gold),0 3px 8px rgba(0,0,0,.26)}
  .ord.crit{box-shadow:0 0 0 2px var(--red),0 3px 8px rgba(0,0,0,.26);animation:wob .4s ease infinite}
  @keyframes wob{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
  .onm{font-family:var(--disp);font-size:.72rem;font-weight:700;margin-bottom:3px;white-space:nowrap}
  .steps{display:flex;align-items:center;gap:2px;margin-bottom:5px}
  .steps img{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
  .chip{font-size:.6rem;font-weight:800;color:#fff;background:#FF7A2F;border-radius:5px;padding:1px 4px;line-height:1.3}
  .chip.s-chop{background:#8a6} .chip.s-pan{background:#d8743a} .chip.s-wok{background:#c0562e}
  .chip.s-pot{background:#4a9bd6} .chip.s-fry{background:#E2a72b} .chip.s-season{background:#9b6fc0}
  .arr{color:#c9b48f;font-size:.6rem}
  .obar{height:5px;background:#e3d4ba;border-radius:3px;overflow:hidden}
  .obar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#2FB28C,#7fd8c2)}

  .stagewrap{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.4);line-height:0}
  #cv{width:100%;height:auto;display:block;touch-action:none}
  .joy{position:absolute;left:12px;bottom:12px;width:104px;height:104px;border-radius:50%;background:rgba(20,14,8,.34);border:2px solid rgba(255,255,255,.28);touch-action:none}
  .joy .knob{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#e4d8c4);box-shadow:0 3px 8px rgba(0,0,0,.4);transition:transform .05s}
  .ibtn{position:absolute;right:14px;bottom:16px;width:92px;height:92px;border-radius:50%;border:none;font-family:var(--disp);font-weight:700;font-size:1.05rem;color:#fff;
    background:radial-gradient(circle at 40% 32%,#34cda4,#1d8a6b);box-shadow:0 5px 0 #166b53,0 8px 16px rgba(0,0,0,.4);cursor:pointer;letter-spacing:1px}
  .ibtn:active{transform:translateY(4px);box-shadow:0 1px 0 #166b53,0 4px 10px rgba(0,0,0,.4)}
  .toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:rgba(20,12,8,.82);color:#fff;font-weight:700;font-size:.8rem;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:5}
  .toast.show{opacity:1}

  .ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(20,14,10,.6)}
  .ov.hide{display:none}
  .card{position:relative;border-radius:24px;max-width:380px;width:100%;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55);animation:cin .4s ease}
  @keyframes cin{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .hero{height:158px;background-size:cover;background-position:center;position:relative}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,12,8,.1),rgba(20,12,8,.4) 50%,#2a1c12)}
  .hero .htx{position:absolute;left:0;right:0;bottom:10px;text-align:center;z-index:2;color:#fff;padding:0 16px}
  .hero .bdg{display:inline-block;background:var(--gold);color:#5a3a10;font-family:var(--disp);font-weight:700;font-size:.6rem;letter-spacing:2px;padding:3px 10px;border-radius:20px;margin-bottom:7px}
  .hero h1{font-family:var(--disp);font-size:1.5rem;font-weight:700;line-height:1.12;text-shadow:0 3px 10px rgba(0,0,0,.6)}
  .bd{background:var(--cream);padding:16px 18px 20px;text-align:center}
  .sub{font-size:.82rem;color:var(--brown);font-weight:700;margin-bottom:12px;line-height:1.5}
  .rules{text-align:left;background:#fff;border-radius:13px;padding:11px 13px;font-size:.76rem;line-height:1.6;color:var(--ink);margin-bottom:14px;box-shadow:0 3px 10px rgba(122,74,34,.12)}
  .rules b{color:var(--warm)}
  .big{display:block;width:100%;background:linear-gradient(135deg,#E23B44,#FF7A2F);color:#fff;border:none;border-radius:15px;padding:14px;font-family:var(--disp);font-size:1.08rem;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 8px 20px rgba(230,57,70,.4)}
  .big:active{transform:scale(.97)}
  .res{display:flex;justify-content:space-around;background:#fff;border-radius:13px;padding:12px 6px;margin-bottom:12px;box-shadow:0 3px 10px rgba(122,74,34,.12)}
  .res .v{font-family:var(--disp);font-size:1.4rem;font-weight:700;color:var(--red)}
  .res .k{font-size:.62rem;color:#a98c63;font-weight:700}
  .rank{font-family:var(--disp);font-size:1.1rem;font-weight:700;color:var(--green);margin-bottom:12px}
  .deal{background:linear-gradient(135deg,#FFE08A,#FFC233);border-radius:13px;padding:10px 12px;margin-bottom:12px;font-size:.78rem;font-weight:700;color:#5a3a10;line-height:1.5}
  .ghost{display:block;width:100%;background:transparent;border:2px solid var(--warm);color:var(--warm);border-radius:13px;padding:10px;margin-top:9px;font-family:var(--disp);font-weight:600;font-size:.9rem;cursor:pointer}
  #cfc{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="cfc"></canvas>
<div class="wrap">
  <div class="hud"><div class="hrow">
    <div class="brand"><img class="lg" src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=120&q=70&auto=format&fit=crop" alt="">翻鍋食堂</div>
    <div class="hearts" id="hearts"></div>
    <div style="text-align:right"><div class="score" id="score">0</div><div class="plates" id="plates"></div></div>
  </div></div>

  <div class="orders" id="orders"></div>

  <div class="stagewrap">
    <canvas id="cv"></canvas>
    <div class="toast" id="toast"></div>
    <div class="joy" id="joy"><div class="knob" id="knob"></div></div>
    <button class="ibtn" id="ibtn">拿 / 放</button>
  </div>
</div>

<div class="ov" id="startOv">
  <div class="card">
    <div class="hero" style="background-image:url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=760&q=78&auto=format&fit=crop')">
      <div class="htx"><span class="bdg">廚房大亂鬥 · 體感版</span><h1>翻鍋食堂<br>廚房大亂鬥</h1></div>
    </div>
    <div class="bd">
      <div class="sub">一個人顧整間廚房，跑起來！</div>
      <div class="rules">
        🕹️ 左下 <b>搖桿</b> 移動廚師，繞過料理檯與中島<br>
        ✋ 右下 <b>拿/放</b> 鈕:在食材箱拿料、丟進對的鍋<br>
        🔪 切菜板切料、🍳 <b>煎/炒/煮/炸</b> 各用對的鍋<br>
        🔥 煮過頭會 <b>燒焦→失火</b>!空手衝去 <b>連點拍打滅火</b><br>
        🧂 調味台加調味 → 走到 <b>出餐口</b> 上菜<br>
        🧽 盤子用完要去 <b>水槽洗碗</b>;⚠️ <b>地上油漬會打滑</b><br>
        ⚡ 撿地上的 <b>閃電</b> 加速衝刺;❤️ 客人跑 3 單就打烊
      </div>
      <button class="big" onclick="startGame()">開始營業</button>
    </div>
  </div>
</div>

<div class="ov hide" id="overOv">
  <div class="card">
    <div class="hero" style="background-image:url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=760&q=78&auto=format&fit=crop')">
      <div class="htx"><span class="bdg" id="overBadge">今日打烊</span><h1 id="overTitle">營業結束！</h1></div>
    </div>
    <div class="bd">
      <div class="res"><div><div class="v" id="rScore">0</div><div class="k">總分</div></div><div><div class="v" id="rServed">0</div><div class="k">出餐數</div></div><div><div class="v" id="rCombo">0</div><div class="k">最高連擊</div></div></div>
      <div class="rank" id="rRank"></div>
      <div class="deal">🎁 來店出示分數，<b>招牌餐買一送一！</b></div>
      <button class="big" onclick="startGame()">再戰一輪</button>
      <button class="ghost" onclick="location.reload()">回首頁</button>
    </div>
  </div>
</div>

const keys={};

addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
let joyVec={x:0,y:0},joyId=null;
const joy=$('joy'),knob=$('knob');
function joyStart(e){joyId=e.pointerId??1;joy.setPointerCapture&&joy.setPointerCapture(e.pointerId);joyMove(e);}
function joyMove(e){
  const rect=joy.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  let dx=e.clientX-cx,dy=e.clientY-cy;const mag=Math.hypot(dx,dy),max=rect.width/2-10;
  if(mag>max){dx=dx/mag*max;dy=dy/mag*max;}
  knob.style.transform=`translate(${dx}px,${dy}px)`;
  const m=Math.hypot(dx,dy);joyVec.x=m>6?dx/max:0;joyVec.y=m>6?dy/max:0;
}
function joyEnd(){joyId=null;joyVec.x=0;joyVec.y=0;knob.style.transform='translate(0,0)';}
joy.addEventListener('pointerdown',joyStart);joy.addEventListener('pointermove',e=>{if(joyId!==null)joyMove(e);});
addEventListener('pointerup',e=>{if(joyId!==null)joyEnd();});addEventListener('pointercancel',joyEnd);

function startGame(){
  chef={x:5*T+T/2,y:8*T+T/2,r:11,hold:null,face:1,vx:0,vy:0,boostT:0};
  orders.forEach(o=>o.el&&o.el.remove());orders=[];oid=0;clean=4;dirty=0;
  hazards=[];pickups=[];gt=0;oilSpawnT=9;boostSpawnT=12;
  score=0;combo=0;bestCombo=0;served=0;hearts=3;spawnT=0;running=true;
  STATIONS.forEach(s=>{s.hold=null;s.tm=0;s.status=null;});
  $('startOv').classList.add('hide');$('overOv').classList.add('hide');
  renderHud();audioInit();spawnOrder();
  last=performance.now();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
}
function loop(ts){
  if(!running)return;let dt=(ts-last)/1000;if(!(dt>0))dt=0;if(dt>0.05)dt=0.05;last=ts;
  update(dt);draw();raf=requestAnimationFrame(loop);
}

// ───────── 更新 ─────────
function boxSolid(x,y,r){
  const x0=x-r,x1=x+r,y0=y-r,y1=y+r;
  for(let c=Math.floor(x0/T);c<=Math.floor(x1/T);c++)for(let rr=Math.floor(y0/T);rr<=Math.floor(y1/T);rr++){
    if(c<0||rr<0||c>=COLS||rr>=ROWS)return true;if(SOLID[rr][c])return true;
  }
  return false;
}
function isOnOil(x,y){return hazards.some(h=>h.type==='oil'&&Math.hypot(x-h.x,y-h.y)<h.r);}
function randFloor(){for(let i=0;i<40;i++){const c=1+Math.floor(Math.random()*(COLS-2)),r=1+Math.floor(Math.random()*(ROWS-2));if(!SOLID[r][c]){const x=c*T+T/2,y=r*T+T/2;if(Math.hypot(x-chef.x,y-chef.y)>54)return{x,y};}}return null;}
function update(dt){
  gt+=dt;
  // 移動(慣性;踩到油漬會打滑)
  let ix=joyVec.x,iy=joyVec.y;
  if(keys['arrowleft']||keys['a'])ix=-1;if(keys['arrowright']||keys['d'])ix=1;
  if(keys['arrowup']||keys['w'])iy=-1;if(keys['arrowdown']||keys['s'])iy=1;
  const m=Math.hypot(ix,iy);if(m>1){ix/=m;iy/=m;}
  const boost=chef.boostT>0?1.7:1, SP=132*boost;
  const onOil=isOnOil(chef.x,chef.y);
  const k=onOil?2.0:16, f=1-Math.exp(-k*dt);
  chef.vx+=(ix*SP-chef.vx)*f;chef.vy+=(iy*SP-chef.vy)*f;
  if(ix)chef.face=ix>0?1:-1;
  let nx=chef.x+chef.vx*dt;if(!boxSolid(nx,chef.y,chef.r))chef.x=nx;else chef.vx=0;
  let ny=chef.y+chef.vy*dt;if(!boxSolid(chef.x,ny,chef.r))chef.y=ny;else chef.vy=0;
  if(chef.boostT>0)chef.boostT-=dt;

  // 油漬 / 加速道具
  oilSpawnT-=dt;if(oilSpawnT<=0){if(hazards.filter(h=>h.type==='oil').length<3){const p=randFloor();if(p)hazards.push({type:'oil',x:p.x,y:p.y,r:19,life:11});}oilSpawnT=Math.max(7,14-served*0.4);}
  boostSpawnT-=dt;if(boostSpawnT<=0){if(!pickups.length){const p=randFloor();if(p)pickups.push({type:'boost',x:p.x,y:p.y,life:9});}boostSpawnT=15;}
  for(let i=hazards.length-1;i>=0;i--){hazards[i].life-=dt;if(hazards[i].life<=0)hazards.splice(i,1);}
  for(let i=pickups.length-1;i>=0;i--){const p=pickups[i];p.life-=dt;if(Math.hypot(chef.x-p.x,chef.y-p.y)<18){chef.boostT=6;pickups.splice(i,1);sfx('ding');toast('加速衝刺! ⚡');}else if(p.life<=0)pickups.splice(i,1);}

  // 出單
  spawnT-=dt;if(spawnT<=0){if(orders.length<4)spawnOrder();spawnT=Math.max(2.6,5.2-served*0.14);}
  for(let i=orders.length-1;i>=0;i--){const o=orders[i];o.pat-=dt;updateBar(o);if(o.pat<=0)expire(i);}

  // 站台處理(煮過頭→燒焦→失火)
  for(const s of STATIONS){
    const cook=['fry','pan','wok','pot'].includes(s.t0type);
    if(s.hold&&s.status==='proc'){
      s.tm+=dt;const dur=(s.t0type==='chop')?CHOP_T:COOK_T;
      if(s.tm>=dur){s.status='ready';s.hold.done.push(s.t0type);}
    } else if(s.hold&&s.status==='ready'&&s.t0type!=='chop'){
      s.tm+=dt;if(s.tm>=COOK_T+BURN_T){s.status='burnt';s.hold.burnt=true;s.tm=0;}
    } else if(s.status==='burnt'&&cook){
      s.tm+=dt;if(s.tm>=FIRE_DELAY){s.status='fire';s.fhp=FIRE_HP;s.firet=0;sfx('sizzle');}
    } else if(s.status==='fire'){
      s.firet+=dt;if(s.firet>=FIRE_MAX){hearts--;combo=0;s.status=null;s.hold=null;renderHud();sfx('fail');toast('爐子燒掉一條命! 😱');if(hearts<=0)gameOver();}
    }
  }
}

// ───────── 訂單 ─────────
function spawnOrder(){
  const pool=served<2?DISHES.slice(0,3):DISHES;
  const d=pool[Math.floor(Math.random()*pool.length)];
  const pf=Math.max(0.6,1-served*0.02),max=d.pat*pf;
  const el=document.createElement('div');el.className='ord';
  let chips='';d.steps.forEach((st,i)=>{chips+=(i?'<span class="arr">›</span>':'')+`<span class="chip s-${st}">${STEP_LABEL[st]}</span>`;});
  el.innerHTML=`<div class="onm">${d.name}</div><div class="steps"><img src="${ICONS[d.ing]}" alt="">${chips}</div><div class="obar"><i></i></div>`;
  $('orders').appendChild(el);
  orders.push({id:++oid,dish:d,pat:max,max:max,el:el,bar:el.querySelector('i')});
}
function updateBar(o){const f=Math.max(0,o.pat/o.max);o.bar.style.width=(f*100)+'%';o.el.classList.toggle('warn',f<0.4);o.el.classList.toggle('crit',f<0.2);o.bar.style.background=f<0.2?'linear-gradient(90deg,#E23B44,#ff8a8a)':f<0.4?'linear-gradient(90deg,#FFB300,#ffd166)':'linear-gradient(90deg,#2FB28C,#7fd8c2)';}
function expire(i){const o=orders[i];o.el.remove();orders.splice(i,1);hearts--;combo=0;renderHud();sfx('fail');toast('客人跑單 😤');if(hearts<=0)gameOver();}

// ───────── 互動 ─────────
function nearest(){let best=null,bd=46;for(const s of STATIONS){const d=Math.hypot(chef.x-s.cx,chef.y-s.cy);if(d<bd){bd=d;best=s;}}return best;}
function interact(){
  if(!running)return;const s=nearest();if(!s){return;}
  if(s.t==='crate'){ if(chef.hold){toast('手是滿的');return;} chef.hold={ing:s.ing,done:[],burnt:false}; sfx('tap'); }
  else if(s.t==='chop'||s.t==='fryer'||s.t==='pan'||s.t==='wok'||s.t==='pot'){
    if(s.status==='fire'){ if(chef.hold){toast('空手才能滅火!');return;} s.fhp-=1;sfx('trash'); if(s.fhp<=0){s.status=null;s.hold=null;toast('火滅了 💨');}else toast('滅火中…用力拍!'); return; }
    if(s.hold==null){
      if(!chef.hold){toast('空的');return;}
      s.hold=chef.hold;chef.hold=null;s.status='proc';s.tm=0;s.t0type=s.step;sfx(s.t==='chop'?'tap':'sizzle');
    } else {
      if(s.status==='ready'||s.status==='burnt'){ if(chef.hold){toast('手是滿的');return;} chef.hold=s.hold;s.hold=null;s.status=null;sfx('pick'); }
      else { toast(s.t==='chop'?'切菜中…':'烹調中…'); }
    }
  }
  else if(s.t==='season'){ if(!chef.hold){toast('手上沒東西');return;} if(chef.hold.burnt){toast('燒焦了!');return;} chef.hold.done.push('season');sfx('ding');toast('加了調味 🧂'); }
  else if(s.t==='sink'){ if(chef.hold){toast('先放下手上的');return;} if(dirty<=0){toast('沒有髒盤子');return;} dirty--;clean++;renderHud();sfx('pick');toast('洗好一個盤 🧽'); }
  else if(s.t==='bin'){ if(!chef.hold){toast('手上沒東西');return;} chef.hold=null;sfx('trash');toast('丟掉'); }
  else if(s.t==='serve'){
    if(!chef.hold){toast('手上沒餐點');return;}
    if(chef.hold.burnt){toast('燒焦的不能出！');return;}
    const it=chef.hold;
    const idx=orders.findIndex(o=>o.dish.ing===it.ing&&eqArr(o.dish.steps,it.done));
    if(idx<0){toast('沒有對應訂單 🤔');return;}
    if(clean<=0){toast('沒乾淨盤!快洗碗 🧽');return;}
    const o=orders[idx];const tb=Math.round(Math.max(0,o.pat)*3);
    combo++;if(combo>bestCombo)bestCombo=combo;const gain=70+tb+(combo-1)*14;
    score+=gain;served++;clean--;dirty++;
    o.el.remove();orders.splice(idx,1);chef.hold=null;renderHud();sfx('serve');
    toast('+'+gain+(combo>1?'  x'+combo+'連擊':'')+' 🎉');
    if(combo>0&&combo%4===0)burst();
  }
}
function eqArr(a,b){return a.length===b.length&&a.every((x,i)=>x===b[i]);}

// ───────── 繪圖 ─────────
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function draw(){
  ctx.clearRect(0,0,W,H);
  // 地板
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!SOLID[r][c]){ctx.fillStyle=((r+c)&1)?'#f0d9a8':'#e9cf99';ctx.fillRect(c*T,r*T,T,T);ctx.fillStyle='rgba(0,0,0,.03)';ctx.fillRect(c*T,r*T,T,1);}
  }
  // 油漬
  hazards.forEach(drawOil);
  // 料理檯 / 中島
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const ch=MAP[r][c];
    if(ch==='#'||ch==='X'){
      ctx.fillStyle=ch==='X'?'#9a6a3c':'#b98a52';rr(c*T+1,r*T+1,T-2,T-2,5);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.12)';rr(c*T+1,r*T+1,T-2,5,3);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.16)';ctx.fillRect(c*T+2,r*T+T-5,T-4,4);
    }
  }
  // 站台
  for(const s of STATIONS)drawStation(s);
  // 加速道具
  pickups.forEach(drawBoost);
  // 廚師
  drawChef();
}
function drawOil(h){
  ctx.save();ctx.globalAlpha=h.life<2?Math.max(0,h.life/2):1;
  ctx.fillStyle='rgba(35,26,10,.5)';ctx.beginPath();ctx.ellipse(h.x,h.y,h.r,h.r*0.72,0,0,7);ctx.fill();
  ctx.fillStyle='rgba(120,90,40,.4)';ctx.beginPath();ctx.ellipse(h.x,h.y,h.r*0.7,h.r*0.5,0,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,245,200,.3)';ctx.beginPath();ctx.ellipse(h.x-h.r*0.3,h.y-h.r*0.22,h.r*0.32,h.r*0.18,-0.4,0,7);ctx.fill();
  ctx.restore();
}
function drawBoost(p){
  const pu=1+0.13*Math.sin(gt*7);
  ctx.save();ctx.translate(p.x,p.y);ctx.scale(pu,pu);if(p.life<2)ctx.globalAlpha=Math.max(0,p.life/2);
  ctx.fillStyle='rgba(255,200,40,.35)';ctx.beginPath();ctx.arc(0,0,15,0,7);ctx.fill();
  ctx.fillStyle='#FFB300';ctx.beginPath();ctx.arc(0,0,11,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-2,-7);ctx.lineTo(4,-1.5);ctx.lineTo(0.5,-1.5);ctx.lineTo(2,7);ctx.lineTo(-4.5,-0.5);ctx.lineTo(-0.5,-0.5);ctx.closePath();ctx.fill();
  ctx.restore();
}
function drawFire(x,y){
  for(let i=0;i<3;i++){const ph=gt*9+i*2.1;const fx=x+(i-1)*7,fy=y-1-Math.abs(Math.sin(ph))*7;
    ctx.fillStyle=i===1?'#FFD24D':'#FF7A2F';ctx.beginPath();ctx.moveTo(fx,fy+9);ctx.quadraticCurveTo(fx-6,fy+1,fx,fy-7);ctx.quadraticCurveTo(fx+6,fy+1,fx,fy+9);ctx.closePath();ctx.fill();}
  ctx.fillStyle='#FFE08A';const ph2=gt*12;ctx.beginPath();ctx.arc(x,y+2-Math.abs(Math.sin(ph2))*3,3.5,0,7);ctx.fill();
}
function drawItem(it,x,y,sz){
  const im=IMG[it.ing];
  if(im&&im.complete&&im.naturalWidth){
    if(it.burnt)ctx.filter='brightness(.3) sepia(.6) saturate(.4)';
    else if(it.done&&it.done.some(d=>['fry','pan','wok','pot'].includes(d)))ctx.filter='sepia(.45) saturate(1.3) brightness(.82)';
    const ar=im.naturalWidth/im.naturalHeight;let w=sz,h=sz/ar;if(h>sz){h=sz;w=sz*ar;}
    ctx.drawImage(im,x-w/2,y-h/2,w,h);ctx.filter='none';
  }else{ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(x,y,sz/2,0,7);ctx.fill();}
  // 調味標記
  if(it.done&&it.done.includes('season')){ctx.fillStyle='#9b6fc0';ctx.beginPath();ctx.arc(x+sz*0.32,y-sz*0.32,3.2,0,7);ctx.fill();}
}
function ring(x,y,rad,frac,col){ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=3.5;ctx.beginPath();ctx.arc(x,y,rad,0,7);ctx.stroke();ctx.strokeStyle=col;ctx.beginPath();ctx.arc(x,y,rad,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);ctx.stroke();}
function label(s,txt,col){ctx.fillStyle=col;ctx.font='700 11px "Noto Sans TC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,s.cx,s.cy+1);}
function drawStation(s){
  const x=s.cx,y=s.cy;
  if(s.t==='crate'){
    ctx.fillStyle='#caa06a';rr(x-15,y-13,30,26,4);ctx.fill();ctx.fillStyle='#a07c46';ctx.fillRect(x-15,y-3,30,3);
    const im=IMG[s.ing];if(im&&im.complete&&im.naturalWidth){const sz=24,ar=im.naturalWidth/im.naturalHeight;let w=sz,h=sz/ar;if(h>sz){h=sz;w=sz*ar;}ctx.drawImage(im,x-w/2,y-h/2-1,w,h);}
  } else if(s.t==='serve'){
    ctx.fillStyle='#2FB28C';rr(x-16,y-14,32,28,5);ctx.fill();ctx.fillStyle='#fff';label(s,'出餐','#fff');
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x,y+9);ctx.lineTo(x,y+15);ctx.moveTo(x-4,y+11);ctx.lineTo(x,y+15);ctx.lineTo(x+4,y+11);ctx.stroke();
  } else if(s.t==='season'){
    ctx.fillStyle='#9b6fc0';rr(x-13,y-14,26,28,5);ctx.fill();label(s,'調味','#fff');
  } else if(s.t==='sink'){
    ctx.fillStyle='#6aa0c8';rr(x-15,y-13,30,26,5);ctx.fill();ctx.fillStyle='#cfe6f5';rr(x-11,y-9,22,14,3);ctx.fill();
    ctx.fillStyle='#1f5b82';ctx.font='700 9px "Noto Sans TC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('洗碗',x,y+9);
    if(dirty>0){ctx.fillStyle='#E23B44';ctx.beginPath();ctx.arc(x+12,y-11,7,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.font='700 9px sans-serif';ctx.fillText(dirty,x+12,y-10);}
  } else if(s.t==='bin'){
    ctx.fillStyle='#555';rr(x-12,y-12,24,26,4);ctx.fill();ctx.fillStyle='#777';ctx.fillRect(x-14,y-14,28,4);label(s,'',null);
    ctx.fillStyle='#999';ctx.font='700 9px "Noto Sans TC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('垃圾',x,y+6);
  } else { // cookware / chop
    const cols={fryer:'#E2a72b',pan:'#c9803f',wok:'#a85a30',pot:'#4a86b8',chop:'#c7a86a'};
    ctx.fillStyle='#4a4a4a';rr(x-16,y-15,32,30,6);ctx.fill();
    if(s.t==='chop'){ctx.fillStyle='#d9bf8e';rr(x-14,y-9,28,16,3);ctx.fill();ctx.strokeStyle='#9a8050';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x-9,y-2);ctx.lineTo(x+9,y-2);ctx.stroke();}
    else{ctx.fillStyle=cols[s.t];ctx.beginPath();ctx.arc(x,y,13,0,7);ctx.fill();ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.arc(x,y,8,0,7);ctx.fill();ctx.fillStyle='#222';ctx.fillRect(x+11,y-2,9,4);}
    // 標籤
    const nm={chop:'切',fryer:'炸',pan:'煎',wok:'炒',pot:'煮'}[s.t];
    ctx.fillStyle='#fff';ctx.font='800 10px "Noto Sans TC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nm,x,y-19);
    // 內容物 / 火
    if(s.status==='fire'){
      drawFire(x,y-2);
      ctx.strokeStyle='rgba(226,59,68,'+(0.45+0.4*Math.abs(Math.sin(gt*9)))+')';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,y,18,0,7);ctx.stroke();
    } else if(s.hold){
      drawItem(s.hold,x,y-1,22);
      if(s.status==='proc'){const dur=s.t0type==='chop'?CHOP_T:COOK_T;ring(x,y,17,Math.min(1,s.tm/dur),s.t0type==='chop'?'#5ab0e0':'#FF7A2F');}
      else if(s.status==='ready'){const warn=s.t0type!=='chop'&&s.tm>(COOK_T+BURN_T)*0.6;ring(x,y,17,1,warn?'#FF7A2F':'#2FB28C');}
      else if(s.status==='burnt'){ctx.fillStyle='rgba(40,40,40,.6)';ctx.beginPath();ctx.arc(x,y-1,13,0,7);ctx.fill();ctx.fillStyle='#aaa';for(let i=0;i<2;i++){ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(x+(i?4:-4),y-10-(gt*8%6),3,0,7);ctx.fill();}ctx.globalAlpha=1;}
    }
  }
}
function drawChef(){
  const x=chef.x,y=chef.y;
  if(chef.boostT>0){ctx.strokeStyle='rgba(255,190,40,'+(0.45+0.35*Math.sin(gt*12))+')';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,15,0,7);ctx.stroke();
    const sp=Math.hypot(chef.vx,chef.vy);if(sp>30){const a=Math.atan2(chef.vy,chef.vx);ctx.strokeStyle='rgba(255,200,60,.5)';ctx.lineWidth=2;for(let i=1;i<=3;i++){ctx.beginPath();ctx.moveTo(x-Math.cos(a)*(10+i*5),y-Math.sin(a)*(10+i*5)-3);ctx.lineTo(x-Math.cos(a)*(16+i*5),y-Math.sin(a)*(16+i*5)-3);ctx.stroke();}}}
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(x,y+11,12,5,0,0,7);ctx.fill();
  // body
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,11,0,7);ctx.fill();
  ctx.fillStyle='#E23B44';ctx.fillRect(x-9,y-2,18,7); // 圍裙巾
  // hat
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y-13,7,0,7);ctx.fill();ctx.fillRect(x-7,y-13,14,7);
  ctx.fillStyle='#f0e8d8';ctx.fillRect(x-8,y-7,16,3);
  // face dir
  ctx.fillStyle='#3a2a1c';ctx.beginPath();ctx.arc(x+chef.face*4,y-1,1.6,0,7);ctx.fill();
  // carried
  if(chef.hold)drawItem(chef.hold,x,y-26,24);
}

// ───────── HUD ─────────
const HEART='<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill="#fff"/></svg>';
function renderHud(){$('score').textContent=score;let h='';for(let i=0;i<3;i++)h+=`<span class="${i<hearts?'':'gone'}">${HEART}</span>`;$('hearts').innerHTML=h;$('plates').innerHTML=`乾淨盤 <b>${clean}</b><br>待洗 <b>${dirty}</b>`;}
let toastTimer=null;
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1100);}

function gameOver(){
  running=false;cancelAnimationFrame(raf);
  $('rScore').textContent=score;$('rServed').textContent=served;$('rCombo').textContent=bestCombo;
  let rank,title,badge;
  if(score>=1000){rank='👑 傳奇翻鍋鐵廚';title='封神啦！';badge='完美營業';}
  else if(score>=600){rank='🌟 五星金牌主廚';title='收工大勝!';badge='生意興隆';}
  else if(score>=300){rank='🍳 熟練料理人';title='辛苦啦！';badge='今日打烊';}
  else if(score>=120){rank='🔰 見習小廚';title='打烊啦！';badge='今日打烊';}
  else{rank='😅 手忙腳亂菜鳥';title='再加把勁！';badge='今日打烊';}
  $('rRank').textContent=rank;$('overTitle').textContent=title;$('overBadge').textContent=badge;
  $('overOv').classList.remove('hide');burst();
}

// ───────── 音效 ─────────
let AC=null;
function audioInit(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}}
function tone(f,dur,ty,v){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;o.type=ty||'sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v||0.05,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur);}catch(e){}}
function sfx(k){if(!AC)return;if(k==='tap')tone(520,.08,'square',.04);else if(k==='pick')tone(680,.1,'triangle',.05);else if(k==='ding'){tone(880,.12,'sine',.05);}else if(k==='serve'){tone(660,.1,'sine',.06);setTimeout(()=>tone(880,.1,'sine',.06),80);setTimeout(()=>tone(1320,.16,'sine',.06),160);}else if(k==='sizzle')tone(200,.2,'sawtooth',.03);else if(k==='fail'){tone(330,.14,'square',.05);setTimeout(()=>tone(220,.2,'square',.05),110);}else if(k==='trash')tone(170,.12,'square',.04);}

// ───────── 紙花 ─────────
function burst(){const c=$('cfc');c.width=innerWidth;c.height=innerHeight;const x=c.getContext('2d');const cols=['#E23B44','#FF7A2F','#FFC233','#2FB28C','#fff'];const P=[];for(let i=0;i<90;i++)P.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*0.4,vx:(Math.random()-.5)*10,vy:-5-Math.random()*8,r:4+Math.random()*5,c:cols[i%5],rot:Math.random()*6,rs:(Math.random()-.5)*.4,w:6+Math.random()*5});let t=0;(function fr(){x.clearRect(0,0,c.width,c.height);P.forEach(p=>{p.vy+=.3;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.globalAlpha=Math.max(0,1-t/85);x.fillStyle=p.c;x.fillRect(-p.w/2,-p.r/2,p.w,p.r);x.restore();});if(++t<90)requestAnimationFrame(fr);else x.clearRect(0,0,c.width,c.height);})();}

renderHud();draw();
</script>

(function(){let l=0;document.addEventListener('touchend',function(e){const n=Date.now();if(n-l<=300)e.preventDefault();l=n;},{passive:false});document.addEventListener('gesturestart',function(e){e.preventDefault();});})();
</script>
