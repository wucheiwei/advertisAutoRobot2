<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骨牌連鎖茶飲｜推倒壓力，喝出好運</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a0a2e; font-family:'Noto Sans TC',sans-serif; color:#fff; overflow:hidden; height:100dvh; display:flex; flex-direction:column; align-items:center; }
  #header { padding:16px 20px 8px; text-align:center; z-index:10; }
  #header h1 { font-size:1.1rem; letter-spacing:2px; color:#f0c060; }
  #header p { font-size:0.75rem; color:#c9b0ff; margin-top:4px; }
  #canvas-wrap { position:relative; flex:1; width:100%; max-width:480px; }
  #gameCanvas { display:block; width:100%; height:100%; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(10,4,30,0.85); opacity:0; pointer-events:none; transition:opacity .4s; }
  #overlay.show { opacity:1; pointer-events:auto; }
  #overlay h2 { font-size:1.5rem; color:#f0c060; margin-bottom:8px; }
  #overlay p { font-size:0.85rem; color:#ddd; margin-bottom:20px; text-align:center; padding:0 24px; }
  .cta-btn { background:linear-gradient(135deg,#f0c060,#e07020); border:none; border-radius:24px; padding:12px 32px; font-size:1rem; font-weight:700; color:#1a0a2e; cursor:pointer; letter-spacing:1px; }
  .cta-btn:active { transform:scale(.96); }
  #hint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-size:0.75rem; color:#9980cc; white-space:nowrap; }
  #pushBtn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,#c060f0,#6030c0); border:none; border-radius:50%; width:72px; height:72px; color:#fff; font-size:0.8rem; font-weight:700; cursor:pointer; box-shadow:0 0 20px #c060f088; letter-spacing:1px; transition:transform .15s; }
  #pushBtn:active { transform:translate(-50%,-50%) scale(.9); }
  #pushBtn.hidden { display:none; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="header">
  <h1>🎋 骨牌連鎖茶飲</h1>
  <p>推倒所有骨牌，解鎖你的隱藏優惠</p>
</div>
<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <button id="pushBtn">推倒！</button>
  <div id="overlay">
    <h2>🎉 連鎖完成！</h2>
    <p>你的壓力已清空<br>來一杯骨牌招牌茶，限時 85 折！</p>
    <button class="cta-btn" onclick="restart()">再玩一次</button>
    <br>
    <button class="cta-btn" style="margin-top:8px;background:linear-gradient(135deg,#60d0a0,#20806e)">立即領取優惠</button>
  </div>
  <div id="hint">點「推倒！」啟動骨牌連鎖</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const { Engine, Render, Runner, Bodies, Body, Composite, Events } = Matter;

const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('gameCanvas');
const pushBtn = document.getElementById('pushBtn');
const overlay = document.getElementById('overlay');
const hint = document.getElementById('hint');

let engine, render, runner, dominoes, started = false, done = false;

function getSize() {
  const r = wrap.getBoundingClientRect();
  return { W: r.width || 360, H: r.height || 560 };
}

function buildScene() {
  const { W, H } = getSize();
  canvas.width = W; canvas.height = H;

  engine = Engine.create({ gravity: { y: 1.5 } });
  render = Render.create({
    canvas,
    engine,
    options: { width: W, height: H, wireframes: false, background: '#1a0a2e' }
  });

  const ground = Bodies.rectangle(W/2, H + 25, W + 100, 50, {
    isStatic: true,
    render: { fillStyle: '#2a1550' }
  });
  const leftWall = Bodies.rectangle(-25, H/2, 50, H, { isStatic: true, render: { fillStyle: '#2a1550' } });
  const rightWall = Bodies.rectangle(W+25, H/2, 50, H, { isStatic: true, render: { fillStyle: '#2a1550' } });

  Composite.add(engine.world, [ground, leftWall, rightWall]);

  // Decorative colored labels on dominoes
  const colors = ['#f060a0','#f0c060','#60d0f0','#c060f0','#60f0a0','#f07030','#a060ff','#ff6090','#40e0b0','#ffd040'];
  const labels = ['壓力','煩惱','疲憊','焦慮','緊張','失眠','沮喪','孤單','憂鬱','空虛'];

  dominoes = [];
  const count = 12;
  const domW = Math.max(12, W * 0.045);
  const domH = domW * 3.2;
  const spacing = (W - 60) / count;
  const groundY = H - 25;

  for (let i = 0; i < count; i++) {
    const x = 30 + i * spacing + spacing * 0.5;
    const y = groundY - domH / 2;
    const d = Bodies.rectangle(x, y, domW, domH, {
      restitution: 0.1,
      friction: 0.4,
      frictionAir: 0.01,
      render: {
        fillStyle: colors[i % colors.length],
        strokeStyle: '#fff',
        lineWidth: 1
      },
      label: labels[i % labels.length]
    });
    dominoes.push(d);
    Composite.add(engine.world, d);
  }

  // Draw labels via afterRender
  Events.on(render, 'afterRender', drawLabels);

  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  started = false; done = false;
  overlay.classList.remove('show');
  pushBtn.classList.remove('hidden');
  hint.style.display = '';
}

function drawLabels() {
  const ctx = render.context;
  dominoes.forEach((d, i) => {
    ctx.save();
    ctx.translate(d.position.x, d.position.y);
    ctx.rotate(d.angle);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8, canvas.width * 0.022)}px 'Noto Sans TC',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.label, 0, 0);
    ctx.restore();
  });
}

let checkTimer;
function startPush() {
  if (started) return;
  started = true;
  pushBtn.classList.add('hidden');
  hint.style.display = 'none';

  // Push first domino
  const first = dominoes[0];
  Body.applyForce(first, first.position, { x: first.mass * 0.18, y: -first.mass * 0.02 });

  // Check completion every 500ms
  checkTimer = setInterval(() => {
    if (done) return;
    const allFallen = dominoes.every(d => {
      const angle = Math.abs(d.angle % (Math.PI * 2));
      return angle > 0.6 || angle > Math.PI * 2 - 0.6;
    });
    const allSlow = dominoes.every(d =>
      Math.abs(d.angularVelocity) < 0.05 &&
      Math.abs(d.velocity.x) < 0.2 &&
      Math.abs(d.velocity.y) < 0.2
    );
    if (allFallen && allSlow) {
      clearInterval(checkTimer);
      done = true;
      showWin();
    }
  }, 500);

  // Fallback after 8s
  setTimeout(() => {
    if (!done) { clearInterval(checkTimer); done = true; showWin(); }
  }, 8000);
}

function showWin() {
  overlay.classList.add('show');
  confetti({ particleCount: 120, spread: 90, origin: { y: 0.4 }, colors: ['#f0c060','#c060f0','#60d0f0','#f060a0'] });
}

function restart() {
  clearInterval(checkTimer);
  if (render) { Render.stop(render); render.canvas.getContext('2d').clearRect(0,0,render.canvas.width,render.canvas.height); }
  if (runner) Runner.stop(runner);
  if (engine) Engine.clear(engine);
  Events.off(render, 'afterRender', drawLabels);
  buildScene();
}

pushBtn.addEventListener('click', startPush);
window.restart = restart;

// Responsive rebuild
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (!started || done) restart(); }, 300);
});

buildScene();
</script>
</body>
</html>
