<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深淵純水｜跟著光潛入海底，遇見最純粹的水</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:auto;}
  body{
    background:#001220;
    font-family:'Noto Sans TC',sans-serif;
    color:#fff;
    overflow-x:hidden;
  }
  /* ── sticky viewport ── */
  #scroller{height:600vh;position:relative;}
  #sticky{
    position:sticky;top:0;
    width:100%;height:100dvh;
    overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }

  /* ── ocean layers ── */
  .layer{
    position:absolute;inset:0;
    will-change:transform;
  }
  /* sky → surface gradient */
  #sky{
    background:linear-gradient(180deg,#87ceeb 0%,#1a8fc1 40%,#0a4d7a 70%,#002040 100%);
    z-index:1;
  }
  /* water shimmer overlay */
  #shimmer{
    z-index:2;
    background:repeating-linear-gradient(
      170deg,
      transparent 0px, transparent 18px,
      rgba(255,255,255,0.04) 19px, rgba(255,255,255,0.04) 20px
    );
    opacity:0;
  }
  /* deep-sea gradient */
  #deep{
    background:linear-gradient(180deg,#002040 0%,#001428 40%,#000810 100%);
    z-index:3;opacity:0;
  }

  /* ── creatures / particles ── */
  #canvas-bg{position:absolute;inset:0;z-index:4;pointer-events:none;}

  /* ── text panels ── */
  .panel{
    position:absolute;inset:0;
    z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:32px 24px;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .5s;
  }
  .panel.vis{opacity:1;pointer-events:auto;}
  .panel h2{font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;margin-bottom:12px;line-height:1.3;}
  .panel p{font-size:clamp(0.82rem,3vw,1rem);color:rgba(255,255,255,.8);max-width:320px;line-height:1.7;}
  .badge{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);
    border-radius:20px;padding:4px 14px;font-size:.75rem;letter-spacing:1px;margin-bottom:10px;}

  /* surface panel */
  #p0 h2{color:#ffffff;text-shadow:0 2px 12px rgba(0,120,200,.8);}
  /* zone panels */
  #p1 h2{color:#7cf0ff;}
  #p2 h2{color:#50d0b0;}
  #p3 h2{color:#a0a0ff;}

  /* ── scroll indicator ── */
  #scroll-hint{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:20;display:flex;flex-direction:column;align-items:center;gap:6px;
    font-size:.72rem;color:rgba(255,255,255,.6);letter-spacing:1px;
    animation:bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(8px);}}
  .arrow{width:16px;height:16px;border-right:2px solid rgba(255,255,255,.5);border-bottom:2px solid rgba(255,255,255,.5);transform:rotate(45deg);}

  /* ── CTA ── */
  #cta-panel{
    position:absolute;inset:0;z-index:15;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px;text-align:center;
    background:radial-gradient(ellipse at center,#001428 0%,#000810 100%);
    opacity:0;pointer-events:none;transition:opacity .6s;
  }
  #cta-panel.vis{opacity:1;pointer-events:auto;}
  #cta-panel h2{font-size:clamp(1.5rem,5vw,2.2rem);color:#7cf0ff;margin-bottom:8px;}
  #cta-panel .sub{font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:24px;line-height:1.6;}
  .cta-btn{
    background:linear-gradient(135deg,#00c8ff,#0060c0);
    border:none;border-radius:28px;padding:14px 36px;
    font-size:1rem;font-weight:700;color:#fff;cursor:pointer;
    box-shadow:0 0 20px rgba(0,200,255,.4);letter-spacing:1px;
    transition:transform .15s,box-shadow .15s;
  }
  .cta-btn:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(0,200,255,.7);}
  .cta-btn:active{transform:scale(.97);}
  .price-note{margin-top:14px;font-size:.78rem;color:rgba(255,255,255,.5);}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="scroller">
  <div id="sticky">
    <!-- layers -->
    <div class="layer" id="sky"></div>
    <div class="layer" id="shimmer"></div>
    <div class="layer" id="deep"></div>
    <canvas id="canvas-bg"></canvas>

    <!-- panels -->
    <div class="panel vis" id="p0">
      <span class="badge">深淵純水 ABYSS</span>
      <h2>下潛，進入最純粹的世界</h2>
      <p>向下滾動，跟著光線潛入深海<br>體驗 3000 公尺深處的純淨力量</p>
    </div>
    <div class="panel" id="p1">
      <span class="badge">透光層 0–200m</span>
      <h2>光線在這裡跳舞</h2>
      <p>陽光折射入水，水分子排列整齊<br>深淵純水在此汲取第一道光</p>
    </div>
    <div class="panel" id="p2">
      <span class="badge">弱光層 200–1000m</span>
      <h2>壓力淨化，去蕪存菁</h2>
      <p>400 大氣壓的深層過濾<br>雜質與污染在此被永遠隔離</p>
    </div>
    <div class="panel" id="p3">
      <span class="badge">深海層 1000–3000m</span>
      <h2>零污染的黑暗純淨</h2>
      <p>深達 3000 公尺，完全隔絕<br>全球最高純度，每一滴都是宇宙本質</p>
    </div>

    <!-- CTA -->
    <div id="cta-panel">
      <div style="font-size:2.5rem;margin-bottom:12px">💧</div>
      <h2>深淵純水</h2>
      <div class="sub">3000m 深海汲取・超純淨水質<br>限時首購優惠，感受海底的力量</div>
      <button class="cta-btn">立即訂購，享 8 折優惠</button>
      <div class="price-note">原價 $980 → 優惠價 $784 / 箱（12瓶）</div>
    </div>

    <!-- scroll hint -->
    <div id="scroll-hint"><div class="arrow"></div><span>向下滾動</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// ── canvas creatures ──
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// particle system: jellyfish + bubbles + plankton
const particles = [];
function randRange(a,b){return a + Math.random()*(b-a);}

// init particles
for(let i=0;i<60;i++){
  particles.push({
    type: Math.random()<0.15 ? 'jelly' : (Math.random()<0.3 ? 'fish' : 'bubble'),
    x: Math.random()*1.2-0.1,
    y: Math.random(),
    size: randRange(2,12),
    vx: randRange(-0.0003,0.0003),
    vy: randRange(-0.0006,0.0003),
    alpha: randRange(0.2,0.8),
    hue: randRange(160,240),
    phase: Math.random()*Math.PI*2,
  });
}

let depthRatio = 0; // 0=surface 1=abyss (driven by scroll)
let animId;

function drawParticles(ts){
  ctx.clearRect(0,0,W,H);
  const t = ts * 0.001;

  particles.forEach(p=>{
    // only show particles according to depth
    const pDepth = p.y;
    const visibility = depthRatio < 0.1 ? (1-depthRatio*8) :
                       Math.max(0, 1 - Math.abs(pDepth - depthRatio)*3);
    if(visibility <= 0) return;

    p.x += p.vx + Math.sin(t+p.phase)*0.0002;
    p.y += p.vy;
    if(p.x < -0.1) p.x = 1.1;
    if(p.x > 1.1) p.x = -0.1;
    if(p.y < -0.05) p.y = 1.05;
    if(p.y > 1.05) p.y = -0.05;

    const px = p.x*W, py = p.y*H;
    ctx.save();
    ctx.globalAlpha = p.alpha * visibility;

    if(p.type==='bubble'){
      ctx.strokeStyle = `hsla(${p.hue},80%,80%,1)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px,py,p.size,0,Math.PI*2);
      ctx.stroke();
      // highlight
      ctx.fillStyle = `hsla(${p.hue},80%,95%,0.4)`;
      ctx.beginPath();
      ctx.arc(px-p.size*0.3,py-p.size*0.3,p.size*0.25,0,Math.PI*2);
      ctx.fill();
    } else if(p.type==='jelly'){
      const bob = Math.sin(t*1.5+p.phase)*p.size*0.3;
      // bell
      ctx.fillStyle = `hsla(${p.hue},60%,70%,0.5)`;
      ctx.beginPath();
      ctx.ellipse(px,py+bob,p.size,p.size*0.7,0,Math.PI,0);
      ctx.fill();
      // tentacles
      ctx.strokeStyle = `hsla(${p.hue},60%,80%,0.4)`;
      ctx.lineWidth = 0.8;
      for(let k=-2;k<=2;k++){
        ctx.beginPath();
        ctx.moveTo(px+k*p.size*0.35,py+bob);
        ctx.quadraticCurveTo(
          px+k*p.size*0.35+Math.sin(t*2+k)*p.size*0.5,
          py+bob+p.size*1.2,
          px+k*p.size*0.35+Math.sin(t*3+k)*p.size*0.3,
          py+bob+p.size*2
        );
        ctx.stroke();
      }
    } else {
      // fish / plankton
      ctx.fillStyle = `hsla(${p.hue+40},70%,75%,1)`;
      ctx.beginPath();
      ctx.ellipse(px,py,p.size*1.5,p.size*0.6,p.vx>0?0:Math.PI,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
  animId = requestAnimationFrame(drawParticles);
}
animId = requestAnimationFrame(drawParticles);

// ── GSAP scroll timeline ──
const sky = document.getElementById('sky');
const shimmer = document.getElementById('shimmer');
const deep = document.getElementById('deep');
const panels = [p0,p1,p2,p3];
const ctaPanel = document.getElementById('cta-panel');
const scrollHint = document.getElementById('scroll-hint');

const tl = gsap.timeline({
  scrollTrigger:{
    trigger:'#scroller',
    start:'top top',
    end:'bottom bottom',
    scrub:1,
    onUpdate(self){
      depthRatio = self.progress;
    }
  }
});

// Phase 0→1: surface → shallow
tl.to(sky, {opacity:0, duration:1}, 0)
  .to(shimmer, {opacity:1, duration:0.5}, 0)
  .to('#p0', {opacity:0, duration:0.3}, 0)
  .to(scrollHint, {opacity:0, duration:0.2}, 0)
  .to('#p1', {opacity:1, duration:0.3}, 0.2)
  // Phase 1→2: shallow → mid
  .to(shimmer, {opacity:0, duration:0.5}, 0.7)
  .to('#p1', {opacity:0, duration:0.3}, 0.85)
  .to('#p2', {opacity:1, duration:0.3}, 1.0)
  // Phase 2→3: mid → deep
  .to(deep, {opacity:1, duration:0.5}, 1.2)
  .to('#p2', {opacity:0, duration:0.3}, 1.5)
  .to('#p3', {opacity:1, duration:0.3}, 1.6)
  // Phase 3→CTA
  .to('#p3', {opacity:0, duration:0.3}, 2.3)
  .to(ctaPanel, {opacity:1, pointerEvents:'auto', duration:0.5}, 2.5);

// bioluminescent shimmer on deep layer
gsap.to(deep, {
  backgroundImage:'linear-gradient(180deg,#001830 0%,#000c20 40%,#050020 100%)',
  duration:2,
  repeat:-1,
  yoyo:true,
  ease:'sine.inOut'
});
</script>
</body>
</html>
