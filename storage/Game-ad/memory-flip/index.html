<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AniCard 動漫翻牌大挑戰</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0524 0%, #1a0a3a 50%, #0a1530 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: #e0d0ff;
      overflow-x: hidden;
      padding: 16px 12px;
      gap: 12px;
    }

    /* Animated background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.05;
      animation: floatShape var(--dur) ease-in-out infinite alternate;
    }
    @keyframes floatShape { from { transform: translateY(-20px) rotate(0deg); } to { transform: translateY(20px) rotate(180deg); } }

    /* Header */
    .top-bar { text-align: center; width: 100%; }
    .brand-name {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #ff88cc, #aa66ff, #66aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub { font-size: 0.72rem; color: #8877aa; letter-spacing: 0.15em; margin-top: 2px; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .stat-pill {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(180,150,255,0.2);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .stat-label { font-size: 0.58rem; color: #7766aa; letter-spacing: 0.08em; }
    .stat-val   { font-size: 1.2rem; font-weight: 900; color: #cc99ff; }

    /* Card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 360px;
    }

    /* Card */
    .card {
      aspect-ratio: 1;
      perspective: 500px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 12px;
    }
    .card.flipped .card-inner   { transform: rotateY(180deg); }
    .card.matched .card-inner   { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .card-back {
      background: linear-gradient(135deg, #2a1a4a, #1a0f33);
      border: 2px solid rgba(180,150,255,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .card-back::after {
      content: '✦';
      font-size: 1.6rem;
      color: rgba(150,120,220,0.4);
    }
    .card-front {
      background: linear-gradient(135deg, #3a2060, #241545);
      border: 2px solid rgba(180,150,255,0.45);
      transform: rotateY(180deg);
      box-shadow: 0 2px 12px rgba(150,100,255,0.2);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
      border-color: rgba(100,220,150,0.6);
      box-shadow: 0 0 14px rgba(80,200,120,0.4);
      animation: matchGlow 0.5s ease;
    }
    @keyframes matchGlow {
      0%   { box-shadow: 0 0 0 rgba(80,200,120,0); }
      50%  { box-shadow: 0 0 30px rgba(80,200,120,0.7); }
      100% { box-shadow: 0 0 14px rgba(80,200,120,0.4); }
    }

    .card.wrong .card-front {
      border-color: rgba(255,80,80,0.7);
      animation: wrongShake 0.4s ease;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-5px); }
      75%      { transform: rotateY(180deg) translateX(5px); }
    }

    /* Feedback flash */
    .flash {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .flash.show { opacity: 1; }

    /* Bottom area */
    .bottom-area { text-align: center; width: 100%; max-width: 360px; }
    .progress-bar-wrap {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #aa66ff, #66aaff);
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .cta-btn {
      padding: 13px 36px;
      background: linear-gradient(90deg, #aa44ff, #6688ff, #aa44ff);
      background-size: 200% 100%;
      animation: btnPulse 2.5s ease infinite;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 20px rgba(160,80,255,0.4);
      transition: transform 0.2s;
      touch-action: manipulation;
    }
    @keyframes btnPulse { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
    .cta-btn:hover { transform: scale(1.04); }
    .cta-sub { font-size: 0.68rem; color: #5544aa; margin-top: 6px; }

    /* Win screen overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,5,36,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .overlay-card {
      background: linear-gradient(135deg, #1a0a36, #2a1050);
      border: 3px solid #aa66ff;
      border-radius: 22px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 0 60px rgba(160,80,255,0.4);
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      max-width: 300px;
    }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .overlay-emoji { font-size: 3.5rem; }
    .overlay-title { font-size: 1.5rem; font-weight: 900; color: #cc88ff; margin: 10px 0 6px; }
    .overlay-desc  { font-size: 0.88rem; color: #998bc8; line-height: 1.5; margin-bottom: 20px; }
    .overlay-stats {
      display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
    }
    .ov-stat { background: rgba(255,255,255,0.06); border: 1px solid rgba(180,150,255,0.2); border-radius: 10px; padding: 8px 14px; }
    .ov-val { font-size: 1.2rem; font-weight: 900; color: #aa88ff; }
    .ov-lbl { font-size: 0.6rem; color: #6655aa; }
    .overlay-btn {
      background: linear-gradient(90deg, #aa44ff, #6688ff);
      border: none; border-radius: 50px;
      padding: 11px 28px;
      font-size: 0.95rem; font-weight: 900;
      color: #fff; cursor: pointer;
      font-family: inherit;
      touch-action: manipulation;
    }
    .overlay-btn + .overlay-btn { background: rgba(255,255,255,0.1); margin-left: 8px; }

    /* Confetti canvas */
    #cCanvas { position:fixed; top:0; left:0; pointer-events:none; z-index:9999; width:100%; height:100%; }
  </style>
</head>
<body>

<canvas id="cCanvas"></canvas>

<!-- BG shapes -->
<div class="bg-shape" style="width:300px;height:300px;background:#aa44ff;top:-100px;left:-80px;--dur:7s"></div>
<div class="bg-shape" style="width:200px;height:200px;background:#4466ff;bottom:-60px;right:-40px;--dur:9s;animation-delay:2s"></div>

<div class="top-bar">
  <div class="brand-name">🃏 AniCard</div>
  <div class="brand-sub">動漫翻牌大挑戰 — 配對全部贏好禮！</div>
</div>

<div class="stats-bar">
  <div class="stat-pill">
    <div class="stat-label">⏱ 剩餘時間</div>
    <div class="stat-val" id="timerVal">60</div>
  </div>
  <div class="stat-pill">
    <div class="stat-label">🔄 翻牌次數</div>
    <div class="stat-val" id="flipVal">0</div>
  </div>
  <div class="stat-pill">
    <div class="stat-label">✅ 配對成功</div>
    <div class="stat-val" id="matchVal">0/8</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-area">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <button class="cta-btn" onclick="ctaAction()">🎁 完成挑戰領好禮 →</button>
  <div class="cta-sub">配對全部8組即可兌換 AniCard 限定徽章一枚</div>
</div>

<div class="flash" id="flash" style="background:rgba(80,200,120,0.15)"></div>

<!-- Win overlay -->
<div class="overlay" id="winOverlay">
  <div class="overlay-card">
    <div class="overlay-emoji">🎉</div>
    <div class="overlay-title">全部配對成功！</div>
    <div class="overlay-desc">恭喜完成 AniCard 動漫翻牌挑戰！您的記憶力超群！</div>
    <div class="overlay-stats">
      <div class="ov-stat"><div class="ov-val" id="finalFlips">-</div><div class="ov-lbl">翻牌次數</div></div>
      <div class="ov-stat"><div class="ov-val" id="finalTime">-</div><div class="ov-lbl">剩餘秒數</div></div>
    </div>
    <button class="overlay-btn" onclick="resetGame()">再玩一次</button>
    <button class="overlay-btn" onclick="ctaAction()">領取好禮</button>
  </div>
</div>

<!-- Timeout overlay -->
<div class="overlay" id="loseOverlay">
  <div class="overlay-card">
    <div class="overlay-emoji">⏰</div>
    <div class="overlay-title">時間到了！</div>
    <div class="overlay-desc">下次一定可以全部配對成功！</div>
    <button class="overlay-btn" onclick="resetGame()">再試一次</button>
  </div>
</div>

<script>
'use strict';

const EMOJIS = ['🦊','🐼','🦄','🐉','🌸','🍀','⚡','🎭'];
// 8 pairs = 16 cards
let allEmojis = [...EMOJIS, ...EMOJIS];
let matched = 0, flips = 0, timeLeft = 60, timerHandle = null;
let firstCard = null, secondCard = null, lockBoard = false;
let gameRunning = false;

/* Confetti */
function launchConfetti() {
  const canvas = document.getElementById('cCanvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#aa66ff','#6688ff','#ff88cc','#66ddaa','#ffcc44'];
  const particles = Array.from({length:120}, () => ({
    x: canvas.width/2, y: canvas.height*0.4,
    vx: (Math.random()-0.5)*12, vy: -(Math.random()*10+5),
    size: Math.random()*7+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    life: 1, decay: 0.012+Math.random()*0.008,
    rot: Math.random()*360, rv: (Math.random()-0.5)*10
  }));
  let running = true;
  function frame() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let any = false;
    for (const p of particles) {
      if (p.life<=0) continue; any=true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.vx*=0.97;
      p.rot+=p.rv; p.life-=p.decay;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size*0.5);
      ctx.restore();
    }
    if(any&&running) requestAnimationFrame(frame);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  running=true; requestAnimationFrame(frame);
  setTimeout(()=>{running=false;},5000);
}

/* Build grid */
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const shuffled = [...allEmojis].sort(()=>Math.random()-0.5);
  shuffled.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card));
    grid.appendChild(card);
  });
}

function updateStats() {
  document.getElementById('flipVal').textContent  = flips;
  document.getElementById('matchVal').textContent = `${matched}/8`;
  document.getElementById('progressBar').style.width = (matched/8*100)+'%';
}

function startTimer() {
  clearInterval(timerHandle);
  timerHandle = setInterval(() => {
    timeLeft--;
    document.getElementById('timerVal').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerHandle);
      gameRunning = false;
      lockBoard = true;
      document.getElementById('loseOverlay').classList.add('show');
    }
  }, 1000);
}

function onCardClick(card) {
  if (!gameRunning || lockBoard) return;
  if (card === firstCard) return;
  if (card.classList.contains('matched')) return;

  card.classList.add('flipped');
  flips++;
  updateStats();

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;
  lockBoard = true;

  if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
    // Match!
    setTimeout(() => {
      firstCard.classList.add('matched');
      secondCard.classList.add('matched');
      firstCard.classList.remove('flipped');
      secondCard.classList.remove('flipped');
      matched++;
      updateStats();
      firstCard = secondCard = null;
      lockBoard = false;

      // Flash green
      const flash = document.getElementById('flash');
      flash.style.background = 'rgba(80,200,120,0.15)';
      flash.classList.add('show');
      setTimeout(()=>flash.classList.remove('show'),200);

      if (matched === 8) onWin();
    }, 400);
  } else {
    // No match
    setTimeout(() => {
      firstCard.classList.add('wrong');
      secondCard.classList.add('wrong');
      setTimeout(() => {
        firstCard.classList.remove('flipped','wrong');
        secondCard.classList.remove('flipped','wrong');
        firstCard = secondCard = null;
        lockBoard = false;
      }, 500);
    }, 400);
  }
}

function onWin() {
  clearInterval(timerHandle);
  gameRunning = false;
  document.getElementById('finalFlips').textContent = flips;
  document.getElementById('finalTime').textContent  = timeLeft + 's';
  setTimeout(() => {
    launchConfetti();
    document.getElementById('winOverlay').classList.add('show');
  }, 400);
}

function resetGame() {
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('loseOverlay').classList.remove('show');
  matched = 0; flips = 0; timeLeft = 60;
  firstCard = secondCard = null; lockBoard = false;
  document.getElementById('timerVal').textContent = 60;
  updateStats();
  buildGrid();
  clearInterval(timerHandle);
  // Short countdown before start
  lockBoard = true;
  let count = 3;
  const countEl = document.createElement('div');
  countEl.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:6rem;font-weight:900;color:#cc88ff;z-index:200;pointer-events:none;';
  countEl.textContent = count;
  document.body.appendChild(countEl);
  const cd = setInterval(() => {
    count--;
    if (count > 0) { countEl.textContent = count; }
    else {
      clearInterval(cd);
      countEl.remove();
      lockBoard = false;
      gameRunning = true;
      startTimer();
    }
  }, 700);
}

function ctaAction() {
  document.getElementById('winOverlay').classList.remove('show');
  const banner = document.querySelector('.cta-sub');
  banner.textContent = '🎫 兌換碼：ANICARD-WIN-2024 — 請至官網輸入！';
  banner.style.color = '#aa88ff';
  launchConfetti();
}

// Start game on load
resetGame();
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
</body>
</html>
