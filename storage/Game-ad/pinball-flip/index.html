<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>霓虹彈珠台 × ArcadeX 限定活動</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#08081a;
      display:flex;flex-direction:column;align-items:center;
      min-height:100vh;font-family:'Noto Sans TC',system-ui,sans-serif;color:#fff;
      overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;
    }
    #header{
      width:100%;max-width:420px;padding:10px 16px;
      display:flex;justify-content:space-between;align-items:center;
      background:linear-gradient(90deg,#12003a,#001a4d);
      border-bottom:2px solid #d400ff;
    }
    #logo{font-size:20px;font-weight:900;color:#d400ff;letter-spacing:3px;}
    #hud{display:flex;gap:16px;align-items:center;}
    .hud-item{font-size:13px;color:#00e5ff;font-weight:700;}
    #game-wrap{
      position:relative;
      width:min(400px,100vw);
      flex:1;min-height:0;
      max-height:calc(100vh - 160px);
    }
    #pinball{display:block;width:100%;height:100%;}
    #overlay,#result-overlay{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,.88);z-index:10;gap:12px;
    }
    #result-overlay{display:none;}
    .ov-title{font-size:26px;font-weight:900;color:#d400ff;text-align:center;}
    .ov-sub{font-size:13px;color:#aaa;text-align:center;padding:0 24px;line-height:1.6;}
    .big-btn{
      background:linear-gradient(135deg,#d400ff,#5500ff);
      border:none;color:#fff;font-size:17px;font-weight:700;
      padding:13px 40px;border-radius:50px;cursor:pointer;
      font-family:'Noto Sans TC',system-ui,sans-serif;
      box-shadow:0 0 24px #d400ff88;
    }
    #controls{
      width:min(400px,100vw);display:flex;gap:8px;padding:8px;
    }
    .ctrl-btn{
      flex:1;height:52px;
      background:linear-gradient(135deg,#12003a,#001a4d);
      border:2px solid #d400ff;color:#d400ff;font-size:15px;font-weight:700;
      border-radius:12px;cursor:pointer;
      font-family:'Noto Sans TC',system-ui,sans-serif;
    }
    .ctrl-btn:active{background:rgba(212,0,255,.25);}
    #cta-bar{
      width:100%;max-width:420px;padding:11px 16px;
      background:linear-gradient(90deg,#5500ff,#d400ff);
      text-align:center;font-size:13px;font-weight:700;cursor:pointer;
    }
    #coupon-box{
      background:#12003a;border:2px dashed #d400ff;border-radius:14px;
      padding:14px 28px;text-align:center;
    }
    .c-code{font-size:22px;font-weight:900;color:#00e5ff;letter-spacing:4px;}
    .c-desc{font-size:11px;color:#999;margin-top:4px;}
    #final-score{font-size:46px;font-weight:900;color:#d400ff;}
  </style>
</head>
<body>
<div id="header">
  <div id="logo">ArcadeX</div>
  <div id="hud">
    <div class="hud-item">分數 <span id="score">0</span></div>
    <div class="hud-item">命 <span id="lives">♥♥♥</span></div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="pinball"></canvas>
  <div id="overlay">
    <div class="ov-title">🕹 霓虹彈珠台</div>
    <div class="ov-sub">按住左右翻板讓彈珠不墜落<br>打中靶心得分！累積 200 分解鎖專屬折扣</div>
    <button class="big-btn" id="start-btn">開始遊戲</button>
  </div>
  <div id="result-overlay">
    <div class="ov-title">🎮 遊戲結束</div>
    <div id="final-score">0</div>
    <div id="coupon-box">
      <div class="c-code" id="c-code">ARCADE88</div>
      <div class="c-desc" id="c-desc">恭喜！輸入折扣碼享 88 折</div>
    </div>
    <button class="big-btn" id="again-btn">再玩一次</button>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="left-btn">◄ 左翻板</button>
  <button class="ctrl-btn" id="right-btn">右翻板 ►</button>
</div>

<div id="cta-bar">🎁 立即前往 ArcadeX 官網，更多好康等你！</div>

<script>
(function(){
  var canvas = document.getElementById('pinball');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var livesEl = document.getElementById('lives');
  var overlay = document.getElementById('overlay');
  var resultOverlay = document.getElementById('result-overlay');
  var finalScoreEl = document.getElementById('final-score');
  var codeEl = document.getElementById('c-code');
  var descEl = document.getElementById('c-desc');

  var W=0,H=0,running=false,animId=0;
  var ball={}, leftP={}, rightP={}, bumpers=[], score=0, lives=3;
  var BALL_R=10, GRAV=0.18;

  function resize(){
    var wrap=document.getElementById('game-wrap');
    W=canvas.width=wrap.clientWidth;
    H=canvas.height=wrap.clientHeight;
  }
  resize();
  window.addEventListener('resize',function(){resize();if(!running)drawStatic();});

  function livesStr(n){var s='';for(var i=0;i<n;i++)s+='♥';return s;}

  function initGame(){
    score=0; lives=3;
    scoreEl.textContent=0;
    livesEl.textContent=livesStr(3);
    ball={x:W/2,y:H*0.45,vx:2.5,vy:-5,r:BALL_R};
    var pw=Math.min(90,W*0.22);
    leftP={x:W*0.22,y:H-72,w:pw,h:12,active:false};
    rightP={x:W*0.78,y:H-72,w:pw,h:12,active:false};
    var bdata=[
      {rx:0.25,ry:0.22,r:20,pts:30,col:'#d400ff'},
      {rx:0.75,ry:0.22,r:20,pts:30,col:'#00e5ff'},
      {rx:0.50,ry:0.14,r:18,pts:50,col:'#ffcc00'},
      {rx:0.30,ry:0.40,r:15,pts:20,col:'#00ff88'},
      {rx:0.70,ry:0.40,r:15,pts:20,col:'#ff4488'},
      {rx:0.50,ry:0.30,r:14,pts:40,col:'#ff8800'},
    ];
    bumpers=bdata.map(function(d){
      return{x:W*d.rx,y:H*d.ry,r:d.r,pts:d.pts,col:d.col,flash:0};
    });
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);
    ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);
    ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);
    ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function getPaddleAngle(p,side){
    var max=Math.PI/5;
    return p.active?(side==='left'?-max:max):(side==='left'?max*0.3:-max*0.3);
  }

  function drawPaddle(p,side){
    ctx.save();
    ctx.translate(p.x,p.y);
    var ang=getPaddleAngle(p,side);
    ctx.rotate(ang);
    var rx=side==='left'?0:-p.w;
    roundRect(rx,-p.h/2,p.w,p.h,5);
    ctx.fillStyle=p.active?'#d400ff':'#5500ff';
    ctx.shadowColor='#d400ff';
    ctx.shadowBlur=p.active?18:6;
    ctx.fill();
    ctx.restore();
  }

  function drawBall(){
    ctx.save();
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    var g=ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,ball.r);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(1,'#aaaaff');
    ctx.fillStyle=g;
    ctx.shadowColor='#8888ff';
    ctx.shadowBlur=14;
    ctx.fill();
    ctx.restore();
  }

  function drawBumper(b){
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.flash>0?'#ffffff':b.col;
    ctx.shadowColor=b.col;
    ctx.shadowBlur=b.flash>0?30:12;
    ctx.fill();
    if(b.flash>0){
      ctx.font='bold 11px sans-serif';
      ctx.fillStyle='#ffcc00';
      ctx.textAlign='center';
      ctx.fillText('+'+b.pts,b.x,b.y-b.r-4);
    }
    ctx.restore();
  }

  function drawBG(){
    ctx.fillStyle='#08081a';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#12123a';
    ctx.lineWidth=1;
    for(var x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // Side walls glow
    ctx.strokeStyle='#5500ff44';
    ctx.lineWidth=3;
    ctx.strokeRect(1,1,W-2,H-2);
  }

  function drawStatic(){
    drawBG();
    bumpers.forEach(drawBumper);
    drawPaddle(leftP,'left');
    drawPaddle(rightP,'right');
    drawBall();
  }

  function checkPaddleHit(p,side){
    var ang=getPaddleAngle(p,side);
    var cos=Math.cos(-ang),sin=Math.sin(-ang);
    var dx=ball.x-p.x, dy=ball.y-p.y;
    var lx=dx*cos-dy*sin, ly=dx*sin+dy*cos;
    var rx=side==='left'?0:-p.w;
    var ry=-p.h/2;
    if(lx>rx-ball.r&&lx<rx+p.w+ball.r&&ly>ry-ball.r&&ly<ry+p.h+ball.r){
      ball.vy=-Math.abs(ball.vy)*1.05-0.5;
      ball.vx+=(side==='left'?-1:1)*(p.active?2.5:0.8);
      var spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      if(spd>10){ball.vx*=10/spd;ball.vy*=10/spd;}
      return true;
    }
    return false;
  }

  function update(){
    if(!running)return;
    ball.x+=ball.vx;
    ball.y+=ball.vy;
    ball.vy+=GRAV;
    // Walls
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}
    if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);}
    // Paddles
    checkPaddleHit(leftP,'left');
    checkPaddleHit(rightP,'right');
    // Bumpers
    bumpers.forEach(function(b){
      var dx=ball.x-b.x,dy=ball.y-b.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<ball.r+b.r){
        var nx=dx/d,ny=dy/d;
        ball.x=b.x+nx*(ball.r+b.r+1);
        ball.y=b.y+ny*(ball.r+b.r+1);
        var dot=ball.vx*nx+ball.vy*ny;
        ball.vx=(ball.vx-2*dot*nx)*1.15;
        ball.vy=(ball.vy-2*dot*ny)*1.15;
        var spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
        if(spd>11){ball.vx*=11/spd;ball.vy*=11/spd;}
        score+=b.pts;
        scoreEl.textContent=score;
        b.flash=10;
      }
      if(b.flash>0)b.flash--;
    });
    // Ball lost
    if(ball.y>H+30){
      lives--;
      livesEl.textContent=livesStr(lives);
      if(lives<=0){running=false;endGame();return;}
      ball.x=W/2;ball.y=H*0.45;
      ball.vx=(Math.random()>.5?1:-1)*2.5;ball.vy=-5;
    }
  }

  function draw(){
    drawBG();
    bumpers.forEach(drawBumper);
    drawPaddle(leftP,'left');
    drawPaddle(rightP,'right');
    drawBall();
  }

  function loop(){
    update();draw();
    animId=requestAnimationFrame(loop);
  }

  function endGame(){
    cancelAnimationFrame(animId);
    finalScoreEl.textContent=score;
    if(score>=200){codeEl.textContent='ARCADE88';descEl.textContent='恭喜解鎖！結帳輸入折扣碼享 88 折';}
    else{codeEl.textContent='ARCADE95';descEl.textContent='再接再厲！結帳輸入折扣碼享 95 折';}
    resultOverlay.style.display='flex';
  }

  function startGame(){
    overlay.style.display='none';
    resultOverlay.style.display='none';
    initGame();
    running=true;
    cancelAnimationFrame(animId);
    loop();
  }

  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('again-btn').addEventListener('click',startGame);

  var lBtn=document.getElementById('left-btn');
  var rBtn=document.getElementById('right-btn');
  function setL(v){leftP.active=v;}
  function setR(v){rightP.active=v;}
  lBtn.addEventListener('mousedown',function(){setL(true);});
  lBtn.addEventListener('mouseup',function(){setL(false);});
  lBtn.addEventListener('mouseleave',function(){setL(false);});
  lBtn.addEventListener('touchstart',function(e){e.preventDefault();setL(true);});
  lBtn.addEventListener('touchend',function(e){e.preventDefault();setL(false);});
  rBtn.addEventListener('mousedown',function(){setR(true);});
  rBtn.addEventListener('mouseup',function(){setR(false);});
  rBtn.addEventListener('mouseleave',function(){setR(false);});
  rBtn.addEventListener('touchstart',function(e){e.preventDefault();setR(true);});
  rBtn.addEventListener('touchend',function(e){e.preventDefault();setR(false);});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft'||e.key==='z'||e.key==='Z')setL(true);
    if(e.key==='ArrowRight'||e.key==='/'||e.key==='.')setR(true);
  });
  document.addEventListener('keyup',function(e){
    if(e.key==='ArrowLeft'||e.key==='z'||e.key==='Z')setL(false);
    if(e.key==='ArrowRight'||e.key==='/'||e.key==='.')setR(false);
  });

  document.getElementById('cta-bar').addEventListener('click',function(){
    window.open('https://arcadex.example.com','_blank');
  });

  // Initial static draw after layout
  initGame();
  drawStatic();
})();
</script>
</body>
</html>
