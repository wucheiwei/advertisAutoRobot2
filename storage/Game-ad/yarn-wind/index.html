<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mr. Oops 繞線挑戰 — 精紡毛線工廠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #app {
      position: relative;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ---- SCREENS ---- */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 24px 20px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- START SCREEN ---- */
    #startScreen {
      gap: 20px;
      min-height: 100dvh;
      justify-content: center;
    }
    .brand-tag {
      font-size: 12px;
      letter-spacing: 3px;
      color: #e07b4a;
      text-transform: uppercase;
      font-weight: 600;
    }
    .start-title {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }
    .start-title span {
      color: #f4a261;
    }
    .start-subtitle {
      font-size: 15px;
      color: #a0a8c0;
      text-align: center;
      line-height: 1.6;
      max-width: 320px;
    }
    .start-canvas-wrap {
      position: relative;
      width: 240px;
      height: 180px;
    }
    #previewCanvas {
      width: 100%;
      height: 100%;
    }
    .rules {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 340px;
    }
    .rule-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #c0c8e0;
    }
    .rule-icon {
      font-size: 18px;
      min-width: 24px;
      text-align: center;
    }

    /* ---- GAME SCREEN ---- */
    #gameScreen {
      gap: 14px;
      min-height: 100dvh;
      justify-content: center;
      padding-top: 16px;
      padding-bottom: 16px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 420px;
    }
    .timer-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 8px 18px;
      min-width: 80px;
    }
    .timer-label {
      font-size: 10px;
      color: #8892a8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #timerDisplay {
      font-size: 32px;
      font-weight: 800;
      color: #f4a261;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }
    #timerDisplay.urgent { color: #e05c5c; animation: pulse 0.5s infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .click-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 8px 18px;
      min-width: 80px;
    }
    .click-label { font-size: 10px; color: #8892a8; letter-spacing: 1px; text-transform: uppercase; }
    #clickDisplay {
      font-size: 32px;
      font-weight: 800;
      color: #a8e6cf;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* progress bar */
    .progress-wrap {
      width: 100%;
      max-width: 420px;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #7a84a0;
      margin-bottom: 6px;
    }
    #progressLabel { color: #f4a261; font-weight: 700; font-size: 13px; }
    .progress-track {
      width: 100%;
      height: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e07b4a, #f4a261, #ffd166);
      border-radius: 8px;
      transition: width 0.15s ease-out;
      position: relative;
    }
    #progressBar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      from { background-position: -200% 0; }
      to   { background-position: 200% 0; }
    }

    #gameCanvas {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      cursor: pointer;
      display: block;
      touch-action: manipulation;
    }

    .click-hint {
      font-size: 13px;
      color: #7a84a0;
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ---- END SCREEN ---- */
    #endScreen {
      gap: 20px;
      min-height: 100dvh;
      justify-content: center;
    }
    .end-title {
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 800;
      color: #fff;
      text-align: center;
    }
    .grade-ring {
      position: relative;
      width: 140px;
      height: 140px;
    }
    #gradeCanvas { width: 100%; height: 100%; }
    .grade-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      font-weight: 900;
      color: #f4a261;
      line-height: 1;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #f4a261;
    }
    .stat-name {
      font-size: 11px;
      color: #8892a8;
      text-align: center;
    }
    .end-message {
      font-size: 15px;
      color: #c0c8e0;
      text-align: center;
      line-height: 1.6;
      max-width: 320px;
    }

    /* ---- BUTTONS ---- */
    .btn {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #e07b4a, #f4a261);
      color: #fff;
      font-size: 18px;
      padding: 16px 40px;
      box-shadow: 0 8px 24px rgba(224,123,74,0.4);
    }
    .btn-primary:hover {
      box-shadow: 0 12px 32px rgba(224,123,74,0.55);
      transform: translateY(-1px);
    }

    .btn-cta {
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      font-size: 16px;
      padding: 15px 32px;
      box-shadow: 0 8px 24px rgba(45,106,79,0.45);
      width: 100%;
      max-width: 340px;
    }
    .btn-cta:hover {
      box-shadow: 0 12px 32px rgba(45,106,79,0.6);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #c0c8e0;
      font-size: 14px;
      padding: 12px 28px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    /* floating click particles */
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 20px;
      font-weight: 700;
      color: #f4a261;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- START SCREEN -->
  <div id="startScreen" class="screen active">
    <span class="brand-tag">Mr. Oops 精紡毛線工廠</span>
    <h1 class="start-title">繞線<span>挑戰</span><br>你能繞滿嗎？</h1>
    <p class="start-subtitle">在 20 秒內瘋狂點擊，把毛線全部繞到線軸上，挑戰你的手速極限！</p>
    <div class="start-canvas-wrap">
      <canvas id="previewCanvas" width="480" height="360"></canvas>
    </div>
    <div class="rules">
      <div class="rule-item"><span class="rule-icon">⏱</span><span>限時 <strong style="color:#f4a261">20 秒</strong>，把毛線繞上線軸</span></div>
      <div class="rule-item"><span class="rule-icon">👆</span><span>快速點擊畫面讓線軸旋轉</span></div>
      <div class="rule-item"><span class="rule-icon">🏆</span><span>繞越多評分越高，拼 S 等!</span></div>
    </div>
    <button class="btn btn-primary" id="startBtn">點擊開始</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="hud">
      <div class="timer-box">
        <span class="timer-label">剩餘時間</span>
        <span id="timerDisplay">20</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <span style="font-size:11px;color:#8892a8;letter-spacing:1px;text-transform:uppercase;">繞線程度</span>
        <span id="progressLabel" style="font-size:22px;font-weight:800;color:#f4a261;">0%</span>
      </div>
      <div class="click-box">
        <span class="click-label">點擊次數</span>
        <span id="clickDisplay">0</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div id="progressBar"></div></div>
    </div>
    <canvas id="gameCanvas" width="840" height="540"></canvas>
    <p class="click-hint">👆 快速點擊 / 觸碰線軸區域！</p>
  </div>

  <!-- END SCREEN -->
  <div id="endScreen" class="screen">
    <span class="brand-tag">Mr. Oops 精紡毛線工廠</span>
    <h2 class="end-title">挑戰結束！</h2>
    <div class="grade-ring">
      <canvas id="gradeCanvas" width="280" height="280"></canvas>
      <div class="grade-letter" id="gradeLetter">A</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="finalPercent">0%</span>
        <span class="stat-name">繞線完成度</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="finalClicks">0</span>
        <span class="stat-name">總點擊次數</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="finalCPS">0</span>
        <span class="stat-name">平均點擊/秒</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="finalRank">C</span>
        <span class="stat-name">手速評價</span>
      </div>
    </div>
    <p class="end-message" id="endMessage">不錯的表現！快來選購 Mr. Oops 頂級毛線，讓你的手藝更上一層樓！</p>
    <a href="https://mroops.com" target="_blank" rel="noopener" style="width:100%;max-width:340px;text-decoration:none;">
      <button class="btn btn-cta">🛒 立即選購 Mr. Oops 毛線</button>
    </a>
    <button class="btn btn-secondary" id="retryBtn">再玩一次</button>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ============================================================
     STATE
  ============================================================ */
  const GAME_DURATION = 20;
  const MAX_CLICKS    = 120; // clicks to fill 100 %

  let state = 'start'; // start | playing | end
  let clicks = 0;
  let timeLeft = GAME_DURATION;
  let timerInterval = null;
  let bobbinAngle = 0;
  let spinSpeed = 0;
  let raf = null;
  let lastTs = 0;
  let yarnStrands = []; // active yarn animation strands
  let bobbinFullness = 0; // 0-1

  /* ============================================================
     DOM REFS
  ============================================================ */
  const startScreen  = document.getElementById('startScreen');
  const gameScreen   = document.getElementById('gameScreen');
  const endScreen    = document.getElementById('endScreen');
  const timerDisplay = document.getElementById('timerDisplay');
  const clickDisplay = document.getElementById('clickDisplay');
  const progressBar  = document.getElementById('progressBar');
  const progressLabel= document.getElementById('progressLabel');
  const gradeLetter  = document.getElementById('gradeLetter');
  const finalPercent = document.getElementById('finalPercent');
  const finalClicks  = document.getElementById('finalClicks');
  const finalCPS     = document.getElementById('finalCPS');
  const finalRank    = document.getElementById('finalRank');
  const endMessage   = document.getElementById('endMessage');

  const gameCanvas   = document.getElementById('gameCanvas');
  const gctx         = gameCanvas.getContext('2d');
  const previewCanvas= document.getElementById('previewCanvas');
  const pctx         = previewCanvas.getContext('2d');
  const gradeCanvas  = document.getElementById('gradeCanvas');
  const grdCtx       = gradeCanvas.getContext('2d');

  /* ============================================================
     SCREEN MANAGEMENT
  ============================================================ */
  function showScreen(name) {
    [startScreen, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
    if (name === 'start')   startScreen.classList.add('active');
    if (name === 'playing') gameScreen.classList.add('active');
    if (name === 'end')     endScreen.classList.add('active');
  }

  /* ============================================================
     GRADE HELPER
  ============================================================ */
  function getGrade(pct) {
    if (pct >= 90) return 'S';
    if (pct >= 70) return 'A';
    if (pct >= 50) return 'B';
    return 'C';
  }

  const gradeMessages = {
    S: '完美滿線！你是毛線大師，Mr. Oops 等你來挑戰更多顏色！',
    A: '超棒表現！距離滿分只差一步，快來選購高品質毛線再挑戰！',
    B: '不錯喔！多練習幾次，你也能成為繞線冠軍！',
    C: '繼續加油！試試 Mr. Oops 頂級毛線，靈感可能爆發！'
  };

  /* ============================================================
     CANVAS DRAWING — PREVIEW (start screen)
  ============================================================ */
  let previewAngle = 0;
  function drawPreview(ts) {
    if (state !== 'start') return;
    previewAngle += 0.03;
    const W = previewCanvas.width, H = previewCanvas.height;
    pctx.clearRect(0, 0, W, H);

    // yarn ball (left)
    drawYarnBall(pctx, 110, H / 2, 72, 0.3, '#e07b4a');
    // bobbin (right)
    drawBobbin(pctx, W - 130, H / 2, 68, previewAngle, 0.25);
    // a gentle strand
    pctx.beginPath();
    pctx.moveTo(155, H / 2 - 10);
    pctx.bezierCurveTo(W / 2, H / 2 - 40, W / 2, H / 2 + 20, W - 168, H / 2);
    pctx.strokeStyle = 'rgba(244,162,97,0.6)';
    pctx.lineWidth = 3;
    pctx.stroke();

    requestAnimationFrame(drawPreview);
  }
  requestAnimationFrame(drawPreview);

  /* ============================================================
     CANVAS DRAWING — GAME
  ============================================================ */
  function gameLoop(ts) {
    if (state !== 'playing') return;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;

    // decay spin speed
    spinSpeed = Math.max(0, spinSpeed - dt * 4);
    bobbinAngle += spinSpeed * dt;

    // update yarn strands
    yarnStrands = yarnStrands.filter(s => s.life > 0);
    yarnStrands.forEach(s => { s.life -= dt * 1.8; s.progress = Math.min(1, s.progress + dt * 2.5); });

    drawGame();
    raf = requestAnimationFrame(gameLoop);
  }

  function drawGame() {
    const W = gameCanvas.width, H = gameCanvas.height;
    gctx.clearRect(0, 0, W, H);

    // background glow
    const bg = gctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 380);
    bg.addColorStop(0, 'rgba(40,20,60,0.7)');
    bg.addColorStop(1, 'rgba(10,10,20,0)');
    gctx.fillStyle = bg;
    gctx.fillRect(0, 0, W, H);

    const ballX = 130, ballR = 90;
    const bobbinX = W - 160;

    // yarn ball
    drawYarnBall(gctx, ballX, H / 2, ballR, bobbinFullness, '#e07b4a');

    // yarn strands in flight
    yarnStrands.forEach(s => {
      const t = s.progress;
      const x1 = ballX + ballR * 0.4, y1 = s.startY;
      const x2 = bobbinX - 40,        y2 = s.endY;
      const cx1 = x1 + (x2 - x1) * 0.3, cy1 = y1 - 60;
      const cx2 = x1 + (x2 - x1) * 0.7, cy2 = y2 + 40;

      // partial bezier up to t
      const pts = bezierPoints(x1,y1,cx1,cy1,cx2,cy2,x2,y2, t);
      if (pts.length < 2) return;
      gctx.beginPath();
      gctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) gctx.lineTo(pts[i].x, pts[i].y);
      gctx.strokeStyle = `rgba(244,162,97,${0.9 * s.life})`;
      gctx.lineWidth = 2.5;
      gctx.lineCap = 'round';
      gctx.stroke();
    });

    // bobbin
    drawBobbin(gctx, bobbinX, H / 2, 105, bobbinAngle, bobbinFullness);

    // label
    gctx.font = 'bold 22px "PingFang TC", "Microsoft JhengHei", sans-serif';
    gctx.fillStyle = 'rgba(255,255,255,0.18)';
    gctx.textAlign = 'center';
    gctx.fillText('點擊這裡！', bobbinX, H / 2 + 148);
  }

  /* ============================================================
     DRAW HELPERS
  ============================================================ */
  function drawYarnBall(ctx, cx, cy, r, shrink, color) {
    const sr = r * (1 - shrink * 0.45);
    // shadow
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    // base circle
    const grad = ctx.createRadialGradient(cx - sr*0.2, cy - sr*0.2, sr*0.1, cx, cy, sr);
    grad.addColorStop(0, lighten(color, 40));
    grad.addColorStop(1, darken(color, 30));
    ctx.beginPath();
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // yarn lines on ball
    ctx.save();
    ctx.clip(); // clip to ball
    ctx.beginPath(); ctx.arc(cx, cy, sr, 0, Math.PI * 2); ctx.clip();
    ctx.strokeStyle = darken(color, 50);
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI;
      ctx.beginPath();
      ctx.ellipse(cx, cy, sr * 0.85, sr * 0.35, angle, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBobbin(ctx, cx, cy, r, angle, fullness) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    const flangeH = r * 0.22;
    const coreW   = r * 0.45;
    const flangeW = r * 0.85;

    // ---- wound yarn layers ----
    if (fullness > 0) {
      const layers = Math.floor(fullness * 8);
      for (let l = 0; l <= layers; l++) {
        const lf = Math.min(1, fullness * 8 - l);
        if (lf <= 0) break;
        const lr = coreW + l * (flangeH * 0.92);
        const alpha = 0.6 + 0.4 * lf;
        const col = interpolateColor('#e07b4a', '#ffd166', l / 8);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = col;
        ctx.lineWidth = flangeH * 0.95;
        ctx.lineCap = 'butt';
        // wound band on the spool core
        ctx.beginPath();
        ctx.moveTo(-coreW * 0.5, -flangeH * (0.3 + l * 0.9));
        ctx.lineTo( coreW * 0.5, -flangeH * (0.3 + l * 0.9));
        ctx.stroke();
        ctx.restore();
      }

      // round wound yarn mass
      const yarnR = coreW + fullness * flangeH * 0.88;
      const yarnGrad = ctx.createRadialGradient(0, 0, coreW * 0.5, 0, 0, yarnR);
      yarnGrad.addColorStop(0, 'rgba(255,180,80,0.9)');
      yarnGrad.addColorStop(1, 'rgba(224,123,74,0.6)');
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(0, 0, yarnR, yarnR * 0.62, 0, 0, Math.PI * 2);
      ctx.fillStyle = yarnGrad;
      ctx.fill();
      ctx.restore();
    }

    // ---- core spool ----
    // barrel
    const barrelGrad = ctx.createLinearGradient(-coreW, 0, coreW, 0);
    barrelGrad.addColorStop(0, '#5c3d2e');
    barrelGrad.addColorStop(0.5, '#8b5e3c');
    barrelGrad.addColorStop(1, '#5c3d2e');
    ctx.beginPath();
    ctx.rect(-coreW, -flangeH * 1.6, coreW * 2, flangeH * 3.2);
    ctx.fillStyle = barrelGrad;
    ctx.fill();

    // flanges (top + bottom)
    [-1, 1].forEach(side => {
      const flangeGrad = ctx.createLinearGradient(-flangeW, 0, flangeW, 0);
      flangeGrad.addColorStop(0, '#3d2010');
      flangeGrad.addColorStop(0.5, '#7a4420');
      flangeGrad.addColorStop(1, '#3d2010');
      ctx.beginPath();
      ctx.ellipse(0, side * flangeH * 1.6, flangeW, flangeH, 0, 0, Math.PI * 2);
      ctx.fillStyle = flangeGrad;
      ctx.fill();
      ctx.strokeStyle = '#a0622a';
      ctx.lineWidth = 2;
      ctx.stroke();

      // spoke lines on flange
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(0, side * flangeH * 1.6, flangeW, flangeH, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.strokeStyle = 'rgba(255,200,100,0.15)';
      ctx.lineWidth = 1.5;
      for (let sp = 0; sp < 6; sp++) {
        const a = (sp / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, side * flangeH * 1.6);
        ctx.lineTo(Math.cos(a) * flangeW, side * flangeH * 1.6 + Math.sin(a) * flangeH);
        ctx.stroke();
      }
      ctx.restore();
    });

    // center axle hole
    ctx.beginPath();
    ctx.ellipse(0, 0, flangeW * 0.12, flangeH * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1a0a00';
    ctx.fill();

    ctx.restore();

    // glow when spinning
    if (spinSpeed > 2) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.5, (spinSpeed - 2) / 10);
      const glow = ctx.createRadialGradient(cx, cy, r*0.3, cx, cy, r*1.3);
      glow.addColorStop(0, 'rgba(255,180,80,0.6)');
      glow.addColorStop(1, 'rgba(255,180,80,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, r * 1.3, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
      ctx.restore();
    }
  }

  /* ============================================================
     GRADE RING (end screen)
  ============================================================ */
  function drawGradeRing(pct) {
    const W = gradeCanvas.width, H = gradeCanvas.height;
    const cx = W/2, cy = H/2, r = 110;
    grdCtx.clearRect(0, 0, W, H);

    // track
    grdCtx.beginPath();
    grdCtx.arc(cx, cy, r, 0, Math.PI * 2);
    grdCtx.strokeStyle = 'rgba(255,255,255,0.08)';
    grdCtx.lineWidth = 16;
    grdCtx.stroke();

    // arc
    const startA = -Math.PI / 2;
    const endA   = startA + (pct / 100) * Math.PI * 2;
    const grad = grdCtx.createLinearGradient(cx - r, cy, cx + r, cy);
    grad.addColorStop(0, '#e07b4a');
    grad.addColorStop(1, '#ffd166');
    grdCtx.beginPath();
    grdCtx.arc(cx, cy, r, startA, endA);
    grdCtx.strokeStyle = grad;
    grdCtx.lineWidth = 16;
    grdCtx.lineCap = 'round';
    grdCtx.stroke();
  }

  /* ============================================================
     BEZIER PARTIAL POINTS
  ============================================================ */
  function bezierPoints(x1,y1,cx1,cy1,cx2,cy2,x2,y2, t) {
    const pts = [];
    const steps = 18;
    for (let i = 0; i <= steps; i++) {
      const tt = (i / steps) * t;
      const mt = 1 - tt;
      pts.push({
        x: mt*mt*mt*x1 + 3*mt*mt*tt*cx1 + 3*mt*tt*tt*cx2 + tt*tt*tt*x2,
        y: mt*mt*mt*y1 + 3*mt*mt*tt*cy1 + 3*mt*tt*tt*cy2 + tt*tt*tt*y2
      });
    }
    return pts;
  }

  /* ============================================================
     COLOR HELPERS
  ============================================================ */
  function lighten(hex, amt) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
  }
  function darken(hex, amt) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
  }
  function interpolateColor(c1, c2, t) {
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  /* ============================================================
     GAME LOGIC
  ============================================================ */
  function startGame() {
    state   = 'playing';
    clicks  = 0;
    timeLeft= GAME_DURATION;
    bobbinFullness = 0;
    spinSpeed= 0;
    bobbinAngle= 0;
    yarnStrands= [];
    lastTs  = 0;

    timerDisplay.textContent = GAME_DURATION;
    timerDisplay.classList.remove('urgent');
    clickDisplay.textContent = '0';
    progressBar.style.width  = '0%';
    progressLabel.textContent= '0%';

    showScreen('playing');

    timerInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.textContent = timeLeft;
      if (timeLeft <= 5) timerDisplay.classList.add('urgent');
      if (timeLeft <= 0) endGame();
    }, 1000);

    raf = requestAnimationFrame(ts => { lastTs = ts; gameLoop(ts); });
  }

  function endGame() {
    state = 'end';
    clearInterval(timerInterval);
    cancelAnimationFrame(raf);

    const pct   = Math.round(bobbinFullness * 100);
    const grade = getGrade(pct);
    const cps   = (clicks / GAME_DURATION).toFixed(1);

    gradeLetter.textContent   = grade;
    finalPercent.textContent  = pct + '%';
    finalClicks.textContent   = clicks;
    finalCPS.textContent      = cps;
    finalRank.textContent     = grade;
    endMessage.textContent    = gradeMessages[grade];
    drawGradeRing(pct);

    showScreen('end');
  }

  function handleClick(clientX, clientY) {
    if (state !== 'playing') return;

    // detect tap roughly anywhere on game screen
    clicks++;
    spinSpeed = Math.min(22, spinSpeed + 3.5);
    bobbinFullness = Math.min(1, clicks / MAX_CLICKS);

    // yarn strand
    const W = gameCanvas.width, H = gameCanvas.height;
    yarnStrands.push({
      startY: H/2 + (Math.random()-0.5) * 80,
      endY:   H/2 + (Math.random()-0.5) * 60,
      life: 1,
      progress: 0
    });
    if (yarnStrands.length > 12) yarnStrands.shift();

    // update UI
    clickDisplay.textContent = clicks;
    const pct = Math.round(bobbinFullness * 100);
    progressBar.style.width   = pct + '%';
    progressLabel.textContent = pct + '%';

    // floating +1 particle
    spawnParticle(clientX, clientY);
  }

  /* ============================================================
     PARTICLE
  ============================================================ */
  function spawnParticle(x, y) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = '+1';
    el.style.left = (x - 14) + 'px';
    el.style.top  = (y - 14) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  /* ============================================================
     EVENT LISTENERS
  ============================================================ */
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', () => {
    showScreen('start');
    state = 'start';
    requestAnimationFrame(drawPreview);
  });

  // game canvas — mouse
  gameCanvas.addEventListener('click', e => {
    e.preventDefault();
    handleClick(e.clientX, e.clientY);
  });
  // game canvas — touch
  gameCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      handleClick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
    }
  }, { passive: false });

  // also allow tapping anywhere on game screen body area
  gameScreen.addEventListener('click', e => {
    if (e.target === gameCanvas) return; // already handled
    handleClick(e.clientX, e.clientY);
  });
  gameScreen.addEventListener('touchstart', e => {
    if (e.target === gameCanvas) return;
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      handleClick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
    }
  }, { passive: false });

  /* ============================================================
     CANVAS RESIZE
  ============================================================ */
  function resizeCanvases() {
    // game canvas — keep 840x540 logical, scale via CSS
    const maxW = Math.min(window.innerWidth - 40, 420);
    gameCanvas.style.width  = maxW + 'px';
    gameCanvas.style.height = Math.round(maxW * 540/840) + 'px';
  }
  window.addEventListener('resize', resizeCanvases);
  resizeCanvases();

})();
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
