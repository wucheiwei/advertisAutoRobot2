<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>寶石翻翻樂｜配對解鎖珠寶驚喜</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  :root {
    --bg: #0d0818; --surface: rgba(255,255,255,0.05);
    --gold: #f5c542; --purple: #9b59b6; --pink: #e91e8c;
    --text: #f0e8ff; --dim: rgba(240,232,255,0.5);
    --card-back: linear-gradient(135deg, #1a0a3a, #2d1060);
    --card-border: rgba(155,89,182,0.4);
  }
  body {
    font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
    background: radial-gradient(ellipse at 50% -10%, #2a0a5a 0%, #0d0818 65%);
    color: var(--text); min-height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 0 32px;
  }

  /* ── Header ── */
  .header { width: 100%; padding: 22px 20px 0; text-align: center; }
  .brand { font-size: 13px; letter-spacing: 0.3em; color: var(--gold); opacity: 0.8; }
  .headline {
    font-size: clamp(22px, 6.5vw, 36px); font-weight: 900; margin-top: 6px;
    background: linear-gradient(135deg, #f5c542, #e91e8c, #9b59b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sub { font-size: 13px; color: var(--dim); margin-top: 6px; }

  /* ── Status bar ── */
  .status-bar {
    margin: 18px auto 0; width: min(380px, 94vw);
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(155,89,182,0.25);
    border-radius: 12px; padding: 10px 16px;
  }
  .status-item { text-align: center; }
  .status-val { font-size: 22px; font-weight: 900; color: var(--gold); }
  .status-label { font-size: 11px; color: var(--dim); margin-top: 1px; }
  .timer-val { color: #ff6eb4; }
  .timer-val.urgent { animation: urgentPulse 0.5s ease-in-out infinite; }
  @keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Grid ── */
  .grid-wrap { margin: 16px auto 0; width: min(380px, 94vw); }
  .card-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  /* ── Cards ── */
  .card { aspect-ratio: 3/4; perspective: 600px; cursor: pointer; }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(0.4,0,0.2,1);
    border-radius: 10px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card.matched .card-front { box-shadow: 0 0 18px var(--match-glow, rgba(245,197,66,0.7)); }

  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back {
    background: var(--card-back);
    border: 1.5px solid var(--card-border);
    font-size: clamp(22px, 6vw, 28px);
    box-shadow: inset 0 0 20px rgba(155,89,182,0.15);
  }
  .card-back::after {
    content: '💎';
    font-size: 60%;
    opacity: 0.25;
  }
  .card-front {
    background: #fff; transform: rotateY(180deg);
    border: 1.5px solid rgba(245,197,66,0.4);
    font-size: clamp(28px, 8vw, 36px);
  }

  /* ── Message overlay ── */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(13,8,24,0.88); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .overlay-icon { font-size: 64px; margin-bottom: 16px; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes bounceIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .overlay-title { font-size: clamp(24px,7vw,38px); font-weight: 900; color: var(--gold); }
  .overlay-sub { font-size: 15px; color: var(--dim); margin-top: 10px; line-height: 1.5; }
  .overlay-prize {
    margin: 20px 0;
    background: rgba(245,197,66,0.1); border: 1px solid rgba(245,197,66,0.3);
    border-radius: 16px; padding: 18px 28px;
  }
  .overlay-prize-emoji { font-size: 42px; }
  .overlay-prize-text { font-size: 17px; font-weight: 700; color: var(--gold); margin-top: 8px; }
  .overlay-prize-desc { font-size: 13px; color: var(--dim); margin-top: 4px; }
  .overlay-btn {
    margin-top: 20px; background: linear-gradient(135deg, var(--gold), var(--pink));
    color: #1a0030; font-weight: 900; font-size: 16px;
    padding: 15px 40px; border-radius: 100px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,197,66,0.35); transition: transform 0.15s;
  }
  .overlay-btn:active { transform: scale(0.97); }
  .overlay-retry {
    margin-top: 12px; background: transparent;
    border: 1px solid rgba(155,89,182,0.5); color: var(--purple);
    font-size: 14px; padding: 10px 28px; border-radius: 100px; cursor: pointer;
  }

  /* ── Hint row ── */
  .hint-row { margin: 14px auto 0; width: min(380px,94vw); text-align: center; font-size: 13px; color: var(--dim); min-height: 20px; }

  /* ── Particle canvas ── */
  #particleCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* ── Floating gems bg ── */
  .gems-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-gem { position: absolute; font-size: 18px; opacity: 0.06; animation: floatGem linear infinite; }
  @keyframes floatGem { 0%{transform:translateY(110vh) rotate(0deg)} 100%{transform:translateY(-20vh) rotate(360deg)} }
</style>
</head>
<body>

<div class="gems-bg" id="gemsBg"></div>
<canvas id="particleCanvas"></canvas>

<header class="header">
  <div class="brand">💎 Lumière Jewels</div>
  <h1 class="headline">寶石翻翻樂</h1>
  <p class="sub">配對所有寶石・解鎖你的珠寶驚喜</p>
</header>

<div class="status-bar">
  <div class="status-item">
    <div class="status-val" id="scoreVal">0</div>
    <div class="status-label">得分</div>
  </div>
  <div class="status-item">
    <div class="status-val timer-val" id="timerVal">60</div>
    <div class="status-label">秒</div>
  </div>
  <div class="status-item">
    <div class="status-val" id="pairsVal">0/8</div>
    <div class="status-label">配對</div>
  </div>
</div>

<div class="grid-wrap">
  <div class="card-grid" id="cardGrid"></div>
</div>
<div class="hint-row" id="hintRow">🎯 翻開兩張相同的寶石即可配對！</div>

<!-- Win overlay -->
<div class="overlay" id="winOverlay">
  <div class="overlay-icon">🏆</div>
  <div class="overlay-title">完美配對！</div>
  <div class="overlay-sub">你在 <span id="winTime">0</span> 秒內配對完成，獲得：</div>
  <div class="overlay-prize">
    <div class="overlay-prize-emoji" id="winPrizeEmoji">💎</div>
    <div class="overlay-prize-text" id="winPrizeText"></div>
    <div class="overlay-prize-desc" id="winPrizeDesc"></div>
  </div>
  <button class="overlay-btn" id="winCtaBtn">立即兌換獎品</button>
  <button class="overlay-retry" id="winRetryBtn">再玩一次</button>
</div>

<!-- Lose overlay -->
<div class="overlay" id="loseOverlay">
  <div class="overlay-icon">⏰</div>
  <div class="overlay-title">時間到！</div>
  <div class="overlay-sub" id="loseDesc">還差一點點就完成了！</div>
  <button class="overlay-btn" id="loseRetryBtn" style="margin-top:28px">再挑戰一次</button>
  <button class="overlay-retry" id="loseCtaBtn">領取安慰獎</button>
</div>

<script>
(function(){
  /* ── Config ── */
  const GEMS = ['💎','🔴','💚','💙','🟡','🟠','🟣','⚪'];
  const TOTAL_TIME = 60;

  const PRIZES = [
    { emoji:'💍', text:'鑽石項鍊 9 折券', desc:'單件消費 $5,000 以上適用・效期 30 天' },
    { emoji:'💎', text:'寶石手鍊兌換券', desc:'精選款式隨機・門市限量領取' },
    { emoji:'✨', text:'VIP 鑑賞會邀請', desc:'2027 春季新品發表・限額入場' },
    { emoji:'🎁', text:'精美珠寶盒乙份', desc:'含品牌禮品・門市憑券換取' },
  ];

  /* ── State ── */
  let cards = [];
  let flipped = [];
  let matched = 0;
  let score = 0;
  let timeLeft = TOTAL_TIME;
  let timerId = null;
  let busy = false;
  let gameActive = false;
  let startTime = null;

  /* ── Floating bg gems ── */
  const gbg = document.getElementById('gemsBg');
  GEMS.concat(['💍','✨','🌟']).forEach(g=>{
    for(let i=0;i<2;i++){
      const d=document.createElement('div'); d.className='bg-gem'; d.textContent=g;
      d.style.cssText=`left:${Math.random()*100}%;animation-duration:${12+Math.random()*20}s;animation-delay:-${Math.random()*20}s;`;
      gbg.appendChild(d);
    }
  });

  /* ── Particle canvas ── */
  const pc = document.getElementById('particleCanvas');
  const pctx = pc.getContext('2d');
  let particles = [];
  function resizePc(){ pc.width=window.innerWidth; pc.height=window.innerHeight; }
  resizePc(); window.addEventListener('resize',resizePc);

  function spawnParticles(x,y,color){
    for(let i=0;i<24;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=2+Math.random()*4;
      particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2, r:3+Math.random()*4, life:60, color });
    }
    if(!animPId) animParticles();
  }
  let animPId=null;
  function animParticles(){
    pctx.clearRect(0,0,pc.width,pc.height);
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--;
      pctx.save(); pctx.globalAlpha=p.life/60;
      pctx.fillStyle=p.color; pctx.beginPath();
      pctx.arc(p.x,p.y,p.r,0,Math.PI*2); pctx.fill();
      pctx.restore();
    }
    animPId=particles.length?requestAnimationFrame(animParticles):null;
  }

  /* ── Build grid ── */
  function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

  function buildGrid(){
    const grid=document.getElementById('cardGrid');
    grid.innerHTML='';
    cards=[];
    const pairs=shuffle([...GEMS,...GEMS]);
    pairs.forEach((gem,idx)=>{
      const card=document.createElement('div'); card.className='card';
      card.innerHTML=`<div class="card-inner"><div class="card-back"></div><div class="card-front">${gem}</div></div>`;
      card.dataset.gem=gem; card.dataset.idx=idx;
      card.addEventListener('click',()=>onCardClick(card));
      grid.appendChild(card);
      cards.push(card);
    });
  }

  /* ── Game logic ── */
  function startGame(){
    matched=0; score=0; timeLeft=TOTAL_TIME; flipped=[]; busy=false; gameActive=true;
    startTime=Date.now();
    document.getElementById('scoreVal').textContent='0';
    document.getElementById('timerVal').textContent=TOTAL_TIME;
    document.getElementById('timerVal').classList.remove('urgent');
    document.getElementById('pairsVal').textContent='0/8';
    document.getElementById('hintRow').textContent='🎯 翻開兩張相同的寶石即可配對！';
    document.getElementById('winOverlay').classList.remove('show');
    document.getElementById('loseOverlay').classList.remove('show');
    buildGrid();
    if(timerId) clearInterval(timerId);
    timerId=setInterval(tick,1000);
  }

  function tick(){
    timeLeft--;
    const tv=document.getElementById('timerVal');
    tv.textContent=timeLeft;
    if(timeLeft<=10) tv.classList.add('urgent');
    if(timeLeft<=0){ clearInterval(timerId); endGame(false); }
  }

  function onCardClick(card){
    if(!gameActive||busy) return;
    if(card.classList.contains('flipped')||card.classList.contains('matched')) return;
    if(flipped.length>=2) return;
    card.classList.add('flipped');
    flipped.push(card);
    if(flipped.length===2) checkMatch();
  }

  function checkMatch(){
    busy=true;
    const [a,b]=flipped;
    if(a.dataset.gem===b.dataset.gem){
      // Match!
      setTimeout(()=>{
        a.classList.add('matched'); b.classList.add('matched');
        const colors=['#f5c542','#e91e8c','#9b59b6','#00e5ff'];
        const color=colors[Math.floor(Math.random()*colors.length)];
        a.style.setProperty('--match-glow',color+'b0'); b.style.setProperty('--match-glow',color+'b0');
        // Particles at card center
        const r=b.getBoundingClientRect();
        spawnParticles(r.left+r.width/2,r.top+r.height/2,color);
        matched++; score+=100+Math.floor(timeLeft*2);
        document.getElementById('scoreVal').textContent=score;
        document.getElementById('pairsVal').textContent=`${matched}/8`;
        document.getElementById('hintRow').textContent=matched<8?`✅ 配對成功！還剩 ${8-matched} 組`:'';
        flipped=[]; busy=false;
        if(matched===8){ clearInterval(timerId); setTimeout(()=>endGame(true),600); }
      },400);
    } else {
      // No match
      document.getElementById('hintRow').textContent='❌ 不一樣，再試一次！';
      setTimeout(()=>{
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped=[]; busy=false;
        document.getElementById('hintRow').textContent='🎯 繼續翻牌尋找配對！';
      },900);
    }
  }

  function endGame(win){
    gameActive=false;
    if(win){
      const elapsed=Math.floor((Date.now()-startTime)/1000);
      const prize=PRIZES[Math.floor(Math.random()*PRIZES.length)];
      document.getElementById('winTime').textContent=elapsed;
      document.getElementById('winPrizeEmoji').textContent=prize.emoji;
      document.getElementById('winPrizeText').textContent=prize.text;
      document.getElementById('winPrizeDesc').textContent=prize.desc;
      document.getElementById('winOverlay').classList.add('show');
    } else {
      const pct=Math.floor(matched/8*100);
      document.getElementById('loseDesc').textContent=
        matched===0 ? '下次一定可以！快再試一次吧 💪' :
        `你配對了 ${matched}/8 組（${pct}%），再接再厲！`;
      document.getElementById('loseOverlay').classList.add('show');
    }
  }

  /* ── Buttons ── */
  document.getElementById('winCtaBtn').addEventListener('click',()=>{
    alert('💎 恭喜！\n\n請截圖此畫面至 Lumière Jewels 門市出示以兌換獎品。\n\n感謝您的參與！');
  });
  document.getElementById('winRetryBtn').addEventListener('click',startGame);
  document.getElementById('loseRetryBtn').addEventListener('click',startGame);
  document.getElementById('loseCtaBtn').addEventListener('click',()=>{
    alert('🎁 安慰獎：\n\n憑此畫面至門市享購物 95 折優惠\n\n再次感謝您的參與！');
  });

  /* ── Start ── */
  startGame();

})();
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
</body>
</html>
