<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>雲頂咖啡 — 疊到雲端的咖啡塔</title>
<meta name="description" content="雲頂咖啡 CLOUDTOP 互動小遊戲:點一下,把咖啡杯一層層疊到雲端,完美對齊有驚喜!" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#fff7ec; --coffee:#3a2417; --caramel:#c98a4b; --latte:#e7c8a0;
    --sky1:#aee3f5; --sky2:#dff3fb; --gold:#ffb454; --ink:#2c1a0f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:#0c1622;color:var(--ink);overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
  }
  #stage{
    position:fixed;inset:0;margin:auto;
    width:min(100vw,480px);height:100%;
    background:linear-gradient(180deg,#7ec8e3 0%,var(--sky1) 35%,var(--sky2) 100%);
    overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.4);
  }
  canvas{display:block;width:100%;height:100%}

  /* ===== HUD ===== */
  #hud{position:absolute;inset:0;pointer-events:none}
  .brand{
    position:absolute;top:env(safe-area-inset-top,0);left:0;right:0;
    padding:14px 16px 0;display:flex;align-items:center;gap:9px;
  }
  .logo{
    width:34px;height:34px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 32% 30%,#5a3a26,#2a1810);
    display:grid;place-items:center;box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  .logo svg{width:20px;height:20px}
  .brand b{font-family:"Sora","Noto Sans TC";font-size:17px;color:#fff;letter-spacing:.5px;
    text-shadow:0 2px 6px rgba(0,0,0,.35)}
  .brand span{font-size:11px;color:#fff;opacity:.85;font-weight:500}

  #scorewrap{position:absolute;top:64px;left:0;right:0;text-align:center;
    transition:opacity .3s}
  #score{font-family:"Sora";font-size:64px;font-weight:800;color:#fff;
    line-height:1;text-shadow:0 4px 14px rgba(0,0,0,.28)}
  #scorelabel{font-size:13px;color:#fff;opacity:.9;letter-spacing:3px;margin-top:2px}
  #combo{font-size:14px;font-weight:700;color:#fff5d6;margin-top:6px;height:20px;
    text-shadow:0 2px 6px rgba(0,0,0,.3);opacity:0;transition:opacity .2s}

  /* flash 文字 */
  #flash{position:absolute;left:0;right:0;top:46%;text-align:center;
    font-family:"Sora";font-weight:800;font-size:34px;color:var(--gold);
    text-shadow:0 3px 0 #fff,0 6px 16px rgba(0,0,0,.25);
    opacity:0;transform:scale(.7);pointer-events:none}
  @keyframes pop{0%{opacity:0;transform:scale(.5) translateY(10px)}
    25%{opacity:1;transform:scale(1.15) translateY(0)}
    70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1) translateY(-26px)}}
  #flash.show{animation:pop 1s ease-out forwards}

  /* ===== 面板(開始 / 結束) ===== */
  .panel{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;
    padding:30px;pointer-events:auto;
    background:rgba(8,20,30,.34);backdrop-filter:blur(3px);
    transition:opacity .35s;
  }
  .panel.hide{opacity:0;pointer-events:none}
  .card{
    background:var(--cream);border-radius:24px;padding:26px 24px;
    width:100%;max-width:340px;box-shadow:0 20px 50px rgba(0,0,0,.35);
    border:3px solid #fff;
  }
  .kicker{font-size:12px;letter-spacing:4px;color:var(--caramel);font-weight:700}
  .ttl{font-family:"Sora","Noto Sans TC";font-size:27px;font-weight:800;
    color:var(--coffee);margin:6px 0 4px;line-height:1.2}
  .sub{font-size:14px;color:#6b4f3a;line-height:1.7;margin-bottom:6px}
  .big{font-family:"Sora";font-size:60px;font-weight:800;color:var(--caramel);
    line-height:1;margin:8px 0}
  .bigunit{font-size:18px;color:#6b4f3a}
  .rank{display:inline-block;background:var(--coffee);color:#ffe9c7;
    font-weight:700;font-size:13px;padding:5px 14px;border-radius:999px;margin:4px 0 10px}

  .btn{
    display:block;width:100%;border:none;cursor:pointer;font-family:"Noto Sans TC";
    font-weight:700;font-size:17px;padding:15px;border-radius:14px;margin-top:10px;
    transition:transform .08s ease, box-shadow .2s;
  }
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn-primary{background:linear-gradient(135deg,#ff9b3d,#e8732a);color:#fff;
    box-shadow:0 8px 20px rgba(232,115,42,.45)}
  .btn-ghost{background:transparent;color:#8a6c52;font-size:15px;padding:11px;margin-top:4px}
  .hint{font-size:13px;color:#8a6c52;margin-top:14px;display:flex;align-items:center;
    justify-content:center;gap:7px}
  .tap{width:26px;height:26px;animation:tap 1.3s ease-in-out infinite}
  @keyframes tap{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .promo{font-size:13px;background:#fff1dd;color:#a85c1e;border-radius:10px;
    padding:8px 10px;margin-top:12px;font-weight:700}

  #toast{position:absolute;left:50%;bottom:34px;
    transform:translateX(-50%) translateY(20px);
    background:var(--coffee);color:#ffe9c7;padding:12px 20px;border-radius:999px;
    font-weight:700;font-size:14px;opacity:0;transition:.35s;pointer-events:none;
    box-shadow:0 10px 24px rgba(0,0,0,.3);white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffd9a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 9h12v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V9z"/>
          <path d="M17 10h2a2 2 0 0 1 0 4h-2"/>
          <path d="M8 3c-.6 1 .6 1.6 0 2.6M12 3c-.6 1 .6 1.6 0 2.6"/>
        </svg>
      </div>
      <div>
        <b>雲頂咖啡</b> <span>CLOUDTOP</span>
      </div>
    </div>

    <div id="scorewrap" style="opacity:0">
      <div id="score">0</div>
      <div id="scorelabel">層 / CUPS</div>
      <div id="combo"></div>
    </div>

    <div id="flash"></div>
  </div>

  <!-- 開始面板 -->
  <div class="panel" id="startPanel">
    <div class="card">
      <div class="kicker">CLOUDTOP · 互動挑戰</div>
      <div class="ttl">疊到雲端的咖啡塔</div>
      <div class="sub">點一下,讓滑動的咖啡杯<br/>穩穩疊上去 ☕<br/>對齊越準,塔越高!</div>
      <div class="promo">🎯 挑戰 20 杯,解鎖「買一送一」優惠碼</div>
      <button class="btn btn-primary" id="startBtn">開始疊杯</button>
      <div class="hint">
        <svg class="tap" viewBox="0 0 24 24" fill="none" stroke="#8a6c52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11V6a2 2 0 0 1 4 0v5"/><path d="M13 11V8a2 2 0 0 1 4 0v3"/><path d="M17 11v-1a2 2 0 0 1 4 0v6a6 6 0 0 1-6 6h-2a7 7 0 0 1-6-3.5L4 16a2 2 0 0 1 3-2.6l2 1.6"/></svg>
        點擊螢幕任意處放下杯子
      </div>
    </div>
  </div>

  <!-- 結束面板 -->
  <div class="panel hide" id="overPanel">
    <div class="card">
      <div class="kicker">挑戰結束</div>
      <div class="ttl" id="overTitle">你的咖啡塔</div>
      <div class="big"><span id="finalScore">0</span><span class="bigunit"> 杯</span></div>
      <div class="rank" id="rankTag">咖啡學徒</div>
      <div class="sub" id="overSub">再來一杯,挑戰更高的雲端!</div>
      <div class="promo" id="promoBox">差一點點就解鎖優惠了,再衝一次!</div>
      <button class="btn btn-primary" id="buyBtn">立即購買 · 買一送一</button>
      <button class="btn btn-ghost" id="retryBtn">↺ 再疊一次</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"></script>
<script>
(function(){
  "use strict";
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // HUD refs
  const scoreEl = document.getElementById('score');
  const scoreWrap = document.getElementById('scorewrap');
  const comboEl = document.getElementById('combo');
  const flashEl = document.getElementById('flash');
  const startPanel = document.getElementById('startPanel');
  const overPanel = document.getElementById('overPanel');
  const toastEl = document.getElementById('toast');

  // ===== 尺寸 / DPR =====
  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = stage.clientWidth; H = stage.clientHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== 遊戲常數 =====
  const BLOCK_H = 34;
  const PERFECT = 6;            // 完美對齊容許像素
  const PALETTE = ['#caa472','#b98a52','#d9b687','#a9784c','#e3c79a','#bf9560'];
  let groundY;                  // 地基底線(world 座標,固定)

  // ===== 狀態 =====
  let state = 'ready';          // ready | playing | over
  let blocks = [];              // {x,w,color}
  let mover = null;             // {x,w,dir,speed,color}
  let debris = [];              // 掉落碎片
  let steam = [];               // 蒸氣粒子
  let clouds = [];
  let camY = 0, camTarget = 0;  // 鏡頭垂直偏移
  let score = 0, combo = 0, best = 0;
  let baseSpeed = 2.0;

  // ===== 音效(Tone.js,首次互動後啟用)=====
  let synth = null, audioReady = false;
  function initAudio(){
    if (audioReady || typeof Tone === 'undefined') return;
    try{
      Tone.start();
      synth = new Tone.Synth({
        oscillator:{type:'triangle'},
        envelope:{attack:0.005,decay:0.15,sustain:0.0,release:0.1}
      }).toDestination();
      synth.volume.value = -8;
      audioReady = true;
    }catch(e){ audioReady = false; }
  }
  const SCALE = ['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5','C6'];
  function note(i, dur){
    if(!audioReady || !synth) return;
    try{ synth.triggerAttackRelease(SCALE[Math.min(i,SCALE.length-1)], dur || '16n'); }catch(e){}
  }
  function sadTone(){
    if(!audioReady || !synth) return;
    try{
      const t = Tone.now();
      synth.triggerAttackRelease('E3','8n',t);
      synth.triggerAttackRelease('C3','8n',t+0.16);
      synth.triggerAttackRelease('G2','4n',t+0.34);
    }catch(e){}
  }

  // ===== 雲朵背景 =====
  function makeCloud(seedY){
    return { x: Math.random()*W, y: seedY!=null?seedY:Math.random()*H,
             s: 0.5+Math.random()*0.9, spd: 0.15+Math.random()*0.25 };
  }
  function initClouds(){ clouds = []; for(let i=0;i<6;i++) clouds.push(makeCloud()); }

  // ===== 初始化一局 =====
  function reset(){
    groundY = H - 90;
    blocks = [];
    const w0 = Math.min(W*0.55, 180);
    blocks.push({ x:(W-w0)/2, w:w0, color:PALETTE[0] });
    debris = []; steam = [];
    camY = 0; camTarget = 0;
    score = 0; combo = 0; baseSpeed = 2.0;
    spawnMover();
    scoreEl.textContent = '0';
    comboEl.style.opacity = '0';
  }

  function spawnMover(){
    const top = blocks[blocks.length-1];
    const fromLeft = blocks.length % 2 === 0;
    const speed = baseSpeed + blocks.length * 0.12;
    mover = {
      x: fromLeft ? -top.w*0.1 : W - top.w*0.9,
      w: top.w,
      dir: fromLeft ? 1 : -1,
      speed: Math.min(speed, 6.5),
      color: PALETTE[blocks.length % PALETTE.length]
    };
  }

  // world Y(從地基往上堆)→ 第 i 層的頂端 y
  function blockTopY(i){ return groundY - (i+1)*BLOCK_H; }

  // ===== 放下杯子 =====
  function drop(){
    if(state !== 'playing' || !mover) return;
    const prev = blocks[blocks.length-1];
    const left = Math.max(prev.x, mover.x);
    const right = Math.min(prev.x + prev.w, mover.x + mover.w);
    const overlap = right - left;

    if(overlap <= 0){
      // 完全沒疊到 → 整杯掉落,結束
      debris.push(fallingPiece(mover.x, blockTopY(blocks.length), mover.w, mover.color, mover.dir));
      note(0,'8n'); sadTone();
      gameOver();
      return;
    }

    const diff = Math.abs(mover.x - prev.x);
    if(diff <= PERFECT){
      // 完美!保留寬度並貼齊
      blocks.push({ x: prev.x, w: prev.w, color: mover.color });
      combo++;
      flash(combo>=3 ? 'PERFECT ×'+combo : 'PERFECT!');
      note(Math.min(3+combo, SCALE.length-1), '8n');
      smallConfetti();
    } else {
      // 切掉懸空部分
      combo = 0;
      // 掉落的碎片
      const overhangLeft = mover.x < prev.x;
      const debrisX = overhangLeft ? mover.x : right;
      const debrisW = mover.w - overlap;
      debris.push(fallingPiece(debrisX, blockTopY(blocks.length), debrisW, mover.color, overhangLeft?-1:1));
      blocks.push({ x:left, w:overlap, color:mover.color });
      note(Math.min(blocks.length, SCALE.length-1));
    }

    score = blocks.length - 1;
    scoreEl.textContent = score;
    bumpScore();
    if(combo>=2){ comboEl.textContent = '🔥 連續完美 '+combo; comboEl.style.opacity='1'; }
    else comboEl.style.opacity='0';

    // 里程碑
    if(score === 10) flash('好高!☁️');
    if(score === 20){ flash('解鎖優惠!🎉'); bigConfetti(); }

    baseSpeed += 0.02;
    // 鏡頭跟隨:讓新的頂端維持在畫面約 38% 高度
    const topY = blockTopY(blocks.length);
    camTarget = Math.max(0, H*0.38 - topY);

    spawnMover();
  }

  function fallingPiece(x,y,w,color,dir){
    return { x, y, w, h:BLOCK_H, color, vx:dir*(1+Math.random()*1.5),
             vy:-1-Math.random()*2, va:(Math.random()-0.5)*0.2, a:0 };
  }

  // ===== 視覺輔助 =====
  let scoreBump = 0;
  function bumpScore(){ scoreBump = 1; }
  function flash(txt){
    flashEl.textContent = txt;
    flashEl.classList.remove('show'); void flashEl.offsetWidth;
    flashEl.classList.add('show');
  }
  function smallConfetti(){
    if(typeof confetti!=='function') return;
    confetti({ particleCount:24, spread:55, startVelocity:32, origin:{y:0.42},
      colors:['#ffb454','#fff','#caa472'], scalar:0.8, ticks:90 });
  }
  function bigConfetti(){
    if(typeof confetti!=='function') return;
    confetti({ particleCount:120, spread:90, startVelocity:45, origin:{y:0.4},
      colors:['#ffb454','#fff7ec','#e8732a','#caa472'] });
  }
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(()=>toastEl.classList.remove('show'),2200);
  }

  // ===== 繪製一個杯子(圓角 + 杯環 + 高光)=====
  function drawCup(x, y, w, color){
    const h = BLOCK_H, r = Math.min(8, w/4);
    if(w<=0) return;
    // 杯身
    const g = ctx.createLinearGradient(x,0,x+w,0);
    g.addColorStop(0, shade(color,-18));
    g.addColorStop(.5, color);
    g.addColorStop(1, shade(color,-26));
    ctx.fillStyle = g;
    roundRect(x, y, w, h, r); ctx.fill();
    // 杯口深色邊
    ctx.fillStyle = shade(color,-34);
    roundRect(x, y, w, 5, {tl:r,tr:r,br:0,bl:0}); ctx.fill();
    // 杯環(中段)
    ctx.fillStyle = 'rgba(255,255,255,.16)';
    ctx.fillRect(x+2, y+h*0.55, w-4, 4);
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    roundRect(x+3, y+7, Math.max(3,w*0.16), h-12, 3); ctx.fill();
  }
  function roundRect(x,y,w,h,r){
    if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r};
    ctx.beginPath();
    ctx.moveTo(x+r.tl,y);
    ctx.lineTo(x+w-r.tr,y); ctx.arcTo(x+w,y,x+w,y+r.tr,r.tr);
    ctx.lineTo(x+w,y+h-r.br); ctx.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);
    ctx.lineTo(x+r.bl,y+h); ctx.arcTo(x,y+h,x,y+h-r.bl,r.bl);
    ctx.lineTo(x,y+r.tl); ctx.arcTo(x,y,x+r.tl,y,r.tl);
    ctx.closePath();
  }
  function shade(hex, amt){
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+(0x1000000+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  function drawCloud(c){
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffffff';
    const s = c.s*30;
    ctx.beginPath();
    ctx.arc(c.x, c.y, s, 0, Math.PI*2);
    ctx.arc(c.x+s*0.9, c.y+6, s*0.8, 0, Math.PI*2);
    ctx.arc(c.x-s*0.9, c.y+6, s*0.7, 0, Math.PI*2);
    ctx.arc(c.x, c.y+10, s*1.1, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ===== 主迴圈 =====
  let last = performance.now();
  function loop(now){
    const dt = Math.min((now-last)/16.67, 3); last = now;

    // 背景雲(不受鏡頭影響,慢慢飄)
    ctx.clearRect(0,0,W,H);
    for(const c of clouds){
      c.x += c.spd*dt;
      if(c.x - 60 > W) { c.x = -60; c.y = Math.random()*H*0.7; }
      drawCloud(c);
    }
    // 遠處陽光暈
    const sun = ctx.createRadialGradient(W*0.78,70,10,W*0.78,70,160);
    sun.addColorStop(0,'rgba(255,236,180,.65)');
    sun.addColorStop(1,'rgba(255,236,180,0)');
    ctx.fillStyle = sun; ctx.fillRect(0,0,W,180);

    // 鏡頭平滑
    camY += (camTarget - camY) * 0.08 * dt;

    ctx.save();
    ctx.translate(0, camY);

    // 地基陰影
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    ctx.beginPath();
    ctx.ellipse(W/2, groundY+BLOCK_H+10, blocks[0]? blocks[0].w*0.7:90, 12, 0,0,Math.PI*2);
    ctx.fill();

    // 已疊好的杯子
    for(let i=0;i<blocks.length;i++){
      const b = blocks[i];
      drawCup(b.x, blockTopY(i), b.w, b.color);
    }

    // 移動中的杯子
    if(state==='playing' && mover){
      mover.x += mover.dir * mover.speed * dt;
      const margin = 6;
      if(mover.x < -mover.w*0.15){ mover.x=-mover.w*0.15; mover.dir=1; }
      if(mover.x + mover.w > W+mover.w*0.15){ mover.x = W+mover.w*0.15 - mover.w; mover.dir=-1; }
      drawCup(mover.x, blockTopY(blocks.length), mover.w, mover.color);
      // 蒸氣
      if(Math.random()<0.25){
        steam.push({x:mover.x+mover.w/2+(Math.random()-0.5)*mover.w*0.4,
          y:blockTopY(blocks.length)-2, a:0.6, vy:-0.6-Math.random()*0.4,
          r:3+Math.random()*3});
      }
    }

    // 蒸氣更新
    ctx.fillStyle='rgba(255,255,255,1)';
    for(let i=steam.length-1;i>=0;i--){
      const s=steam[i]; s.y+=s.vy*dt; s.a-=0.012*dt; s.r+=0.05*dt;
      if(s.a<=0){ steam.splice(i,1); continue; }
      ctx.globalAlpha=s.a*0.5; ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // 掉落碎片
    for(let i=debris.length-1;i>=0;i--){
      const d=debris[i];
      d.vy+=0.4*dt; d.x+=d.vx*dt; d.y+=d.vy*dt; d.a+=d.va*dt;
      ctx.save();
      ctx.translate(d.x+d.w/2, d.y+d.h/2); ctx.rotate(d.a);
      drawCup(-d.w/2,-d.h/2,d.w,d.color);
      ctx.restore();
      if(d.y - camY > H+80) debris.splice(i,1);
    }

    ctx.restore();

    // score bump
    if(scoreBump>0){
      scoreBump -= 0.06*dt; if(scoreBump<0) scoreBump=0;
      scoreEl.style.transform = 'scale('+(1+scoreBump*0.18)+')';
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ===== 流程 =====
  function startGame(){
    initAudio();
    reset();
    state = 'playing';
    startPanel.classList.add('hide');
    overPanel.classList.add('hide');
    scoreWrap.style.opacity = '1';
  }

  function gameOver(){
    state = 'over';
    scoreWrap.style.opacity = '0';
    best = Math.max(best, score);
    document.getElementById('finalScore').textContent = score;

    let rank, sub;
    if(score>=20){ rank='☁️ 雲端大師'; sub='你把咖啡塔疊上雲端了!太厲害了!'; }
    else if(score>=12){ rank='✨ 咖啡達人'; sub='手感絕佳!再一點就摸到雲了。'; }
    else if(score>=6){ rank='☕ 熟練咖啡師'; sub='穩定發揮,雲端在向你招手!'; }
    else { rank='🔰 咖啡學徒'; sub='別灰心,再來一杯熱熱身!'; }
    document.getElementById('rankTag').textContent = rank;
    document.getElementById('overSub').textContent = sub;

    const promo = document.getElementById('promoBox');
    if(score>=20){
      promo.innerHTML = '🎁 優惠碼 <b>CLOUD20</b> · 結帳享買一送一';
    } else {
      promo.textContent = '差 '+(20-score)+' 杯解鎖「買一送一」,再衝一次!';
    }
    overPanel.classList.remove('hide');
  }

  function doBuy(){
    bigConfetti();
    toast('☕ 已加入購物車 · 買一送一已套用!');
  }

  // ===== 輸入 =====
  function onAction(e){
    if(state==='playing'){ e.preventDefault(); drop(); }
  }
  stage.addEventListener('pointerdown', onAction);
  window.addEventListener('keydown', function(e){
    if(e.code==='Space' || e.code==='Enter'){
      e.preventDefault();
      if(state==='ready') startGame();
      else if(state==='playing') drop();
    }
  });

  document.getElementById('startBtn').addEventListener('click', function(e){ e.stopPropagation(); startGame(); });
  document.getElementById('retryBtn').addEventListener('click', function(e){ e.stopPropagation(); startGame(); });
  document.getElementById('buyBtn').addEventListener('click', function(e){ e.stopPropagation(); doBuy(); });

  // 預先佈置畫面(ready 狀態也有畫面)
  initClouds();
  reset();
  state = 'ready';
})();
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
