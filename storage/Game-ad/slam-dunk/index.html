<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FLASH SPORT 灌籃挑戰賽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@400;500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#ff6a1a; --orange-hi:#ff9a3c; --ember:#ff2d12;
    --gold:#ffc534; --cyan:#16e6c8; --cyan-hi:#7ffff0;
    --line:#ffe39a; --ink:#06080f;
    --glass:rgba(15,20,34,.55);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:#000; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }
  #gameWrapper{
    position:fixed; inset:0; margin:auto; overflow:hidden;
    width:min(100vw,440px); height:100%; max-height:100dvh;
    background:#05060c; touch-action:none;
    box-shadow:0 0 90px rgba(0,0,0,.6);
  }

  /* ===== world (shake target) ===== */
  #scene{ position:absolute; inset:0; will-change:transform; }

  .bg-crowd{
    position:absolute; inset:-8%;
    background:url('https://images.unsplash.com/photo-1546519638-68e109498ffc?w=1000&q=80') center 26%/cover no-repeat;
    filter:blur(8px) brightness(.30) saturate(.8); transform:scale(1.1);
  }
  .bg-grad{
    position:absolute; inset:0;
    background:
      radial-gradient(120% 70% at 50% 8%, rgba(40,60,110,.55), transparent 55%),
      radial-gradient(90% 55% at 50% 40%, rgba(255,150,60,.10), transparent 60%),
      linear-gradient(180deg, rgba(4,6,14,.2) 0%, rgba(4,6,14,.0) 30%, rgba(8,5,4,.55) 78%, rgba(10,4,2,.92) 100%);
  }
  .vignette{ position:absolute; inset:0; box-shadow:inset 0 0 140px 30px rgba(0,0,0,.7); pointer-events:none; }
  .beam{ position:absolute; top:-60px; width:190px; height:560px;
    background:linear-gradient(180deg, rgba(255,228,180,.16), transparent 65%);
    filter:blur(16px); transform-origin:top center; pointer-events:none; mix-blend-mode:screen; }
  .beam.l{ left:2%; transform:rotate(15deg); }
  .beam.r{ right:2%; transform:rotate(-15deg); }

  /* court */
  #court{
    position:absolute; left:0; right:0; bottom:0; height:230px;
    transform:perspective(360px) rotateX(56deg);
    transform-origin:50% 100%;
  }
  #court canvas{ display:block; width:100%; height:100%; }
  .court-fade{
    position:absolute; left:0; right:0; bottom:158px; height:120px;
    background:linear-gradient(180deg, transparent, rgba(7,6,12,.0) 30%, rgba(7,6,12,.55) 100%);
    pointer-events:none;
  }

  /* ===== hoop ===== */
  #hoopGroup{ position:absolute; top:96px; left:50%; transform:translateX(-50%); width:150px; z-index:8; }
  .backboard{
    position:relative; width:118px; height:74px; margin:0 auto;
    background:linear-gradient(160deg, rgba(150,180,220,.20), rgba(40,55,80,.12));
    border:2px solid rgba(220,235,255,.55);
    border-radius:5px;
    box-shadow:0 0 22px rgba(120,170,255,.18), inset 0 0 26px rgba(180,210,255,.10);
    backdrop-filter:blur(1px);
  }
  .bb-square{
    position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
    width:42px; height:30px; border:3px solid var(--orange); border-radius:2px;
    box-shadow:0 0 8px rgba(255,106,26,.6);
  }
  .bb-logo{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    font-family:"Anton"; font-size:10px; letter-spacing:1px; white-space:nowrap; color:rgba(255,255,255,.7);
  }
  .bb-logo b{ color:var(--orange); }
  .mount{ width:5px; height:14px; margin:-1px auto 0; background:linear-gradient(#cfd6e0,#6a727f); }

  .rim-wrap{ position:relative; width:106px; height:34px; margin:0 auto; }
  .rim-back, .rim-front{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .rim-back{ z-index:7; }
  .net-svg{ position:absolute; left:50%; top:14px; transform:translateX(-50%); width:106px; height:50px; z-index:9; overflow:visible; }
  .net-svg path{ transition:none; }
  .net-swing{ animation:netSwing .55s cubic-bezier(.3,1.4,.5,1); transform-origin:50% 0; }
  @keyframes netSwing{
    0%{ transform:translateX(-50%) scaleY(1); }
    32%{ transform:translateX(-50%) scaleY(1.22) translateY(3px); }
    65%{ transform:translateX(-50%) scaleY(.96); }
    100%{ transform:translateX(-50%) scaleY(1); }
  }
  .rim-front{ z-index:13; }
  #rimSensor{ position:absolute; left:50%; top:13px; transform:translateX(-50%); width:90px; height:6px; }

  /* ===== ball ===== */
  #ball{
    position:absolute; width:50px; height:50px; z-index:12;
    cursor:grab; touch-action:none; will-change:transform,left,top;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.45));
  }
  #ball canvas{ width:100%; height:100%; display:block; }
  #ball.dragging{ cursor:grabbing; }
  #ball.bob{ animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ filter:drop-shadow(0 6px 8px rgba(0,0,0,.45)); } 50%{ filter:drop-shadow(0 12px 10px rgba(0,0,0,.35)) brightness(1.06); } }
  #ball.fire{ filter:drop-shadow(0 0 14px rgba(255,90,20,.9)) drop-shadow(0 6px 8px rgba(0,0,0,.4)); }

  #fxCanvas{ position:absolute; inset:0; z-index:11; pointer-events:none; }
  #aim{ position:absolute; inset:0; z-index:10; pointer-events:none; }
  .traj-dot{ position:absolute; border-radius:50%; transform:translate(-50%,-50%);
    background:var(--gold); box-shadow:0 0 6px rgba(255,197,52,.8); }

  .crowd-flash{ position:absolute; inset:0; z-index:6; pointer-events:none; opacity:0; transition:opacity .1s ease-out;
    background:radial-gradient(circle at 50% 30%, rgba(255,212,140,.42), rgba(255,150,60,.14) 42%, transparent 72%); }
  .crowd-flash.on{ opacity:1; }

  /* ===== HUD ===== */
  #hud{ position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:max(12px,env(safe-area-inset-top)) 12px 0; }
  .jum{ background:var(--glass); border:1px solid rgba(255,255,255,.10); border-radius:12px;
    padding:5px 14px 6px; text-align:center; backdrop-filter:blur(6px);
    box-shadow:0 6px 18px rgba(0,0,0,.4), inset 0 0 10px rgba(255,255,255,.04); min-width:74px; }
  .jum .lab{ font-family:"Teko"; font-size:13px; line-height:1; letter-spacing:2px; color:rgba(255,255,255,.55); }
  .jum .val{ font-family:"Teko"; font-weight:700; font-size:38px; line-height:.9; color:var(--gold);
    text-shadow:0 0 14px rgba(255,197,52,.45); font-variant-numeric:tabular-nums; }
  #timeBox .val{ color:#fff; }
  #timeBox.low .val{ color:var(--ember); text-shadow:0 0 14px rgba(255,45,18,.6); }
  .brand{ text-align:center; padding-top:6px; }
  .brand .bolt{ width:18px; height:18px; vertical-align:-3px; filter:drop-shadow(0 0 6px rgba(255,106,26,.8)); }
  .brand .nm{ font-family:"Anton"; font-size:17px; letter-spacing:3px; color:#fff; line-height:1; }
  .brand .nm em{ color:var(--orange); font-style:normal; }
  .brand .tag{ font-family:"Teko"; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.4); }

  /* heat / streak */
  #streak{ position:absolute; top:66px; left:50%; transform:translateX(-50%) scale(.6); z-index:21;
    display:flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px;
    background:linear-gradient(135deg, var(--orange), var(--ember));
    color:#fff; font-family:"Teko"; font-weight:700; font-size:18px; letter-spacing:1px;
    box-shadow:0 0 22px rgba(255,80,20,.7); opacity:0; transition:opacity .25s, transform .25s; white-space:nowrap; }
  #streak.show{ opacity:1; transform:translateX(-50%) scale(1); }
  #streak svg{ width:16px; height:16px; }

  #timerBar{ position:absolute; bottom:0; left:0; height:5px; width:100%; z-index:20;
    background:linear-gradient(90deg,var(--orange),var(--gold)); box-shadow:0 0 10px rgba(255,150,0,.8); transition:width .12s linear; }

  /* swish + popups */
  #swish{ position:absolute; top:46%; left:50%; transform:translate(-50%,-50%) scale(.7); z-index:24;
    font-family:"Anton"; font-size:46px; letter-spacing:2px; color:var(--orange);
    text-shadow:0 0 24px rgba(255,106,26,.9), 0 3px 0 rgba(0,0,0,.3); opacity:0; pointer-events:none; white-space:nowrap; }
  #swish.three{ color:var(--cyan); text-shadow:0 0 26px rgba(22,230,200,.9); }
  #swish.go{ animation:swishPop .7s ease-out; }
  @keyframes swishPop{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.5) rotate(-6deg); }
    25%{ opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(-3deg); }
    70%{ opacity:1; transform:translate(-50%,-50%) scale(1) rotate(-3deg); }
    100%{ opacity:0; transform:translate(-50%,-58%) scale(1) rotate(-3deg); } }

  .pop{ position:absolute; z-index:23; font-family:"Teko"; font-weight:700; font-size:30px;
    color:var(--gold); text-shadow:0 0 12px rgba(255,197,52,.8); pointer-events:none; transform:translate(-50%,-50%);
    animation:floatUp .9s ease-out forwards; }
  .pop.three{ color:var(--cyan); text-shadow:0 0 12px rgba(22,230,200,.8); }
  .pop.time{ color:#8ef58a; text-shadow:0 0 12px rgba(120,255,140,.7); font-size:24px; }
  @keyframes floatUp{ 0%{ opacity:0; transform:translate(-50%,-30%) scale(.6); }
    20%{ opacity:1; transform:translate(-50%,-60%) scale(1.2); }
    100%{ opacity:0; transform:translate(-50%,-160%) scale(.9); } }

  #hint{ position:absolute; bottom:176px; left:50%; transform:translateX(-50%); z-index:18;
    color:rgba(255,255,255,.6); font-family:"Teko"; font-size:18px; letter-spacing:2px;
    display:flex; align-items:center; gap:7px; pointer-events:none; transition:opacity .4s; white-space:nowrap; }
  #hint svg{ width:22px; height:22px; animation:flick 1.4s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{ transform:translate(0,0) rotate(0); } 50%{ transform:translate(-7px,7px) rotate(-8deg); } }
  #hint.hide{ opacity:0; }

  /* ===== overlays ===== */
  .overlay{ position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:0 28px;
    background:radial-gradient(circle at 50% 38%, rgba(18,22,40,.86), rgba(3,4,10,.96));
    opacity:0; pointer-events:none; transition:opacity .45s; }
  .overlay.show{ opacity:1; pointer-events:all; }

  .lock{ display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .lock .bolt{ width:26px; height:26px; filter:drop-shadow(0 0 8px rgba(255,106,26,.9)); }
  .lock .nm{ font-family:"Anton"; font-size:30px; letter-spacing:4px; color:#fff; }
  .lock .nm em{ color:var(--orange); font-style:normal; }
  .o-title{ font-family:"Noto Sans TC"; font-weight:900; font-size:38px; color:#fff; line-height:1.05;
    text-shadow:0 0 30px rgba(255,106,26,.4); margin:6px 0; }
  .o-title b{ color:var(--orange); }
  .o-sub{ font-family:"Teko"; font-size:19px; letter-spacing:1px; color:rgba(255,255,255,.6); margin-bottom:26px; line-height:1.3; }

  .rank{ font-family:"Anton"; font-size:96px; line-height:.85; color:var(--gold);
    text-shadow:0 0 40px rgba(255,197,52,.5); }
  .rank.s{ color:var(--gold); } .rank.a{ color:var(--cyan); } .rank.b{ color:var(--orange-hi); }
  .rank-word{ font-family:"Noto Sans TC"; font-weight:900; font-size:22px; color:#fff; margin-top:2px; letter-spacing:2px; }
  .fin-label{ font-family:"Teko"; font-size:15px; letter-spacing:3px; color:rgba(255,255,255,.45); margin-top:18px; }
  .fin-score{ font-family:"Teko"; font-weight:700; font-size:76px; line-height:.9; color:var(--gold);
    text-shadow:0 0 26px rgba(255,197,52,.5); }
  .stats{ display:flex; gap:24px; margin:14px 0 4px; }
  .stat .n{ font-family:"Teko"; font-weight:700; font-size:30px; color:#fff; line-height:1; }
  .stat .l{ font-family:"Teko"; font-size:13px; letter-spacing:2px; color:rgba(255,255,255,.45); }
  .o-msg{ font-family:"Noto Sans TC"; font-weight:700; font-size:16px; color:#fff; margin:10px 0 22px; }

  .cta{ position:relative; font-family:"Noto Sans TC"; font-weight:900; font-size:17px; letter-spacing:1px;
    color:#fff; border:none; border-radius:32px; padding:15px 40px; cursor:pointer;
    background:linear-gradient(135deg, var(--orange-hi), var(--ember));
    box-shadow:0 8px 26px rgba(255,80,20,.55); overflow:hidden;
    animation:ctaPulse 2.2s ease-in-out infinite; }
  @keyframes ctaPulse{ 0%,100%{ box-shadow:0 8px 26px rgba(255,80,20,.5); } 50%{ box-shadow:0 8px 40px rgba(255,80,20,.85); } }
  .cta::after{ content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(105deg, transparent, rgba(255,255,255,.5), transparent); animation:shine 2.6s linear infinite; }
  @keyframes shine{ 0%{ left:-60%; } 60%,100%{ left:130%; } }
  .cta:active{ transform:scale(.96); }
  .retry{ margin-top:14px; background:none; border:1px solid rgba(255,255,255,.25); color:rgba(255,255,255,.6);
    font-family:"Teko"; font-size:17px; letter-spacing:2px; border-radius:22px; padding:8px 26px; cursor:pointer; }
  .retry:active{ color:#fff; border-color:#fff; }

  .start-btn{ display:flex; align-items:center; gap:9px; }
  .start-btn svg{ width:18px; height:18px; }
</style>
</head>
<body>
<div id="gameWrapper">

  <div id="scene">
    <div class="bg-crowd"></div>
    <div class="bg-grad"></div>
    <div class="beam l"></div>
    <div class="beam r"></div>

    <div id="court"><canvas id="courtCanvas"></canvas></div>
    <div class="court-fade"></div>

    <div class="crowd-flash" id="crowdFlash"></div>

    <!-- hoop -->
    <div id="hoopGroup">
      <div class="backboard">
        <div class="bb-logo"><b>FLASH</b> SPORT</div>
        <div class="bb-square"></div>
      </div>
      <div class="mount"></div>
      <div class="rim-wrap">
        <!-- back of rim (behind ball) -->
        <svg class="rim-back" viewBox="0 0 106 34">
          <path d="M7 17 Q53 1 99 17" fill="none" stroke="#b8430c" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <!-- net -->
        <svg class="net-svg" id="net" viewBox="0 0 106 50"></svg>
        <!-- front of rim (in front of ball) -->
        <svg class="rim-front" viewBox="0 0 106 34">
          <path d="M7 17 Q53 33 99 17" fill="none" stroke="url(#rimg)" stroke-width="5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="rimg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#ff8a2a"/><stop offset=".5" stop-color="#ff5a0a"/><stop offset="1" stop-color="#ff8a2a"/>
            </linearGradient>
          </defs>
        </svg>
        <div id="rimSensor"></div>
      </div>
    </div>

    <canvas id="fxCanvas"></canvas>
    <div id="aim"></div>

    <!-- ball -->
    <div id="ball" class="bob"><canvas id="ballCanvas" width="100" height="100"></canvas></div>

    <!-- swish text -->
    <div id="swish">SWISH!</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="jum" id="scoreBox"><div class="lab">SCORE</div><div class="val" id="scoreNum">0</div></div>
    <div class="brand">
      <div><svg class="bolt" viewBox="0 0 24 24"><path d="M13 2 L4 14 H11 L9 22 L20 9 H13 Z" fill="#ff6a1a"/></svg></div>
      <div class="nm"><em>FLASH</em> SPORT</div>
      <div class="tag">UNLEASH YOUR ENERGY</div>
    </div>
    <div class="jum" id="timeBox"><div class="lab">TIME</div><div class="val" id="timerNum">30</div></div>
  </div>

  <div id="streak"><svg viewBox="0 0 24 24"><path d="M12 2c1 4-2 5-2 8a4 4 0 0 0 8 0c0-2-1-3-1-5 3 2 4 5 4 8a8 8 0 0 1-16 0c0-5 5-7 7-11Z" fill="#ffe39a"/></svg><span id="streakTxt">連續命中</span></div>

  <div id="hint"><svg viewBox="0 0 24 24" fill="none"><path d="M9 11V5a2 2 0 0 1 4 0v6m0-2a2 2 0 0 1 4 0v3m0-1a2 2 0 0 1 4 0v4a6 6 0 0 1-6 6h-2a6 6 0 0 1-5-3l-2-4a1.5 1.5 0 0 1 2.6-1.5L9 14" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>瞄準籃框・向上滑動投籃</div>

  <div id="timerBar"></div>

  <!-- intro -->
  <div class="overlay show" id="intro">
    <div class="lock"><svg class="bolt" viewBox="0 0 24 24"><path d="M13 2 L4 14 H11 L9 22 L20 9 H13 Z" fill="#ff6a1a"/></svg><span class="nm"><em>FLASH</em> SPORT</span></div>
    <div class="o-title">灌籃<b>挑戰賽</b></div>
    <div class="o-sub">30 秒・拖曳出手得分<br>越遠越準・分數越高</div>
    <button class="cta start-btn" id="startBtn"><svg viewBox="0 0 24 24"><path d="M6 4 L20 12 L6 20 Z" fill="#fff"/></svg>開始挑戰</button>
  </div>

  <!-- result -->
  <div class="overlay" id="result">
    <div class="lock"><svg class="bolt" viewBox="0 0 24 24"><path d="M13 2 L4 14 H11 L9 22 L20 9 H13 Z" fill="#ff6a1a"/></svg><span class="nm"><em>FLASH</em> SPORT</span></div>
    <div class="rank" id="rankLetter">B</div>
    <div class="rank-word" id="rankWord">先發球員</div>
    <div class="fin-label">最終得分</div>
    <div class="fin-score" id="finalScore">0</div>
    <div class="stats">
      <div class="stat"><div class="n" id="accNum">0%</div><div class="l">命中率</div></div>
      <div class="stat"><div class="n" id="bestNum">0</div><div class="l">最佳連擊</div></div>
    </div>
    <div class="o-msg" id="resultMsg">爆發你的潛能，每滴汗水都算數。</div>
    <button class="cta" id="ctaBtn">立即補充能量 →</button>
    <button class="retry" id="retryBtn">再挑戰一次</button>
  </div>

</div>

<script>
(function(){
  const wrapper = document.getElementById('gameWrapper');
  const scene   = document.getElementById('scene');
  let W = wrapper.clientWidth, H = wrapper.clientHeight;

  /* ---------- tunables ---------- */
  const G=0.46, POWER_MULT=0.142, MAX_POWER=205, REST=0.46;
  const BALL=50, bR=20, START_TIME=30;

  /* ---------- elements ---------- */
  const ballEl=document.getElementById('ball');
  const hoopGroup=document.getElementById('hoopGroup');
  const rimSensor=document.getElementById('rimSensor');
  const netEl=document.getElementById('net');
  const scoreNum=document.getElementById('scoreNum');
  const timerNum=document.getElementById('timerNum');
  const timeBox=document.getElementById('timeBox');
  const timerBar=document.getElementById('timerBar');
  const streakEl=document.getElementById('streak');
  const streakTxt=document.getElementById('streakTxt');
  const swishEl=document.getElementById('swish');
  const hint=document.getElementById('hint');
  const aim=document.getElementById('aim');
  const crowdFlash=document.getElementById('crowdFlash');
  const intro=document.getElementById('intro');
  const result=document.getElementById('result');

  /* ---------- canvases ---------- */
  function fitCanvas(c, w, h){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    c.width=w*dpr; c.height=h*dpr; c.style.width=w+'px'; c.style.height=h+'px';
    const x=c.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); return x;
  }
  const fx=document.getElementById('fxCanvas');
  let fctx=fitCanvas(fx, W, H);

  /* ---------- court render ---------- */
  const courtCanvas=document.getElementById('courtCanvas');
  function drawCourt(){
    const w=W, h=230;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    courtCanvas.width=Math.round(w*dpr); courtCanvas.height=Math.round(h*dpr);
    courtCanvas.style.width='100%'; courtCanvas.style.height='100%';
    const ctx=courtCanvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h);
    // base wood
    const base=ctx.createLinearGradient(0,0,0,h);
    base.addColorStop(0,'#7a4a23'); base.addColorStop(.5,'#a9692f'); base.addColorStop(1,'#c98a4b');
    ctx.fillStyle=base; ctx.fillRect(0,0,w,h);
    // planks
    const pw=24;
    for(let x=0;x<w;x+=pw){
      const g=ctx.createLinearGradient(x,0,x+pw,0);
      g.addColorStop(0,'rgba(60,35,16,.30)'); g.addColorStop(.12,'rgba(255,220,170,.06)');
      g.addColorStop(.5,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(60,35,16,.30)');
      ctx.fillStyle=g; ctx.fillRect(x,0,pw,h);
      ctx.strokeStyle='rgba(40,22,10,.45)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x+.5,0); ctx.lineTo(x+.5,h); ctx.stroke();
      // grain streaks
      ctx.strokeStyle='rgba(70,40,18,.12)'; ctx.lineWidth=1;
      for(let i=0;i<5;i++){ const yy=Math.random()*h; ctx.beginPath(); ctx.moveTo(x+2,yy); ctx.lineTo(x+pw-2, yy+(Math.random()*8-4)); ctx.stroke(); }
    }
    // painted markings
    ctx.strokeStyle='rgba(255,227,154,.85)'; ctx.lineWidth=3; ctx.shadowColor='rgba(255,200,90,.5)'; ctx.shadowBlur=6;
    // three-point arc (sweeps across the court)
    ctx.beginPath(); ctx.arc(w/2, h+18, w*0.46, Math.PI*1.17, Math.PI*1.83); ctx.stroke();
    // center circle
    ctx.beginPath(); ctx.arc(w/2, 90, 50, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    // center logo
    ctx.fillStyle='rgba(255,227,154,.9)'; ctx.textAlign='center';
    ctx.font='900 30px Anton, sans-serif'; ctx.fillText('FS', w/2, 100);
    ctx.font='600 12px Teko, sans-serif'; ctx.fillStyle='rgba(255,227,154,.55)';
    ctx.fillText('FLASH SPORT', w/2, 118);
    // glossy sheen
    const sh=ctx.createLinearGradient(0,0,0,68); sh.addColorStop(0,'rgba(255,255,255,.10)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sh; ctx.fillRect(0,0,w,68);
    // far darken
    const dk=ctx.createLinearGradient(0,0,0,86); dk.addColorStop(0,'rgba(7,6,12,.6)'); dk.addColorStop(1,'rgba(7,6,12,0)');
    ctx.fillStyle=dk; ctx.fillRect(0,0,w,86);
  }
  drawCourt();

  /* ---------- net render ---------- */
  function buildNet(){
    const C=53, topXs=[9,20,31,42,53,64,75,86,97], topY=2, botY=46;
    const conv=(x)=> C + (x-C)*0.38;  // converge toward center
    let paths='';
    // vertical strands (slight sag)
    topXs.forEach(x=>{ const bx=conv(x); const mx=(x+bx)/2;
      paths+=`<path d="M${x} ${topY} Q${mx} ${(topY+botY)/2+4} ${bx} ${botY}" stroke="rgba(245,248,255,.5)" stroke-width="1" fill="none"/>`; });
    // horizontal rings
    [14,27,39].forEach((y)=>{ const spread=1-(y-14)/30*0.55;
      const lx=C-44*spread, rx=C+44*spread;
      paths+=`<path d="M${lx} ${y-2} Q${C} ${y+5} ${rx} ${y-2}" stroke="rgba(245,248,255,.35)" stroke-width="1" fill="none"/>`; });
    netEl.innerHTML=paths;
  }
  buildNet();

  /* ---------- basketball render ---------- */
  const bctx=document.getElementById('ballCanvas').getContext('2d');
  const pebbles=[]; for(let i=0;i<140;i++){ pebbles.push([Math.random(),Math.random()]); }
  function drawBall(){
    const s=100, cx=50, cy=50, r=46, ctx=bctx;
    ctx.clearRect(0,0,s,s);
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
    const g=ctx.createRadialGradient(cx-16,cy-18,6,cx,cy,r+8);
    g.addColorStop(0,'#ffb066'); g.addColorStop(.45,'#ff6a1a'); g.addColorStop(.85,'#d23f06'); g.addColorStop(1,'#9c2c04');
    ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
    // pebble texture
    ctx.fillStyle='rgba(120,40,8,.18)';
    pebbles.forEach(p=>{ ctx.beginPath(); ctx.arc(p[0]*s,p[1]*s,.9,0,6.3); ctx.fill(); });
    // seams
    ctx.strokeStyle='rgba(40,12,4,.8)'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx,cy+r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy,r*0.55,r,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.55,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    // rim light + highlight
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,180,120,.4)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx-15,cy-17,11,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();
  }
  drawBall();

  /* ---------- state ---------- */
  let score=0, timeLeft=START_TIME, gameRunning=false, looping=false;
  let streak=0, bestStreak=0, attempts=0, makes=0, onFire=false;
  let ballX=W/2-25, ballY=H-238, ballVx=0, ballVy=0, rot=0;
  let inFlight=false, scored=false, launchDist=0;
  let isDragging=false, dragStartX=0, dragStartY=0, dragCurX=0, dragCurY=0;
  let hoopX=0, targetHoopX=0;
  let trail=[], particles=[], shake=0;
  let rafId=null, lastTs=null, timerInt=null;

  function placeBall(){ ballEl.style.left=ballX+'px'; ballEl.style.top=ballY+'px'; }
  placeBall();

  function resetBall(){
    inFlight=false; scored=false; isDragging=false; trail=[];
    ballVx=ballVy=0; rot=0;
    const off=(Math.random()-0.5)*72;
    ballX=W/2-25+off; ballY=H-238;
    ballEl.style.transform=''; ballEl.style.opacity='1';
    placeBall(); clearTraj();
  }

  /* ---------- geometry ---------- */
  function getRim(){
    const r=rimSensor.getBoundingClientRect(), s=scene.getBoundingClientRect();
    return { cx:r.left-s.left+r.width/2, cy:r.top-s.top+r.height/2, rx:r.width/2 };
  }

  /* ---------- aim preview ---------- */
  let trajDots=[];
  function clearTraj(){ trajDots.forEach(d=>d.remove()); trajDots=[]; }
  function showTraj(vx,vy){
    clearTraj();
    let x=ballX+25, y=ballY+25, dx=vx, dy=vy;
    for(let i=0;i<30;i++){
      x+=dx; y+=dy; dy+=G;
      if(x<-20||x>W+20||y>H) break;
      if(i%2===0){
        const d=document.createElement('div'); d.className='traj-dot';
        const sz=Math.max(7-i*0.18,2.5);
        d.style.width=d.style.height=sz+'px';
        d.style.left=x+'px'; d.style.top=y+'px';
        d.style.opacity=Math.max(1-i/26,0.12).toFixed(2);
        aim.appendChild(d); trajDots.push(d);
      }
    }
  }

  /* ---------- input ---------- */
  function ptr(e){ const s=scene.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
    return { x:t.clientX-s.left, y:t.clientY-s.top }; }

  ballEl.addEventListener('mousedown', startDrag);
  ballEl.addEventListener('touchstart', startDrag, {passive:false});
  function startDrag(e){
    if(inFlight || !looping) return;
    e.preventDefault();
    isDragging=true; ballEl.classList.add('dragging'); ballEl.classList.remove('bob');
    const p=ptr(e); dragStartX=p.x; dragStartY=p.y; dragCurX=p.x; dragCurY=p.y;
    if(!hint.classList.contains('hide')) hint.classList.add('hide');
  }
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('touchmove', onDrag, {passive:false});
  function onDrag(e){
    if(!isDragging) return; e.preventDefault();
    const p=ptr(e); dragCurX=p.x; dragCurY=p.y;
    const dx=dragCurX-dragStartX, dy=dragCurY-dragStartY; // flick: launch follows swipe
    const power=Math.min(Math.hypot(dx,dy),MAX_POWER);
    const ang=Math.atan2(dy,dx);
    showTraj(Math.cos(ang)*power*POWER_MULT, Math.sin(ang)*power*POWER_MULT);
  }
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  function endDrag(e){
    if(!isDragging) return;
    isDragging=false; ballEl.classList.remove('dragging'); clearTraj();
    const dx=dragCurX-dragStartX, dy=dragCurY-dragStartY; // flick: launch follows swipe
    const power=Math.min(Math.hypot(dx,dy),MAX_POWER);
    if(power<16 || dy>-6){ ballEl.classList.add('bob'); return; } // must swipe UPWARD to shoot
    const ang=Math.atan2(dy,dx);
    ballVx=Math.cos(ang)*power*POWER_MULT;
    ballVy=Math.sin(ang)*power*POWER_MULT;
    if(!gameRunning) startTimer();
    attempts++;
    launchDist=Math.abs((ballX+25)-getRim().cx);
    scored=false; inFlight=true;
  }

  /* ---------- physics step ---------- */
  function stepBall(dt){
    const prevY=ballY+25;
    ballVy+=G*dt; ballX+=ballVx*dt; ballY+=ballVy*dt;
    rot+=ballVx*dt*2.4;
    ballEl.style.transform=`rotate(${rot}deg)`; placeBall();
    const cx=ballX+25, cy=ballY+25;
    trail.push({x:cx,y:cy}); if(trail.length>12) trail.shift();

    const rim=getRim();
    const makeHalf=rim.rx*0.7;
    // 1) score FIRST: descending through the rim mouth, centred enough
    if(!scored && ballVy>0 && prevY<=rim.cy && cy>=rim.cy && Math.abs(cx-rim.cx)<=makeHalf){
      onScore(rim, cx); return;
    }
    // 2) rim rattle: ONLY for shots outside the make corridor (clip the near rim edge)
    if(Math.abs(cy-rim.cy)<26 && Math.abs(cx-rim.cx)>makeHalf){
      const ex=rim.cx+(cx>rim.cx?rim.rx:-rim.rx), ey=rim.cy;
      const dx=cx-ex, dy=cy-ey, d=Math.hypot(dx,dy)||0.001;
      if(d<bR+4){
        const nx=dx/d, ny=dy/d, vn=ballVx*nx+ballVy*ny;
        if(vn<0){ ballVx-=(1+REST)*vn*nx; ballVy-=(1+REST)*vn*ny; }
        const push=bR+4-d; ballX+=nx*push; ballY+=ny*push;
        spawnSparks(ex,ey,false,8); shake=Math.max(shake,3.5);
      }
    }
    // 3) miss
    if(!scored && (ballX<-80 || ballX>W+80 || cy>H-150)){ onMiss(); }
  }

  function onScore(rim, cx){
    scored=true; makes++;
    const far=launchDist>W*0.26, pts=far?3:2;
    const clean=Math.abs(cx-rim.cx)<rim.rx*0.32;
    score+=pts; scoreNum.textContent=score;
    streak++; bestStreak=Math.max(bestStreak,streak);
    netEl.classList.remove('net-swing'); void netEl.offsetWidth; netEl.classList.add('net-swing');
    spawnSparks(rim.cx, rim.cy, far, 26);
    shake=Math.max(shake, far?9:7);
    flashCrowd();
    showSwish(far?'3 PT!':(clean?'SWISH!':'SCORE!'), far);
    pop('+'+pts, rim.cx, rim.cy-24, far?'three':'');
    if(streak>=3){ streakTxt.textContent=streak+' 連續命中'; streakEl.classList.add('show'); }
    if(streak>0 && streak%3===0){ timeLeft=Math.min(timeLeft+2,60); updateTimer(); pop('+2s', W-46, 56,'time'); }
    onFire = streak>=3; ballEl.classList.toggle('fire', onFire);
    setTimeout(()=>{ if(gameRunning) resetBall(); }, 240);
  }

  function onMiss(){
    scored=true; inFlight=false;
    if(streak>0){ streak=0; onFire=false; ballEl.classList.remove('fire'); streakEl.classList.remove('show'); }
    ballEl.style.opacity='0';
    setTimeout(()=>{ if(gameRunning) resetBall(); }, 220);
  }

  /* ---------- effects ---------- */
  function spawnSparks(x,y,three,n){
    const cols = three ? ['#16e6c8','#7ffff0','#ffffff'] : ['#ff9a3c','#ffc534','#ffffff'];
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=2+Math.random()*5.5;
      particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:1,
        r:1.6+Math.random()*2.4, col:cols[(Math.random()*cols.length)|0] });
    }
  }
  let swTo=null;
  function showSwish(txt,three){
    swishEl.textContent=txt; swishEl.classList.toggle('three',three);
    swishEl.classList.remove('go'); void swishEl.offsetWidth; swishEl.classList.add('go');
  }
  let cfTo=null;
  function flashCrowd(){ crowdFlash.classList.add('on'); clearTimeout(cfTo); cfTo=setTimeout(()=>crowdFlash.classList.remove('on'),240); }
  function pop(txt,x,y,cls){
    const p=document.createElement('div'); p.className='pop'+(cls?' '+cls:''); p.textContent=txt;
    p.style.left=x+'px'; p.style.top=y+'px'; scene.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }

  function renderFx(dt){
    fctx.clearRect(0,0,W,H);
    // ball trail
    for(let i=0;i<trail.length;i++){
      const t=trail[i], a=(i+1)/trail.length*0.45;
      fctx.beginPath();
      fctx.fillStyle = onFire ? `rgba(255,${70+i*8},20,${a})` : `rgba(255,${150},60,${a*0.8})`;
      fctx.arc(t.x,t.y,bR*(0.45+0.5*(i/trail.length)),0,6.3); fctx.fill();
    }
    // particles
    for(const p of particles){
      p.vy+=0.2*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=0.028*dt;
      fctx.globalAlpha=Math.max(p.life,0); fctx.fillStyle=p.col;
      fctx.beginPath(); fctx.arc(p.x,p.y,p.r*p.life+0.4,0,6.3); fctx.fill();
    }
    fctx.globalAlpha=1;
    particles=particles.filter(p=>p.life>0);
    // shake
    if(shake>0.25){ scene.style.transform=`translate(${(Math.random()-0.5)*shake}px,${(Math.random()-0.5)*shake}px)`; shake*=0.85; }
    else if(shake){ scene.style.transform=''; shake=0; }
  }

  /* ---------- moving hoop (difficulty) ---------- */
  function updateHoop(ts){
    if(score<18){ targetHoopX=0; }
    else{
      const lvl=Math.min((score-18)/45,1);
      const amp=(W*0.17)*(0.5+lvl), spd=0.0010*(0.8+lvl);
      targetHoopX=Math.sin(ts*spd)*amp;
    }
    hoopX += (targetHoopX-hoopX)*0.08;
    hoopGroup.style.transform=`translateX(calc(-50% + ${hoopX}px))`;
  }

  /* ---------- loop ---------- */
  function loop(ts){
    rafId=requestAnimationFrame(loop);
    if(lastTs==null) lastTs=ts;
    let dt=(ts-lastTs)/16.667; lastTs=ts; dt=Math.min(dt,2.2);
    updateHoop(ts);
    if(inFlight) stepBall(dt);
    renderFx(dt);
  }
  function startLoop(){ if(looping) return; looping=true; lastTs=null; rafId=requestAnimationFrame(loop); }
  function stopLoop(){ looping=false; if(rafId) cancelAnimationFrame(rafId); rafId=null; }

  /* ---------- timer ---------- */
  function updateTimer(){
    timerNum.textContent=Math.max(0,Math.ceil(timeLeft));
    timerBar.style.width=Math.max(0,timeLeft/START_TIME*100)+'%';
    if(timeLeft<=6){ timeBox.classList.add('low'); timerBar.style.background='linear-gradient(90deg,#ff2d12,#ff6a1a)'; }
    else { timeBox.classList.remove('low'); timerBar.style.background='linear-gradient(90deg,#ff6a1a,#ffc534)'; }
  }
  function startTimer(){
    if(gameRunning) return; gameRunning=true;
    timerInt=setInterval(()=>{
      timeLeft-=0.1; updateTimer();
      if(timeLeft<=0){ timeLeft=0; updateTimer(); endGame(); }
    },100);
  }

  /* ---------- game flow ---------- */
  document.getElementById('startBtn').addEventListener('click', ()=>{
    intro.classList.remove('show');
    hint.classList.remove('hide');
    resetBall(); startLoop();
  });

  function endGame(){
    gameRunning=false; clearInterval(timerInt); stopLoop();
    inFlight=false; ballEl.style.opacity='0'; streakEl.classList.remove('show');
    const acc = attempts? Math.round(makes/attempts*100):0;
    document.getElementById('finalScore').textContent=score;
    document.getElementById('accNum').textContent=acc+'%';
    document.getElementById('bestNum').textContent=bestStreak;
    let L='D', word='再接再厲', cls='', msg='別放棄，補滿能量再戰一場！';
    if(score>=60){ L='S'; word='傳奇射手'; cls='s'; msg='全場沸騰！你就是 FLASH SPORT 代言人。'; }
    else if(score>=40){ L='A'; word='全明星'; cls='a'; msg='手感發燙！這就是爆發力的證明。'; }
    else if(score>=25){ L='B'; word='先發球員'; cls='b'; msg='穩定輸出，再補一口能量衝更高！'; }
    else if(score>=12){ L='C'; word='板凳奇兵'; cls=''; msg='漸入佳境，潛能正在被點燃。'; }
    const rl=document.getElementById('rankLetter');
    rl.textContent=L; rl.className='rank '+cls;
    document.getElementById('rankWord').textContent=word;
    document.getElementById('resultMsg').textContent=msg;
    result.classList.add('show');
  }

  document.getElementById('retryBtn').addEventListener('click', ()=>{
    score=0; timeLeft=START_TIME; streak=0; bestStreak=0; attempts=0; makes=0; onFire=false;
    scoreNum.textContent='0'; updateTimer();
    streakEl.classList.remove('show'); ballEl.classList.remove('fire');
    swishEl.classList.remove('go'); particles=[]; trail=[];
    hoopX=0; targetHoopX=0; gameRunning=false;
    result.classList.remove('show'); hint.classList.remove('hide');
    resetBall(); startLoop();
  });
  document.getElementById('ctaBtn').addEventListener('click', ()=>{ window.open('#','_blank'); });

  updateTimer();

  /* ---------- resize ---------- */
  window.addEventListener('resize', ()=>{
    W=wrapper.clientWidth; H=wrapper.clientHeight;
    fctx=fitCanvas(fx,W,H);
    drawCourt();
    if(!inFlight) resetBall();
  });

})();
</script>

<!-- 防止手機 double-tap 縮放 / 雙指縮放 -->
<script>
(function(){
  let lastTouch=0;
  document.addEventListener('touchend',function(e){
    var now=Date.now();
    if(now-lastTouch<=300){ e.preventDefault(); }
    lastTouch=now;
  },{passive:false});
  document.addEventListener('dblclick',function(e){ e.preventDefault(); },{passive:false});
  document.addEventListener('gesturestart',function(e){ e.preventDefault(); });
})();
</script>
</body>
