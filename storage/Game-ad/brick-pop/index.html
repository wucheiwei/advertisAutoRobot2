<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ZAPP! 極速挑戰 — 打破極限</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #09091a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Sora', 'Noto Sans TC', sans-serif;
  overflow: hidden;
  color: #fff;
  user-select: none;
}
canvas {
  display: block;
  max-width: 100%;
  touch-action: none;
}
#overlay, #result-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(9,9,26,0.93);
  z-index: 10;
  padding: 2rem;
  text-align: center;
}
#result-screen { display: none; }
.logo-text {
  font-size: 3.8rem;
  font-weight: 800;
  color: #00ffaa;
  text-shadow: 0 0 30px #00ffaa, 0 0 60px #00ffaa44;
  line-height: 1;
  margin-bottom: 0.3rem;
}
.tagline {
  font-size: 1rem;
  color: #00ccff;
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
}
.desc {
  color: #aab;
  font-size: 0.9rem;
  margin-bottom: 2rem;
  line-height: 1.6;
}
.btn-primary {
  background: linear-gradient(135deg, #00ffaa, #00ccff);
  border: none;
  padding: 0.9rem 2.8rem;
  border-radius: 50px;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  color: #09091a;
  box-shadow: 0 0 30px rgba(0,255,170,0.4);
  transition: transform 0.1s, box-shadow 0.2s;
  margin-bottom: 0.8rem;
}
.btn-primary:hover { transform: scale(1.06); box-shadow: 0 0 45px rgba(0,255,170,0.6); }
.btn-secondary {
  background: none;
  border: 1px solid rgba(0,255,170,0.3);
  color: #00ffaa;
  padding: 0.65rem 2rem;
  border-radius: 50px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-secondary:hover { background: rgba(0,255,170,0.1); }
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0.6rem 1rem;
  font-size: 0.85rem;
  color: #00ffaa;
  z-index: 5;
  pointer-events: none;
}
.hud-val { color: #fff; font-weight: 700; }
#win-title { font-size: 2rem; font-weight: 800; color: #ffdd00; text-shadow: 0 0 20px #ffdd00; margin-bottom: 0.5rem; }
#result-msg { color: #ccd; font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.5rem; max-width: 300px; }
</style>
</head>
<body>

<div id="hud">
  <span>❤️ <span id="live-count" class="hud-val">3</span></span>
  <span>⚡ <span id="brand-hud">ZAPP!</span></span>
  <span>分數 <span id="score-val" class="hud-val">0</span></span>
</div>

<!-- Start overlay -->
<div id="overlay">
  <div style="font-size:2rem;margin-bottom:0.5rem;">⚡</div>
  <div class="logo-text">ZAPP!</div>
  <div class="tagline">EXTREME ENERGY DRINK</div>
  <div class="desc">
    打碎磚塊，解鎖全系列能量配方<br>
    移動球拍，擊破所有磚塊即可獲勝！<br>
    <span style="color:#555;font-size:0.8rem">滑鼠/觸控移動球拍</span>
  </div>
  <button class="btn-primary" id="start-btn">開始挑戰 ⚡</button>
</div>

<!-- Result screen -->
<div id="result-screen">
  <div id="result-icon" style="font-size:2.5rem;margin-bottom:0.5rem;">🏆</div>
  <div id="win-title">極限突破！</div>
  <div id="result-msg">你已解鎖 ZAPP! 全系列能量配方<br>現在就感受爆發的力量！</div>
  <button class="btn-primary" id="cta-btn" onclick="window.open('https://zapp-energy.example','_blank')">立即搶購 ZAPP! →</button>
  <button class="btn-secondary" id="replay-btn">再玩一次</button>
</div>

<canvas id="c"></canvas>

<script>
(function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  var W, H;
  function resize() {
    W = Math.min(window.innerWidth, 480);
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
  }
  resize();

  // ------- Config -------
  var PADDLE_W_RATIO = 0.22;
  var PADDLE_H = 12;
  var BALL_R = 7;
  var COLS = 7;
  var ROWS = 5;
  var BRICK_PAD = 5;
  var BRICK_TOP = 70;
  var BRICK_H = 22;

  var BRICK_LABELS = [
    ['ZAPP!','TURBO','爆發','MAX','零糖','B12','ULTRA'],
    ['咖啡因','電解質','維C','BOOST','果香','ZINC','能量'],
    ['清涼','活力','柑橘','葡萄','水蜜桃','荔枝','芒果'],
    ['0卡','低糖','無色素','天然','ISO','GMP','認證'],
    ['5星評','暢銷榜','百萬罐','推薦','限定','新品','熱賣']
  ];
  var BRICK_COLORS = [
    ['#ff4466','#ff6644','#ffaa00','#ff4466','#ff6644','#ffaa00','#ff4466'],
    ['#00ffaa','#00ccff','#aa88ff','#00ffaa','#00ccff','#aa88ff','#00ffaa'],
    ['#ffdd00','#ff88cc','#88ffdd','#ffdd00','#ff88cc','#88ffdd','#ffdd00'],
    ['#44aaff','#ff6644','#00ffaa','#44aaff','#ff6644','#00ffaa','#44aaff'],
    ['#ff4466','#aa88ff','#ffdd00','#ff4466','#aa88ff','#ffdd00','#ff4466']
  ];

  // ------- State -------
  var gameRunning = false;
  var score = 0;
  var lives = 3;
  var paddleX, paddleY, paddleW;
  var ballX, ballY, ballDX, ballDY, ballLaunched;
  var bricks = [];
  var particles = [];
  var mouseX;

  function initGame() {
    paddleW = W * PADDLE_W_RATIO;
    paddleY = H - 65;
    paddleX = W / 2 - paddleW / 2;
    mouseX = W / 2;
    score = 0;
    lives = 3;
    document.getElementById('score-val').textContent = 0;
    document.getElementById('live-count').textContent = 3;
    initBricks();
    resetBall();
    particles = [];
    gameRunning = true;
  }

  function initBricks() {
    bricks = [];
    var brickW = (W - BRICK_PAD * (COLS + 1)) / COLS;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        bricks.push({
          x: BRICK_PAD + c * (brickW + BRICK_PAD),
          y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
          w: brickW,
          h: BRICK_H,
          alive: true,
          label: BRICK_LABELS[r][c],
          color: BRICK_COLORS[r][c],
          hp: r < 2 ? 2 : 1
        });
      }
    }
  }

  function resetBall() {
    ballX = W / 2;
    ballY = paddleY - BALL_R - 4;
    var speed = 4.5;
    var angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
    ballDX = Math.cos(angle) * speed;
    ballDY = Math.sin(angle) * speed;
    ballLaunched = false;
  }

  // ------- Input -------
  canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
  }, { passive: false });
  canvas.addEventListener('click', function() {
    if (gameRunning && !ballLaunched) ballLaunched = true;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (gameRunning && !ballLaunched) ballLaunched = true;
  }, { passive: false });

  // ------- Particles -------
  function spawnParticles(x, y, color) {
    for (var i = 0; i < 8; i++) {
      var angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.4;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * (1.5 + Math.random() * 3),
        vy: Math.sin(angle) * (1.5 + Math.random() * 3),
        life: 35, maxLife: 35,
        color: color,
        r: 2 + Math.random() * 3
      });
    }
  }

  // ------- Draw helpers -------
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return r + ',' + g + ',' + b;
  }

  function drawBg() {
    ctx.fillStyle = '#09091a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(0,255,170,0.04)';
    ctx.lineWidth = 1;
    for (var x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (var y = 0; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawBricks() {
    var brickW = (W - BRICK_PAD * (COLS + 1)) / COLS;
    var fontSize = Math.max(8, Math.floor(brickW * 0.18));
    ctx.font = 'bold ' + fontSize + 'px Sora,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < bricks.length; i++) {
      var b = bricks[i];
      if (!b.alive) continue;
      roundRect(b.x, b.y, b.w, b.h, 4);
      ctx.fillStyle = b.color;
      ctx.fill();
      if (b.hp >= 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
    }
  }

  function drawPaddle() {
    var grad = ctx.createLinearGradient(paddleX, 0, paddleX + paddleW, 0);
    grad.addColorStop(0, '#00ffaa');
    grad.addColorStop(1, '#00ccff');
    roundRect(paddleX, paddleY, paddleW, PADDLE_H, 6);
    ctx.fillStyle = grad;
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBall() {
    ctx.beginPath();
    ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = p.life / p.maxLife;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
      var rgb = hexToRgb(p.color);
      ctx.fillStyle = 'rgba(' + rgb + ',' + alpha.toFixed(2) + ')';
      ctx.fill();
    }
  }

  // ------- Update -------
  function update(dt) {
    paddleW = W * PADDLE_W_RATIO;
    paddleX = mouseX - paddleW / 2;
    paddleX = Math.max(0, Math.min(W - paddleW, paddleX));

    if (!ballLaunched) {
      ballX = paddleX + paddleW / 2;
      ballY = paddleY - BALL_R - 4;
      return;
    }

    ballX += ballDX * dt;
    ballY += ballDY * dt;

    // Wall collisions
    if (ballX - BALL_R < 0) { ballX = BALL_R; ballDX = Math.abs(ballDX); }
    if (ballX + BALL_R > W) { ballX = W - BALL_R; ballDX = -Math.abs(ballDX); }
    if (ballY - BALL_R < 0) { ballY = BALL_R; ballDY = Math.abs(ballDY); }

    // Paddle collision
    if (ballY + BALL_R >= paddleY &&
        ballY + BALL_R <= paddleY + PADDLE_H + 8 &&
        ballX >= paddleX - BALL_R &&
        ballX <= paddleX + paddleW + BALL_R &&
        ballDY > 0) {
      var hitPos = (ballX - paddleX) / paddleW;
      var deflect = (hitPos - 0.5) * 2;
      var speed = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
      speed = Math.min(speed * 1.01, 8);
      ballDX = deflect * speed * 0.75;
      ballDY = -Math.sqrt(speed * speed - ballDX * ballDX);
      if (ballDY > -2.5) ballDY = -2.5;
      ballY = paddleY - BALL_R - 1;
    }

    // Fall out
    if (ballY - BALL_R > H) {
      lives--;
      document.getElementById('live-count').textContent = lives;
      if (lives <= 0) {
        gameRunning = false;
        showResult(false);
      } else {
        resetBall();
      }
      return;
    }

    // Brick collisions
    var brickW = (W - BRICK_PAD * (COLS + 1)) / COLS;
    for (var i = 0; i < bricks.length; i++) {
      var b = bricks[i];
      if (!b.alive) continue;
      if (ballX + BALL_R > b.x && ballX - BALL_R < b.x + b.w &&
          ballY + BALL_R > b.y && ballY - BALL_R < b.y + b.h) {
        var overL = ballX + BALL_R - b.x;
        var overR = b.x + b.w - (ballX - BALL_R);
        var overT = ballY + BALL_R - b.y;
        var overB = b.y + b.h - (ballY - BALL_R);
        var minO = Math.min(overL, overR, overT, overB);
        if (minO === overT || minO === overB) ballDY = -ballDY;
        else ballDX = -ballDX;
        b.hp--;
        if (b.hp <= 0) {
          b.alive = false;
          score += 10;
          document.getElementById('score-val').textContent = score;
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
        }
        break;
      }
    }

    // Win check
    if (bricks.every(function(b) { return !b.alive; })) {
      gameRunning = false;
      showResult(true);
    }

    // Update particles
    particles = particles.filter(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
      return p.life > 0;
    });
  }

  function showResult(won) {
    var screen = document.getElementById('result-screen');
    var icon = document.getElementById('result-icon');
    var title = document.getElementById('win-title');
    var msg = document.getElementById('result-msg');
    if (won) {
      icon.textContent = '🏆';
      title.textContent = '極限突破！';
      title.style.color = '#ffdd00';
      msg.innerHTML = '你已解鎖 ZAPP! 全系列能量配方<br>現在就感受爆發的力量！';
      document.getElementById('cta-btn').style.display = '';
    } else {
      icon.textContent = '💥';
      title.textContent = 'GAME OVER';
      title.style.color = '#ff4466';
      msg.innerHTML = '差一點點！再試一次，你能打爆所有磚塊！';
      document.getElementById('cta-btn').style.display = 'none';
    }
    screen.style.display = 'flex';
  }

  // ------- Loop -------
  var lastTime = 0;
  function loop(ts) {
    var dt = Math.min((ts - lastTime) / 16.67, 2.5);
    lastTime = ts;

    if (gameRunning) {
      update(dt);
      drawBg();
      drawBricks();
      drawPaddle();
      drawBall();
      drawParticles();
      if (!ballLaunched) {
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.font = '13px Sora,sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('點擊 / 觸碰 發射球', W / 2, paddleY + 18);
      }
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('overlay').style.display = 'none';
    initGame();
    requestAnimationFrame(loop);
  });

  document.getElementById('replay-btn').addEventListener('click', function() {
    document.getElementById('result-screen').style.display = 'none';
    initGame();
  });
})();
</script>
</body>
</html>
