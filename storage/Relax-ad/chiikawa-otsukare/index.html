<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>今天辛苦了・吉伊卡哇慰勞所</title>
<meta name="description" content="說說你今天遇到的鳥事,讓吉伊卡哇們陪你,再生成一格只屬於你的小漫畫,還有今天你值得的犒賞。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --pink:#FFB8CC;--pinkd:#E8607A;
    --lav:#C8AAEC;--lavd:#8A5EC8;
    --cream:#FFF8F2;--text:#3A2820;--dim:#9A7A70;--white:#fff;
    --line:#3A2820;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Noto Sans TC',system-ui,sans-serif;color:var(--text);
    min-height:100dvh;background:var(--cream);
    background-image:
      radial-gradient(circle at 12% 18%,rgba(255,184,204,.28) 0,transparent 46%),
      radial-gradient(circle at 88% 12%,rgba(200,170,236,.26) 0,transparent 44%),
      radial-gradient(circle at 50% 96%,rgba(255,232,160,.22) 0,transparent 44%);
    display:flex;justify-content:center;align-items:flex-start;
    padding:18px 13px 46px;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:430px;margin-top:6px}
  .sc{display:none}
  .sc.on{display:block;animation:up .45s cubic-bezier(.2,.8,.25,1)}
  @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card{
    background:var(--white);border-radius:30px;padding:26px 22px 24px;
    box-shadow:0 14px 44px rgba(200,120,140,.18),0 2px 8px rgba(200,120,140,.08);
    border:2px solid rgba(255,184,204,.32);position:relative;
  }
  .kick{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--lavd);font-weight:700;text-align:center}
  .btn{padding:14px 18px;border-radius:999px;font-size:15.5px;font-weight:900;font-family:inherit;cursor:pointer;transition:transform .18s,box-shadow .2s,filter .2s;border:none;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn-p{background:linear-gradient(118deg,var(--pink),var(--lav));color:#fff;box-shadow:0 8px 22px rgba(232,96,122,.32)}
  .btn-p:active{transform:translateY(1px) scale(.99)}
  .btn-p:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 12px 28px rgba(232,96,122,.4)}
  .btn-p:disabled{opacity:.42;filter:grayscale(.3);cursor:not-allowed;box-shadow:none;transform:none}
  .btn-g{background:#fff;color:var(--dim);border:2px solid rgba(200,155,175,.4)}
  .btn-g:hover{background:rgba(255,184,204,.1)}
  .blk{width:100%}

  /* ── 封面 ── */
  .cover-stage{
    border-radius:24px;background:linear-gradient(160deg,#FFE3EC 0%,#F1E2FF 52%,#DDF0FF 100%);
    padding:18px 10px 0;display:flex;align-items:flex-end;justify-content:center;gap:2px;
    margin-bottom:18px;overflow:hidden;position:relative;min-height:148px;
  }
  .cover-stage::before{content:"";position:absolute;inset:0;background:
    radial-gradient(circle at 20% 90%,rgba(255,255,255,.6),transparent 40%),
    radial-gradient(circle at 80% 90%,rgba(255,255,255,.5),transparent 42%)}
  .peek{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
  .peek img{width:84px;height:auto;display:block;filter:drop-shadow(0 5px 8px rgba(120,80,90,.18))}
  .peek.mid img{width:104px;transform:translateY(-8px)}
  .peek.s img{width:74px}
  .float{animation:bob 3.2s ease-in-out infinite}
  .float.b{animation-delay:.5s}.float.c{animation-delay:1s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .peek.mid .float{animation-duration:3.6s}
  h1.title{font-size:30px;font-weight:900;text-align:center;line-height:1.32;margin:16px 0 0;letter-spacing:.01em}
  h1.title span{color:var(--pinkd)}
  .lead{font-size:13.5px;color:var(--dim);text-align:center;line-height:1.92;margin:11px 4px 20px}
  .lead b{color:var(--lavd);font-weight:700}
  .note{font-size:11.5px;color:var(--dim);text-align:center;margin-top:13px;opacity:.85}
  .heart{color:var(--pinkd)}

  /* ── 輸入 ── */
  .step{font-size:12.5px;color:var(--lavd);font-weight:700;margin-bottom:11px;letter-spacing:.02em;display:flex;align-items:center;gap:6px}
  .step .num{background:linear-gradient(120deg,var(--pink),var(--lav));color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
  .buddies{display:flex;gap:8px;margin-bottom:20px}
  .buddy{flex:1;border:2px solid rgba(200,155,175,.3);border-radius:18px;padding:10px 5px 9px;text-align:center;cursor:pointer;background:rgba(255,250,246,.6);transition:.18s;position:relative}
  .buddy img{width:52px;height:auto;display:block;margin:0 auto 3px;filter:drop-shadow(0 3px 5px rgba(120,80,90,.16))}
  .buddy .bn{font-size:12.5px;font-weight:900}
  .buddy .bt{font-size:9.5px;color:var(--dim);line-height:1.4;margin-top:2px}
  .buddy:hover{transform:translateY(-2px);border-color:var(--pink)}
  .buddy.sel{border-color:var(--pinkd);background:rgba(255,184,204,.16);box-shadow:0 6px 16px rgba(232,96,122,.18)}
  .buddy.sel::after{content:"✓";position:absolute;top:-7px;right:-5px;background:var(--pinkd);color:#fff;width:21px;height:21px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 6px rgba(232,96,122,.4)}
  .ta-wrap{position:relative;margin-bottom:11px}
  textarea#woe{
    width:100%;min-height:96px;resize:none;border-radius:18px;border:2px solid rgba(200,155,175,.34);
    background:rgba(255,250,246,.7);padding:14px 14px 26px;font-family:inherit;font-size:14.5px;line-height:1.7;color:var(--text);
  }
  textarea#woe:focus{outline:none;border-color:var(--pink);background:#fff}
  textarea#woe::placeholder{color:#C4ABA4}
  .cnt{position:absolute;right:13px;bottom:9px;font-size:10.5px;color:#C4ABA4}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
  .chip{font-size:12px;padding:7px 12px;border-radius:999px;border:1.5px solid rgba(200,170,236,.5);background:rgba(200,170,236,.1);color:var(--lavd);font-weight:500;cursor:pointer;transition:.15s}
  .chip:hover{background:rgba(200,170,236,.22);transform:translateY(-1px)}

  /* ── 生成中 ── */
  .gen{text-align:center;padding:30px 10px 26px}
  .gen img{width:140px;height:auto;margin:0 auto;display:block;animation:bob 1.4s ease-in-out infinite;filter:drop-shadow(0 8px 12px rgba(120,80,90,.2))}
  .gen-t{font-size:16px;font-weight:900;margin-top:18px}
  .gen-s{font-size:12.5px;color:var(--dim);margin-top:7px;min-height:18px}
  .dots span{display:inline-block;animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* ── 結果 ── */
  .chat{display:flex;gap:11px;align-items:flex-start;margin-bottom:18px}
  .chat .av{width:54px;height:54px;border-radius:50%;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;box-shadow:0 4px 12px rgba(200,120,140,.18)}
  .chat .av img{width:90%;height:auto;margin-bottom:-4px}
  .bubble{
    background:linear-gradient(180deg,#fff,#FFF6F9);border:2px solid rgba(255,184,204,.5);
    border-radius:6px 20px 20px 20px;padding:13px 15px;font-size:14.5px;line-height:1.92;
    position:relative;flex:1;box-shadow:0 4px 14px rgba(200,120,140,.1);min-height:40px;
  }
  .bubble .who{font-size:11.5px;font-weight:900;color:var(--pinkd);margin-bottom:4px}
  .bubble p{margin:0 0 9px}.bubble p:last-child{margin-bottom:0}
  .cursor{display:inline-block;width:8px;background:var(--pink);border-radius:2px;animation:blink2 .7s steps(1) infinite;margin-left:1px}
  @keyframes blink2{50%{opacity:0}}

  .comic-sec{margin:6px 0 0;opacity:0;transform:translateY(14px) scale(.97);transition:opacity .6s,transform .6s}
  .comic-sec.show{opacity:1;transform:none}
  .comic-lbl{text-align:center;font-size:11px;letter-spacing:.2em;color:var(--lavd);font-weight:700;margin:18px 0 9px}
  .comic-frame{position:relative;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(120,80,90,.22)}
  canvas#comic{width:100%;display:block}
  .develop{position:absolute;inset:0;background:#3A2820;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;letter-spacing:.1em;transition:opacity .9s;z-index:2}
  .develop.gone{opacity:0;pointer-events:none}

  .reward-cta{margin:20px 0 0;background:linear-gradient(135deg,rgba(255,184,204,.2),rgba(200,170,236,.2));border:2px dashed rgba(232,96,122,.4);border-radius:22px;padding:16px 16px 17px;text-align:center}
  .reward-cta .rl{font-size:11px;letter-spacing:.18em;color:var(--lavd);font-weight:700}
  .reward-cta .rn{font-size:19px;font-weight:900;margin:5px 0 2px}
  .reward-cta .rn .em{margin-right:5px}
  .reward-cta .rs{font-size:12px;color:var(--dim);margin-bottom:13px}
  .acts{display:flex;gap:8px;margin-top:14px}
  .acts .btn{flex:1;font-size:13.5px;padding:12px 8px}
  .again{display:block;width:100%;margin-top:9px;background:none;border:none;color:var(--dim);font-size:12.5px;font-family:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:8px}
  .disc{font-size:10.5px;color:var(--dim);opacity:.55;text-align:center;margin-top:18px;line-height:1.7}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:50;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

  <!-- ══════════ 封面 ══════════ -->
  <section class="sc on" id="s0">
    <div class="card">
      <div class="cover-stage">
        <div class="peek s"><img class="float b" src="chars/usagi.png" alt="烏薩奇" /></div>
        <div class="peek mid"><img class="float" src="chars/chiikawa.png" alt="吉伊卡哇" /></div>
        <div class="peek s"><img class="float c" src="chars/hachiware.png" alt="哈齊瓦雷" /></div>
      </div>
      <div class="kick">ちいかわ × 今日のごほうび</div>
      <h1 class="title">今天，<span>辛苦了</span>。</h1>
      <p class="lead">把今天遇到的鳥事，說給牠們聽。<br><b>吉伊卡哇</b>會陪你,給你一段只對你說的安慰、<br>一格只屬於今天的小漫畫,還有——<br>一份<b>你今天值得的犒賞</b>。</p>
      <button class="btn btn-p blk" onclick="go('s1')">進入慰勞所 →</button>
      <p class="note">每個人收到的安慰都不一樣 <span class="heart">♡</span> 說完會想截圖收藏</p>
    </div>
  </section>

  <!-- ══════════ 輸入 ══════════ -->
  <section class="sc" id="s1">
    <div class="card">
      <div class="step"><span class="num">1</span>選一個今天想陪你的夥伴</div>
      <div class="buddies" id="buddyPick"></div>

      <div class="step"><span class="num">2</span>今天遇到什麼鳥事?</div>
      <div class="ta-wrap">
        <textarea id="woe" maxlength="60" placeholder="例如:報告做到一半電腦當機,全部重來…&#10;不知道怎麼說也沒關係,牠們感覺得到。"></textarea>
        <span class="cnt" id="cnt">0 / 60</span>
      </div>
      <div class="chips" id="chips"></div>

      <button class="btn btn-p blk" id="goBtn" onclick="submitWoe()" disabled>先選一個夥伴 ↑</button>
      <p class="note">放心,你打的字不會被傳到任何地方,只有牠們聽見 <span class="heart">♡</span></p>
    </div>
  </section>

  <!-- ══════════ 生成中 ══════════ -->
  <section class="sc" id="s2">
    <div class="card">
      <div class="gen">
        <img id="genImg" src="chars/chiikawa_hug.png" alt="" />
        <div class="gen-t" id="genT">吉伊卡哇正在認真想…</div>
        <div class="gen-s"><span id="genS">讀著你說的話</span> <span class="dots"><span>·</span><span>·</span><span>·</span></span></div>
      </div>
    </div>
  </section>

  <!-- ══════════ 結果 ══════════ -->
  <section class="sc" id="s3">
    <div class="card">
      <div class="chat">
        <div class="av" id="rAv"></div>
        <div class="bubble"><div class="who" id="rWho"></div><div id="rMsg"></div></div>
      </div>

      <div class="comic-sec" id="comicSec">
        <div class="comic-lbl">✦ 只屬於今天的你的一格漫畫 ✦</div>
        <div class="comic-frame">
          <canvas id="comic" width="720" height="960"></canvas>
          <div class="develop" id="develop">顯影中…</div>
        </div>

        <div class="reward-cta">
          <div class="rl">✦ 今天的你,值得這個 ✦</div>
          <div class="rn"><span class="em" id="rwEm"></span><span id="rwName"></span></div>
          <div class="rs" id="rwSub"></div>
          <button class="btn btn-p blk" onclick="claim()">把今天的犒賞帶回家 →</button>
        </div>

        <div class="acts">
          <button class="btn btn-g" onclick="saveComic()">📷 存成圖片</button>
          <button class="btn btn-g" onclick="shareComic()">分享給朋友</button>
        </div>
        <button class="again" onclick="restart()">↻ 再說一件今天的鳥事</button>
        <p class="disc">本頁為示意性質的互動廣告,文案由頁面即時依你的輸入生成,僅供療癒娛樂。<br>ちいかわ © nagano / 小学館</p>
      </div>
    </div>
  </section>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
/* ════════════════════════════════════════════════════
   吉伊卡哇 今天辛苦了 慰勞所
   ── 不靠亂數:安慰內容由「使用者輸入 × 夥伴」決定性生成 ──
   ════════════════════════════════════════════════════ */

const BUDDIES = {
  chiikawa:{zh:'吉伊卡哇',jp:'ちいかわ',tag:'會陪你<br>一起難過',img:'chars/chiikawa.png',hug:'chars/chiikawa_hug.png',ring:'#FFE8EC,#FFCCD8'},
  hachiware:{zh:'哈齊瓦雷',jp:'ハチワレ',tag:'會把你<br>拉回光明面',img:'chars/hachiware.png',hug:'chars/hachiware_hug.png',ring:'#DFF0FF,#C2DFFF'},
  usagi:{zh:'烏薩奇',jp:'うさぎ',tag:'會讓你<br>笑出來',img:'chars/usagi.png',hug:'chars/usagi_hug.png',ring:'#FFFAE0,#FFE870'},
};

// 夥伴語氣:開場(帶入引用)、高張力補刀、結尾(帶入犒賞)
const VOICE = {
  chiikawa:{
    open:['嗚嗚…你說「{Q}」…我都聽到了。','「{Q}」…光是聽你說,我的眼眶就熱熱的了…'],
    openEmpty:['就算說不出來也沒關係…我感覺得到,你今天不太好過…'],
    intense:'這麼難的一天,你居然撐過來了…',
    close:['…但是你今天還是撐到現在了,真的好棒、好棒喔。這個「{R}」,是你今天值得的犒賞,收下嘛。',
           '…謝謝你願意撐著。來,把「{R}」收下,這是只屬於今天的你的獎勵喔。'],
  },
  hachiware:{
    open:['欸欸我有在認真聽喔!你說「{Q}」對吧?','「{Q}」…嗯,這種事換作是誰都會悶的啦。'],
    openEmpty:['不用說出來也沒關係~我大概感覺到,你今天累累的了!'],
    intense:'這種程度的鳥事,級別超高的耶!',
    close:['不過你看,能把它說出來就已經超厲害了!「{R}」送你,這是你今天應得的犒賞~',
           '所以呢,今天的你已經及格啦!用「{R}」幫自己慶祝一下,你值得的!'],
  },
  usagi:{
    open:['哈!?「{Q}」!?ウラ──!','蛤?「{Q}」?聽起來就有夠煩欸!'],
    openEmpty:['不講?沒差!反正一看就知道你今天很厭世啦!ウラ!'],
    intense:'這已經不是普通的鳥事了,是鳥事之王!',
    close:['算了算了!這種事配個「{R}」剛剛好!吃下去就重開機了,ウラ!',
           '別想了別想了!「{R}」拿去!吃飽才有力氣繼續耍廢,哈!'],
  },
};

// 類別:關鍵字、場景、犒賞、各夥伴的同理內文與漫畫對白
const CATS = {
  work:{label:'工作壓力',scene:'night',
    kw:['加班','工作','上班','專案','案子','報告','簡報','會議','客戶','老闆','業績','kpi','deadline','死線','做不完','改稿','需求','目標','績效','責任','提案','上班族','值班','輪班','排班'],
    reward:{em:'🍮',name:'深夜限定・濃厚布丁',sub:'忙到現在,先讓舌頭甜一下'},
    body:{chiikawa:['工作怎麼好像永遠做不完呢…嗚…我光看就覺得肩膀好重。可是你一直、一直在撐著,這件事我都看在眼裡。','那些做不完的事,不是因為你不夠好,是因為它們真的太多了啦…你已經很拚了。'],
          hachiware:['工作嘛~再大的案子也是一塊一塊吃掉的!你今天已經咬下好大一口了,剩下的明天再說!','做不完很正常啊,這代表別人把重要的事都交給你了耶——只是今天的你需要先休息一下。'],
          usagi:['工作!?做不完就先不要做啦!ウラ──!地球又不會因為你的報告爆炸!','哈!?加班!?老闆的案子哪有你的肚子重要,先吃!吃完再煩!']},
    bub:{chiikawa:['你已經\n很努力了…','做不完\n不是你的錯'],hachiware:['一塊一塊\n會吃完的!','重要的事\n才交給你!'],usagi:['先不要做!\nウラ!','地球\n不會爆炸啦!']}},

  blame:{label:'被責備',scene:'rain',
    kw:['罵','唸','念','檢討','背鍋','怪我','怪罪','責備','釘','訓','批評','挑剔','嫌','數落','甩鍋','指責','被說','刁難','找碴','酸'],
    reward:{em:'🍓',name:'草莓鮮奶油泡芙',sub:'被唸的嘴,要用甜的補回來'},
    body:{chiikawa:['被罵的時候…心會縮成一團對不對…嗚嗚。明明你也有你的苦衷,卻只能默默吞下去。','那些話好兇喔…可是說那些話的人,不知道你已經多努力了。我知道,這樣就夠了對吧?'],
          hachiware:['被唸了齁~深呼吸!別人氣話裡的情緒是他的,不是你的,不用全部接過來揹著喔。','一句罵不能定義你啦!你做對的那些事,只是今天剛好沒被看見而已。'],
          usagi:['誰罵你!?ウラ──!我去咬他!哈!?','管他唸什麼,左耳進右耳出!你的耳朵又不是垃圾桶!']},

const INTENSIFIERS = ['超','爆','很','真的','最','死','快','崩潰','受不了','累死','氣死','好想哭','超級','非常','瘋','無敵','整個','完全','一直','overload','已經'];

// ── 決定性雜湊 & 種子挑選(取代亂數) ──
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function pick(arr,seed){return arr[seed%arr.length];}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ── 核心:分析輸入,選出類別與強度 ──
function analyze(text){
  const t=(text||'').toLowerCase();
  let best='general',bestScore=0;
  for(const key in CATS){
    if(key==='general')continue;
    let sc=0;
    for(const kw of CATS[key].kw){ if(t.includes(kw.toLowerCase())) sc += kw.length>=2?2:1; }
    if(sc>bestScore){bestScore=sc;best=key;}
  }
  // general 關鍵字也算一點(但不蓋過明確類別)
  if(bestScore===0){ for(const kw of CATS.general.kw){ if(t.includes(kw)) {best='general';break;} } }
  let intensity=0;
  for(const w of INTENSIFIERS){ if(t.includes(w.toLowerCase())) intensity++; }
  if(t.length>=22) intensity++;
  return {cat:best, intense:intensity>=2, matched:bestScore>0};
}

// ── 組裝安慰文(回傳段落陣列)──
function compose(text, buddy){
  const a=analyze(text);
  const C=CATS[a.cat], V=VOICE[buddy];
  const q=(text||'').trim();
  const Q=q.length>20?q.slice(0,19)+'…':q;
  const seedBase=hashStr((q||'空')+'|'+buddy);
  const sOpen=hashStr(q+buddy+'open'), sBody=hashStr(q+buddy+'body'), sClose=hashStr(q+buddy+'close'), sBub=hashStr(q+buddy+'bub');

  let opener = q ? pick(V.open,sOpen).replace('{Q}',Q) : V.openEmpty[0];
  if(a.intense && q) opener += V.intense;
  const body = pick(C.body[buddy], sBody);
  const close = pick(V.close, sClose).replace('{R}', C.reward.name);
  const bubble = pick(C.bub[buddy], sBub);

  return {paras:[opener, body, close], cat:a.cat, scene:C.scene, reward:C.reward, bubble, seed:seedBase, label:C.label, intense:a.intense};
}

}

function typeParagraphs(paras, host, done){
  let pi=0;
  function nextPara(){
    if(pi>=paras.length){ done&&done(); return; }
    const p=document.createElement('p'); host.appendChild(p);
    const txt=paras[pi]; let ci=0;
    const cur=document.createElement('span'); cur.className='cursor'; cur.textContent=' '; p.appendChild(cur);
    const iv=setInterval(()=>{
      ci++;
      cur.insertAdjacentText('beforebegin', txt[ci-1]);
      if(ci>=txt.length){ clearInterval(iv); cur.remove(); pi++; setTimeout(nextPara, 200); }
    }, 27);
  }
  nextPara();
}

/* ════════════ 漫畫(canvas)════════════ */
const SCENES={
  night:{sky:['#2E2659','#544A86'],accent:'#C8AAEC',el:'star'},
  rain:{sky:['#7C8AA8','#B3BDD2'],accent:'#90A8C8',el:'rain'},
  cloudy:{sky:['#C9BFDC','#EBE3F0'],accent:'#B6A4CE',el:'cloud'},
  heart:{sky:['#FFB9CF','#FFE2EE'],accent:'#E8607A',el:'heart'},
};

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrapCJK(ctx,text,maxW){const out=[];let line='';for(const ch of text){if(ctx.measureText(line+ch).width>maxW&&line){out.push(line);line=ch;}else line+=ch;}if(line)out.push(line);return out;}

async function drawComic(){
  const cv=document.getElementById('comic'); const ctx=cv.getContext('2d');
  const W=720,H=960; const b=BUDDIES[chosen]; const S=SCENES[result.scene];
  try{ await document.fonts.load('900 30px "Noto Sans TC"'); await document.fonts.load('700 22px "Noto Sans TC"'); }catch(e){}
  const rng=mulberry32(result.seed);
  const F=s=>`"Noto Sans TC",sans-serif`;

  // 底
  ctx.fillStyle='#FFF8F2'; ctx.fillRect(0,0,W,H);
  // 外框
  ctx.lineWidth=10; ctx.strokeStyle='#3A2820'; rr(ctx,14,14,W-28,H-28,28); ctx.stroke();

  const M=30, IW=W-M*2;
  // 標題帶
  const hY=30,hH=92;
  ctx.save(); rr(ctx,M,hY,IW,hH,20); ctx.clip();
  const hg=ctx.createLinearGradient(0,hY,IW,hY+hH); hg.addColorStop(0,'#FFB8CC');hg.addColorStop(1,'#C8AAEC');
  ctx.fillStyle=hg; ctx.fillRect(M,hY,IW,hH);
  ctx.restore();
  rr(ctx,M,hY,IW,hH,20); ctx.lineWidth=5; ctx.strokeStyle='#3A2820'; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.textBaseline='middle';
  ctx.font=`900 30px ${F()}`; ctx.textAlign='left'; ctx.fillText('今日のおつかれ手帳',M+22,hY+38);
  ctx.font=`700 16px ${F()}`; ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.fillText('ちいかわ 慰勞所 ・ '+result.label,M+22,hY+68);
  const d=new Date(); const ds=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  ctx.textAlign='right'; ctx.font=`900 17px ${F()}`; ctx.fillStyle='#fff'; ctx.fillText(ds,M+IW-20,hY+46);

  // 場景
  const scY=hY+hH+14, scH=388;
  ctx.save(); rr(ctx,M,scY,IW,scH,20); ctx.clip();
  const sg=ctx.createLinearGradient(0,scY,0,scY+scH); sg.addColorStop(0,S.sky[0]);sg.addColorStop(1,S.sky[1]);
  ctx.fillStyle=sg; ctx.fillRect(M,scY,IW,scH);
  // 場景元素(決定性)
  drawSceneEls(ctx,S,M,scY,IW,scH,rng);
  // 地板
  ctx.fillStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.ellipse(M+IW/2,scY+scH+30,IW*0.8,90,0,0,Math.PI*2); ctx.fill();
  // 角色
  const img=imgCache[b.hug];
  const chH=276, chW=chH*0.694;
  const chX=M+44, chY=scY+scH-chH+6;
  // 影子
  ctx.fillStyle='rgba(40,25,20,.16)'; ctx.beginPath(); ctx.ellipse(chX+chW/2,scY+scH-12,chW*0.5,18,0,0,Math.PI*2); ctx.fill();
  if(img&&img.complete&&img.naturalWidth){ ctx.drawImage(img,chX,chY,chW,chH); }
  else { ctx.font='150px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🐭',chX+chW/2,chY+chH/2); }
  // 對話泡泡
  drawBubble(ctx, result.bubble, M+IW*0.40, scY+30, M+IW-26, chX+chW*0.6, chY+30, F());
  ctx.restore();
  rr(ctx,M,scY,IW,scH,20); ctx.lineWidth=5; ctx.strokeStyle='#3A2820'; ctx.stroke();

  // 「今天的鳥事」
  const capY=scY+scH+16, capH=120;
  rr(ctx,M,capY,IW,capH,18); ctx.fillStyle='#FBF1F4'; ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle='rgba(232,96,122,.35)'; ctx.stroke();
  ctx.textBaseline='top'; ctx.textAlign='left';
  ctx.font=`900 16px ${F()}`; ctx.fillStyle='#E8607A'; ctx.fillText('今天的鳥事',M+20,capY+16);
  ctx.font=`700 21px ${F()}`; ctx.fillStyle='#3A2820';
  const woeText=(document.getElementById('woe').value.trim()||'今天就是…說不上來的好累');
  const qlines=wrapCJK(ctx,'「'+woeText+'」',IW-44).slice(0,2);
  qlines.forEach((ln,i)=>ctx.fillText(ln, M+20, capY+44+i*30));

  // 犒賞
  const rwY=capY+capH+16, rwH=132;
  ctx.save(); rr(ctx,M,rwY,IW,rwH,18); ctx.clip();
  const rg=ctx.createLinearGradient(M,rwY,M+IW,rwY); rg.addColorStop(0,'#FFE8EE');rg.addColorStop(1,'#EEE6FF');
  ctx.fillStyle=rg; ctx.fillRect(M,rwY,IW,rwH); ctx.restore();
  rr(ctx,M,rwY,IW,rwH,18); ctx.lineWidth=4; ctx.setLineDash([9,7]); ctx.strokeStyle='#E8607A'; ctx.stroke(); ctx.setLineDash([]);
  // 圓圈裝 emoji
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(M+62,rwY+rwH/2,46,0,Math.PI*2); ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle='#FFB8CC'; ctx.stroke();
  ctx.font='52px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(result.reward.em,M+62,rwY+rwH/2+3);
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.font=`900 15px ${F()}`; ctx.fillStyle='#8A5EC8'; ctx.fillText('✦ 今天的你,值得這個',M+124,rwY+24);
  ctx.font=`900 23px ${F()}`; ctx.fillStyle='#3A2820';
  const rn=wrapCJK(ctx,result.reward.name,IW-150).slice(0,2);
  rn.forEach((ln,i)=>ctx.fillText(ln,M+124,rwY+50+i*28));

  // 頁尾
  ctx.textAlign='center'; ctx.font=`700 14px ${F()}`; ctx.fillStyle='#B59A92';
  ctx.fillText(`${b.zh} 陪你度過了今天 ♡   #今天辛苦了`, W/2, rwY+rwH+22);
}

function drawSceneEls(ctx,S,x,y,w,h,rng){
  ctx.save();
  if(S.el==='star'){
    ctx.fillStyle='rgba(255,255,255,.9)';
    for(let i=0;i<26;i++){const sx=x+rng()*w,sy=y+rng()*h*0.8,r=rng()*1.8+0.6;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
    // 月亮
    ctx.fillStyle='rgba(255,247,210,.95)'; ctx.beginPath(); ctx.arc(x+w-58,y+52,30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=S.sky[0]; ctx.beginPath(); ctx.arc(x+w-46,y+44,26,0,Math.PI*2); ctx.fill();
  }else if(S.el==='rain'){
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2.4; ctx.lineCap='round';
    for(let i=0;i<34;i++){const rx=x+rng()*w,ry=y+rng()*h*0.85;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-7,ry+18);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,.45)';
    [[x+70,y+50,34],[x+w-90,y+44,40],[x+w/2,y+30,30]].forEach(c=>{ctx.beginPath();ctx.ellipse(c[0],c[1],c[2],c[2]*0.6,0,0,Math.PI*2);ctx.fill();});
  }else if(S.el==='cloud'){
    ctx.fillStyle='rgba(255,255,255,.55)';
    [[x+80,y+54,40],[x+w-100,y+46,48],[x+w/2+30,y+86,30]].forEach(c=>{
      for(const o of [[-26,6,22],[0,-6,28],[26,6,24]]){ctx.beginPath();ctx.arc(c[0]+o[0],c[1]+o[1],c[2],0,Math.PI*2);ctx.fill();}
    });
  }else if(S.el==='heart'){
    for(let i=0;i<16;i++){const hx=x+rng()*w,hy=y+rng()*h*0.85,s=rng()*10+8;ctx.save();ctx.translate(hx,hy);ctx.fillStyle=`rgba(255,255,255,${0.35+rng()*0.4})`;heartPath(ctx,s);ctx.fill();ctx.restore();}
  }
  ctx.restore();
}
function heartPath(ctx,s){ctx.beginPath();ctx.moveTo(0,s*0.3);ctx.bezierCurveTo(0,-s*0.1,-s,-s*0.1,-s,s*0.35);ctx.bezierCurveTo(-s,s*0.7,0,s,0,s*1.05);ctx.bezierCurveTo(0,s,s,s*0.7,s,s*0.35);ctx.bezierCurveTo(s,-s*0.1,0,-s*0.1,0,s*0.3);ctx.closePath();}

function drawBubble(ctx, text, x, y, x2, tailX, tailY, font){
  const lines=text.split('\n'); ctx.font=`900 24px ${font}`;
  let maxw=0; lines.forEach(l=>maxw=Math.max(maxw,ctx.measureText(l).width));
  const padX=20,padY=16,lh=32;
  const w=Math.min(maxw+padX*2, x2-x), h=lines.length*lh+padY*2;
  // 尾巴
  ctx.fillStyle='#fff'; ctx.strokeStyle='#3A2820'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x+w*0.3,y+h-6); ctx.lineTo(tailX,tailY+20); ctx.lineTo(x+w*0.3+34,y+h-6); ctx.closePath(); ctx.fill();
  rr(ctx,x,y,w,h,18); ctx.fill(); ctx.stroke();
  // 蓋住尾巴接縫
  ctx.fillStyle='#fff'; ctx.fillRect(x+w*0.3+1,y+h-7,32,6);
  ctx.fillStyle='#3A2820'; ctx.textAlign='center'; ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l, x+w/2, y+padY+lh/2+i*lh));
}
