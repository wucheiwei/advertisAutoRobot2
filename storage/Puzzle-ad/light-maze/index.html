<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光路密室｜轉動鏡面，折射出你的幸運之光</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0d0d1a;
    font-family:'Noto Sans TC',sans-serif;
    color:#fff;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
  }
  header{
    width:100%;max-width:480px;
    padding:14px 20px 0;
    text-align:center;
  }
  header h1{font-size:1.1rem;letter-spacing:2px;color:#ffe066;}
  header p{font-size:.75rem;color:#a0b0ff;margin-top:4px;}
  #game-wrap{
    position:relative;
    width:100%;max-width:480px;
    flex:1;
    display:flex;flex-direction:column;align-items:center;
    padding:10px 16px 16px;
    gap:9px;
  }
  #status-bar{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;font-size:.8rem;color:#c0d0ff;
  }
  .stat{display:flex;align-items:center;gap:5px;}
  .stat span{color:#ffe066;font-weight:700;}
  canvas{
    border-radius:12px;
    cursor:pointer;
    touch-action:manipulation;
    box-shadow:0 0 24px rgba(100,120,255,.3);
    max-width:100%;
  }
  #hint-text{font-size:.72rem;color:#8a96cc;text-align:center;line-height:1.5;}
  #legend{
    display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
    font-size:.66rem;color:#9aa6d8;
  }
  #legend i{font-style:normal;display:inline-flex;align-items:center;gap:4px;}
  .swatch{width:14px;height:14px;border-radius:3px;display:inline-block;}
  /* win overlay */
  #win-overlay{
    position:fixed;inset:0;
    background:rgba(5,5,20,.9);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    z-index:100;padding:32px;text-align:center;
  }
  #win-overlay.show{display:flex;}
  #win-overlay h2{font-size:1.8rem;color:#ffe066;margin-bottom:8px;}
  #win-overlay p{font-size:.88rem;color:#c0d0ff;margin-bottom:24px;line-height:1.7;max-width:300px;}
  .cta-btn{
    background:linear-gradient(135deg,#ffe066,#ff8800);
    border:none;border-radius:26px;padding:13px 32px;
    font-size:1rem;font-weight:700;color:#0d0d1a;cursor:pointer;
    letter-spacing:1px;margin-bottom:10px;
    transition:transform .15s;
  }
  .cta-btn:active{transform:scale(.96);}
  .reset-btn{
    background:transparent;border:1px solid #4050a0;border-radius:26px;
    padding:10px 28px;font-size:.88rem;color:#a0b0ff;cursor:pointer;
  }
  .level-badge{
    display:inline-block;background:rgba(255,220,100,.15);
    border:1px solid rgba(255,220,100,.4);border-radius:16px;
    padding:3px 12px;font-size:.72rem;color:#ffe066;margin-bottom:8px;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>✨ 光路密室</h1>
  <p>LuminaTech 光學科技 × 益智解謎廣告</p>
</header>

<div id="game-wrap">
  <div id="status-bar">
    <div class="stat">關卡 <span id="lvl-num">1</span></div>
    <div class="stat">點亮 <span id="gem-count">0/0</span></div>
    <div class="stat">步數 <span id="move-count">0</span></div>
    <div class="stat">最佳 <span id="best-count">-</span></div>
  </div>
  <canvas id="gc"></canvas>
  <div id="legend">
    <i><span class="swatch" style="background:#5cc8ff"></span>可旋轉鏡(點擊轉 45°)</i>
    <i><span class="swatch" style="background:#c77dff"></span>分光鏡(固定,一分為二)</i>
    <i>⭐💎 全部點亮才過關</i>
  </div>
  <div id="hint-text">用分光鏡把雷射「一分為二」，再轉動藍色鏡面(共 ╱ ╲ ▏ ▬ 四種角度)，同時點亮所有 ⭐ 與 💎。<br>一面鏡子會影響多條光路，沒辦法一顆一顆慢慢試 — 要整體規劃。</div>
</div>

<div id="win-overlay">
  <div class="level-badge" id="win-badge">關卡 1 完成！</div>
  <h2>🌟 光路全亮！</h2>
  <p id="win-msg">你用 <strong id="used-moves">0</strong> 步接通所有光路<br>LuminaTech 光學眼鏡，讓你的目光更精準</p>
  <button class="cta-btn" onclick="nextLevel()">下一關</button>
  <button class="reset-btn" onclick="closeWin()">再試一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
// ── light-maze v4 : Lazors / Laser-Maze style ──────────────────────────────
// cell: {t:'.'|'S'|'B'|'T'|'o'|'X'|'M', o?:orient('/'|'\\'|'|'|'-'), dir?:'R'|'L'|'U'|'D'}
//   S source · B wall · T target(must light) · o checkpoint(must light)
//   M rotatable mirror (tap to rotate 45°) · X beam-splitter (fixed: passes straight + reflects 90°)
// WIN = the laser tree lights EVERY T and o at once.
//
// Levels are machine-generated (forward construction) + verified HARD:
//   • a beam SPLITTER turns one beam into a tree, so a single mirror's angle
//     affects several branches — you cannot fix one beam at a time;
//   • every level needs ALL targets ⭐ AND checkpoints 💎 lit at once (up to 6);
//   • mirrors have 4 angles (╱ ╲ ▏ ▬), not 2 — and several are pure decoys;
//   • NO freebie waypoints (every ⭐/💎 needs real routing, none is free);
//   • each board is rejected unless a greedy "rotate a mirror to light one more
//     target" solver gets STUCK below the goal (proof it can't be fiddled one
//     click at a time) and the nearest solution is 4–7 rotations from the start;
//   • most levels have MULTIPLE valid solutions for extra freedom.
// Verified from this file: solvable, greedy-fails, 0 freebies, and the drawn
// beam exactly matches the win check (no "lit but not counted" / vice-versa).
const COLS=7, ROWS=8;
const DIRS={R:[0,1],L:[0,-1],U:[-1,0],D:[1,0]};
const ROT=['-','/','|','\\'];   // rotate cycle, 45° per tap

const LEVELS = [
  // L1 — splitter + 1⭐ + 1💎 · 8 solutions · min 4 clicks
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'o'},{t:'.'},{t:'S',dir:'R'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'M',o:'\\'},{t:'T'},{t:'X',o:'\\'},{t:'M',o:'\\'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'|'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}]
  ]},
  // L2 — 2⭐ + 1💎 · 4 solutions · min 6 clicks
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'M',o:'|'},{t:'T'},{t:'M',o:'-'},{t:'.'},{t:'.'}],
  [{t:'o'},{t:'.'},{t:'M',o:'\\'},{t:'.'},{t:'T'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'/'},{t:'.'},{t:'S',dir:'L'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'B'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}]
  ]},
  // L3 — splitter + 2⭐ + 2💎 · 4 solutions · min 5 clicks
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'-'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'o'},{t:'X',o:'/'},{t:'M',o:'\\'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'M',o:'/'},{t:'T'},{t:'M',o:'/'},{t:'B'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'S',dir:'R'},{t:'M',o:'|'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'T'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'o'},{t:'.'},{t:'.'},{t:'.'}]
  ]},
  // L4 — splitter + 2⭐ + 2💎 · 4 solutions · min 5 clicks · 0.10% density
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'o'},{t:'X',o:'/'},{t:'.'},{t:'T'},{t:'M',o:'|'},{t:'.'}],
  [{t:'o'},{t:'M',o:'/'},{t:'T'},{t:'.'},{t:'.'},{t:'M',o:'|'},{t:'S',dir:'L'}],
  [{t:'.'},{t:'M',o:'\\'},{t:'M',o:'-'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'B'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'M',o:'|'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}]
  ]},
  // L5 — 2 splitters + 3⭐ + 2💎 · 32 solutions · min 5 clicks
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'T'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'-'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'T'},{t:'.'},{t:'B'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'|'},{t:'X',o:'/'},{t:'M',o:'\\'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'M',o:'-'},{t:'X',o:'/'},{t:'T'},{t:'M',o:'\\'},{t:'.'}],
  [{t:'.'},{t:'S',dir:'R'},{t:'M',o:'\\'},{t:'o'},{t:'o'},{t:'.'},{t:'.'}]
  ]},
  // L6 (boss) — splitter + 3⭐ + 3💎 (6 waypoints) · K7 · 16 solutions · min 7 clicks
  { grid:[
  [{t:'.'},{t:'.'},{t:'.'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'M',o:'-'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'B'}],
  [{t:'o'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'o'},{t:'.'},{t:'.'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'T'},{t:'M',o:'|'},{t:'o'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'M',o:'/'},{t:'T'},{t:'X',o:'\\'},{t:'.'},{t:'.'},{t:'.'}],
  [{t:'.'},{t:'.'},{t:'.'},{t:'T'},{t:'.'},{t:'.'},{t:'B'}],
  [{t:'.'},{t:'.'},{t:'S',dir:'R'},{t:'M',o:'/'},{t:'.'},{t:'.'},{t:'.'}]
  ]},
];

let currentLevel=0, grid, moves=0, bestMoves=[], cellSize, won=false;
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');

const COLORS={ bg:'#0d0d1a', cell:'#13132a', cellM:'#182a4a', grid:'#1e1e3a',
  block:'#2a1a2e', mirror:'#5cc8ff', mirrorGlow:'#8fe0ff', splitter:'#c77dff',
  source:'#ff4466', target:'#ffe066', gem:'#7dffd4', beam:'#ff4040',
  beamGlow:'rgba(255,80,80,.28)', beamWin:'#ffd23f', beamWinGlow:'rgba(255,210,60,.22)' };

function reflectM(dir,o){
  if(o==='/') return {R:'U',U:'R',L:'D',D:'L'}[dir];
  if(o==='\\')return {R:'D',D:'R',L:'U',U:'L'}[dir];
  if(o==='|') return {R:'L',L:'R',U:'U',D:'D'}[dir];
  return {U:'D',D:'U',L:'L',R:'R'}[dir];           // '-'
}
function cloneGrid(s){ return s.map(row=>row.map(c=>Object.assign({},c))); }
function findSource(){ for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(grid[r][c].t==='S') return {r,c,dir:grid[r][c].dir}; }

// beam-tree simulation
function simulate(){
  const s=findSource(); const lit=new Set(), seg=new Set(), vis=new Set();
  if(s){ const st=[[s.r,s.c,s.dir]]; let guard=0;
    while(st.length){
      if(++guard>20000) break;
      const cur=st.pop(); const r=cur[0],c=cur[1],dir=cur[2];
      const d=DIRS[dir]; const nr=r+d[0], nc=c+d[1];
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      seg.add(r+'_'+c+'_'+dir);   // directed move (from cell r,c heading dir)
      const vk=nr+','+nc+','+dir; if(vis.has(vk)) continue; vis.add(vk);
      const cell=grid[nr][nc], tp=cell.t;
      if(tp==='B') continue;
      if(tp==='T'||tp==='o'){ lit.add(nr+','+nc); st.push([nr,nc,dir]); continue; }
      if(tp==='M'){ st.push([nr,nc,reflectM(dir,cell.o)]); continue; }
      if(tp==='X'){ st.push([nr,nc,dir]); st.push([nr,nc,reflectM(dir,cell.o)]); continue; }
      st.push([nr,nc,dir]);
    }
  }
  let total=0,hit=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const t=grid[r][c].t; if(t==='T'||t==='o'){total++; if(lit.has(r+','+c))hit++;}}
  return {lit,seg,total,hit,solved:total>0&&hit===total};
}
function checkWin(){ return simulate().solved; }

function initLevel(idx){ currentLevel=idx; grid=cloneGrid(LEVELS[idx].grid); moves=0; won=false; resizeCanvas(); updateUI(); draw(); }
function resizeCanvas(){
  const wrap=document.getElementById('game-wrap');
  const cs=getComputedStyle(wrap);
  const padX=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const available=Math.min(wrap.clientWidth-padX-2, 440);
  cellSize=Math.floor(Math.min(available/COLS, 560/ROWS));
  canvas.width=cellSize*COLS; canvas.height=cellSize*ROWS;
}
function updateUI(){
  document.getElementById('lvl-num').textContent=currentLevel+1;
  document.getElementById('move-count').textContent=moves;
  const b=bestMoves[currentLevel];
  document.getElementById('best-count').textContent=b!==undefined?b:'-';
}

// ── drawing ──
function draw(){
  const C=cellSize;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=COLORS.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=c*C,y=r*C,cell=grid[r][c];
    ctx.fillStyle = cell.t==='B'?COLORS.block : (cell.t==='M'?COLORS.cellM:COLORS.cell);
    roundRect(ctx,x+1,y+1,C-2,C-2,6); ctx.fill();
    if(cell.t==='M'){ ctx.strokeStyle='rgba(92,200,255,.35)'; ctx.lineWidth=1; roundRect(ctx,x+1.5,y+1.5,C-3,C-3,6); ctx.stroke(); }
    else { ctx.strokeStyle=COLORS.grid; ctx.lineWidth=.5; ctx.strokeRect(x,y,C,C); }
  }
  const sim=simulate();
  drawBeam(sim,C);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) drawElement(grid[r][c],c*C,r*C,C,sim.lit.has(r+','+c));
  const gc=document.getElementById('gem-count'); if(gc) gc.textContent=sim.hit+'/'+sim.total;
}
function drawBeam(sim,C){
  if(!sim.seg.size) return;
  const won=sim.solved;
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.strokeStyle=won?COLORS.beamWinGlow:COLORS.beamGlow; ctx.lineWidth=C*0.20;
  sim.seg.forEach(k=>beamSeg(k,C,false));
  ctx.strokeStyle=won?COLORS.beamWin:COLORS.beam; ctx.lineWidth=C*0.06;
  ctx.shadowColor=won?COLORS.beamWin:COLORS.beam; ctx.shadowBlur=9;
  sim.seg.forEach(k=>beamSeg(k,C,true));
  ctx.restore();
}
// Each beam segment is DIRECTED and drawn offset to the right of travel, so a
// beam and its 180° return path appear as two parallel lines — no invisible
// retraces, and you can always see exactly which targets the beam reaches.
function beamSeg(k,C,core){
  const p=k.split('_'); const r=+p[0],c=+p[1],dir=p[2];
  const d=DIRS[dir]; const nr=r+d[0],nc=c+d[1];
  const off=C*0.055, ox=-d[0]*off, oy=d[1]*off;
  const x1=c*C+C/2+ox, y1=r*C+C/2+oy, x2=nc*C+C/2+ox, y2=nr*C+C/2+oy;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  if(core){ // arrowhead near the destination to show travel direction
    const sx=d[1], sy=d[0];                       // screen travel unit
    const hx=x1+(x2-x1)*0.66, hy=y1+(y2-y1)*0.66, h=C*0.11;
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.lineTo(hx-(sx*0.7+ -sy*0.5)*h, hy-(sy*0.7+ sx*0.5)*h);
    ctx.moveTo(hx,hy);
    ctx.lineTo(hx-(sx*0.7+ sy*0.5)*h, hy-(sy*0.7+ -sx*0.5)*h);
    ctx.stroke();
  }
}
function drawElement(cell,x,y,C,lit){
  const cx=x+C/2, cy=y+C/2, t=cell.t;
  if(t==='S'){
    ctx.save();
    const g=ctx.createRadialGradient(cx,cy,2,cx,cy,C*0.36);
    g.addColorStop(0,'#ff9a9a'); g.addColorStop(1,'rgba(255,50,50,0)');
    ctx.fillStyle=g; ctx.beginPath();ctx.arc(cx,cy,C*0.36,0,7);ctx.fill();
    ctx.fillStyle=COLORS.source; ctx.beginPath();ctx.arc(cx,cy,C*0.17,0,7);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font='bold '+(C*0.24)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText({R:'▶',L:'◀',U:'▲',D:'▼'}[cell.dir||'R'],cx,cy);
    ctx.restore();
  } else if(t==='T'){
    ctx.save();
    if(lit){ const g=ctx.createRadialGradient(cx,cy,2,cx,cy,C*0.42); g.addColorStop(0,'rgba(255,220,0,.55)'); g.addColorStop(1,'rgba(255,220,0,0)'); ctx.fillStyle=g; ctx.beginPath();ctx.arc(cx,cy,C*0.42,0,7);ctx.fill(); }
    drawStar(ctx,cx,cy,5,C*0.22,C*0.1, lit?COLORS.target:'rgba(255,224,102,.45)');
    if(!lit){ ctx.strokeStyle='rgba(255,224,102,.7)'; ctx.lineWidth=C*0.02; ctx.stroke(); }
    ctx.restore();
  } else if(t==='o'){
    drawGem(cx,cy,C,lit);
  } else if(t==='M'){
    drawMirror(cx,cy,C,cell.o,false);
  } else if(t==='X'){
    drawMirror(cx,cy,C,cell.o,true);
  } else if(t==='B'){
    ctx.save(); ctx.fillStyle='#3a1a3e'; roundRect(ctx,x+3,y+3,C-6,C-6,4); ctx.fill();
    ctx.strokeStyle='rgba(150,60,170,.5)'; ctx.lineWidth=C*0.04;
    for(let i=-1;i<2;i++){ ctx.beginPath(); ctx.moveTo(cx-C*0.22,cy+i*C*0.16+C*0.05); ctx.lineTo(cx+C*0.22,cy+i*C*0.16-C*0.05); ctx.stroke(); }
    ctx.restore();
  }
}
function mirrorPts(o,L){
  if(o==='/') return [[-L/2,L/2],[L/2,-L/2]];
  if(o==='\\')return [[-L/2,-L/2],[L/2,L/2]];
  if(o==='|') return [[0,-L/2],[0,L/2]];
  return [[-L/2,0],[L/2,0]];                 // '-'
}
function drawMirror(cx,cy,C,o,isSplitter){
  const L=C*0.62, p=mirrorPts(o,L);
  ctx.save(); ctx.translate(cx,cy); ctx.lineCap='round';
  const col=isSplitter?COLORS.splitter:COLORS.mirror, glow=isSplitter?'#e0b0ff':COLORS.mirrorGlow;
  ctx.shadowColor=glow; ctx.shadowBlur=8; ctx.strokeStyle=col; ctx.lineWidth=C*0.08;
  ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]); ctx.lineTo(p[1][0],p[1][1]); ctx.stroke();
  if(isSplitter){
    const q=mirrorPts(o==='/'?'\\':'/',L*0.42);
    ctx.setLineDash([C*0.05,C*0.05]); ctx.lineWidth=C*0.045; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.moveTo(q[0][0],q[0][1]); ctx.lineTo(q[1][0],q[1][1]); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(0,0,C*0.05,0,7); ctx.fill();
  } else {
    ctx.shadowBlur=0; ctx.fillStyle='rgba(143,224,255,.85)';
    ctx.beginPath(); ctx.arc(p[0][0],p[0][1],C*0.035,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(p[1][0],p[1][1],C*0.035,0,7); ctx.fill();
  }
  ctx.restore();
}
function drawGem(cx,cy,C,lit){
  const s=C*0.2; ctx.save();
  if(lit){ const g=ctx.createRadialGradient(cx,cy,1,cx,cy,C*0.42); g.addColorStop(0,'rgba(125,255,212,.7)'); g.addColorStop(1,'rgba(125,255,212,0)'); ctx.fillStyle=g; ctx.beginPath();ctx.arc(cx,cy,C*0.42,0,7);ctx.fill(); }
  ctx.beginPath(); ctx.moveTo(cx,cy-s);ctx.lineTo(cx+s,cy);ctx.lineTo(cx,cy+s);ctx.lineTo(cx-s,cy);ctx.closePath();
  if(lit){ ctx.fillStyle=COLORS.gem; ctx.shadowColor=COLORS.gem; ctx.shadowBlur=12; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=C*0.02; ctx.stroke(); }
  else { ctx.fillStyle='rgba(125,255,212,.10)'; ctx.fill(); ctx.strokeStyle='rgba(125,255,212,.6)'; ctx.lineWidth=C*0.035; ctx.stroke(); }
  ctx.restore();
}
function drawStar(ctx,cx,cy,n,R,r,color){
  ctx.save(); ctx.fillStyle=color; ctx.beginPath();
  for(let i=0;i<n*2;i++){ const a=(i*Math.PI/n)-Math.PI/2, rad=i%2===0?R:r;
    i===0?ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a)):ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a)); }
  ctx.closePath(); ctx.fill(); ctx.restore();
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── interaction ──
function cellFromEvent(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const p=e.touches?e.touches[0]:e;
  return {c:Math.floor((p.clientX-rect.left)*sx/cellSize), r:Math.floor((p.clientY-rect.top)*sy/cellSize)};
}
function handleClick(e){
  e.preventDefault();
  const pos=cellFromEvent(e);
  if(pos.r<0||pos.r>=ROWS||pos.c<0||pos.c>=COLS) return;
  const cell=grid[pos.r][pos.c];
  if(won) return;                       // ignore taps after the level is solved
  if(cell.t==='M'){
    cell.o=ROT[(ROT.indexOf(cell.o)+1)%4];
    moves++; updateUI(); draw();
    if(checkWin()){ won=true; setTimeout(()=>{ if(checkWin()) showWin(); else won=false; },260); }
  }
}
canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchstart',handleClick,{passive:false});

function showWin(){
  if(!checkWin()) return;               // safety: never celebrate an unsolved board
  if(document.getElementById('win-overlay').classList.contains('show')) return;
  const b=bestMoves[currentLevel]; if(b===undefined||moves<b) bestMoves[currentLevel]=moves;
  document.getElementById('win-badge').textContent='關卡 '+(currentLevel+1)+' 完成！';
  document.getElementById('used-moves').textContent=moves;
  document.getElementById('win-overlay').classList.add('show');
  confetti({particleCount:120,spread:85,origin:{y:.4},colors:['#ffe066','#ff8800','#fff','#5cc8ff','#7dffd4']});
  updateUI();
}
function closeWin(){ document.getElementById('win-overlay').classList.remove('show'); initLevel(currentLevel); }
function nextLevel(){ document.getElementById('win-overlay').classList.remove('show'); initLevel((currentLevel+1)%LEVELS.length); }
window.nextLevel=nextLevel; window.closeWin=closeWin;

window.addEventListener('resize',()=>{ resizeCanvas(); draw(); });
initLevel(0);
</script>
