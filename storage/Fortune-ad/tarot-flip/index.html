<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>命運塔羅 — 今日三牌占卜</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #06040F;
      color: #F0E6D3;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* ── Mystic BG ── */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    /* ── Wrapper ── */
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px 60px;
      max-width: 520px; margin: 0 auto; min-height: 100vh;
    }
    /* ── Screens ── */
    .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
    .screen.active { display: flex; animation: fadeUp .5s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Brand Header ── */
    .mystic-title {
      margin-top: 48px; margin-bottom: 6px;
      font-size: 1.9rem; font-weight: 900; letter-spacing: .25em;
      background: linear-gradient(135deg,#F9D77E,#D4AF70,#F9D77E);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .mystic-sub {
      font-size: .78rem; letter-spacing: .2em;
      color: rgba(240,230,211,.45); margin-bottom: 32px; text-align: center;
    }
    /* ── Intro ── */
    .seal {
      width: 110px; height: 110px; border-radius: 50%;
      border: 2px solid rgba(249,215,126,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; margin-bottom: 28px;
      background: radial-gradient(circle,rgba(249,215,126,.08) 0%,transparent 70%);
      position: relative;
    }
    .seal::before {
      content: ''; position: absolute; inset: -10px;
      border-radius: 50%; border: 1px solid rgba(249,215,126,.15);
    }
    .intro-heading {
      font-size: 1.6rem; font-weight: 700; text-align: center;
      line-height: 1.55; margin-bottom: 16px;
    }
    .intro-body {
      font-size: .92rem; color: rgba(240,230,211,.7);
      text-align: center; line-height: 1.95; margin-bottom: 36px;
    }
    .divider {
      width: 60px; height: 1px; background: rgba(249,215,126,.3);
      margin: 0 auto 36px;
    }
    .btn {
      padding: 17px 40px; border: none; border-radius: 50px;
      background: linear-gradient(135deg,#D4AF70,#F9D77E);
      color: #06040F; font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      letter-spacing: .1em;
      box-shadow: 0 4px 28px rgba(212,175,112,.4);
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 36px rgba(212,175,112,.6); }
    .btn:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent; border: 1px solid rgba(240,230,211,.25);
      color: rgba(240,230,211,.7); padding: 14px 32px; border-radius: 50px;
      font-family: 'Noto Sans TC', sans-serif; font-size: .9rem;
      cursor: pointer; transition: all .2s; margin-top: 12px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.06); color: #F0E6D3; }
    /* ── Instruction ── */
    .pick-hint {
      font-size: .85rem; color: rgba(240,230,211,.55);
      text-align: center; margin-bottom: 28px; letter-spacing: .05em;
    }
    .pick-hint strong { color: #F9D77E; }
    .positions {
      display: flex; gap: 12px; margin-bottom: 22px;
    }
    .pos-chip {
      flex: 1; padding: 8px 6px; border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(249,215,126,.15);
      text-align: center; font-size: .72rem;
      letter-spacing: .08em; color: rgba(240,230,211,.5);
    }
    .pos-chip.filled { border-color: #F9D77E; color: #F9D77E; }
    /* ── Card Grid ── */
    .card-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 10px; width: 100%; margin-bottom: 28px;
    }
    /* ── 3D Card ── */
    .card-wrap {
      aspect-ratio: 2/3; perspective: 700px; cursor: pointer;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.4,.2,.2,1.1);
      border-radius: 10px;
    }
    .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; border-radius: 10px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    /* ── Card Back ── */
    .card-back-face {
      background: linear-gradient(160deg,#1A1040,#2D1B6B);
      border: 1px solid rgba(249,215,126,.2);
      display: flex; align-items: center; justify-content: center;
    }
    .card-back-art {
      width: 70%; height: 70%;
      border: 1px solid rgba(249,215,126,.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: rgba(249,215,126,.5);
      flex-direction: column; gap: 4px;
    }
    .card-back-art small {
      font-size: .5rem; letter-spacing: .1em;
      color: rgba(249,215,126,.35);
    }
    /* ── Card Front ── */
    .card-front-face {
      transform: rotateY(180deg);
      background: linear-gradient(160deg,#1D0E4A,#3A1F6E);
      border: 1px solid rgba(249,215,126,.4);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 5px; text-align: center;
    }
    .card-emoji { font-size: 1.6rem; margin-bottom: 4px; line-height: 1; }
    .card-cn { font-size: .68rem; font-weight: 700; color: #F9D77E; margin-bottom: 2px; }
    .card-pos { font-size: .5rem; letter-spacing: .05em; color: rgba(240,230,211,.4); }
    /* ── Reading Area ── */
    .reading-wrap { width: 100%; }
    .reading-title {
      font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 28px;
      color: #F9D77E;
    }
    .reading-cards {
      display: flex; gap: 12px; margin-bottom: 28px;
    }
    .reading-slot { flex: 1; }
    .r-card {
      aspect-ratio: 2/3; border-radius: 12px; margin-bottom: 10px;
      background: linear-gradient(160deg,#1D0E4A,#3A1F6E);
      border: 1px solid rgba(249,215,126,.4);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 10px 6px; text-align: center;
      animation: cardReveal .6s ease both;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .r-card-emoji { font-size: 2rem; margin-bottom: 6px; }
    .r-card-name { font-size: .72rem; font-weight: 700; color: #F9D77E; margin-bottom: 4px; }
    .r-card-msg { font-size: .6rem; color: rgba(240,230,211,.65); line-height: 1.5; }
    .r-slot-label {
      font-size: .72rem; letter-spacing: .1em;
      color: rgba(240,230,211,.45); text-align: center;
    }
    .reading-summary {
      padding: 22px 20px; border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(249,215,126,.15);
      font-size: .92rem; color: rgba(240,230,211,.72);
      line-height: 1.9; text-align: center; margin-bottom: 28px;
    }
    .reading-summary strong { color: #F9D77E; }
    .cta-group { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="page">

  <!-- INTRO -->
  <div class="screen active" id="s-intro">
    <div class="mystic-title">MYSTIC</div>
    <div class="mystic-sub">神諭塔羅坊 · 每日三牌占卜</div>
    <div class="seal">🔮</div>
    <div class="intro-heading">翻開三張牌<br>看見命運的輪廓</div>
    <div class="intro-body">
      十二張牌靜待你的觸碰<br>
      過去 · 現在 · 未來<br>
      三個位置，三個答案<br>
      讓塔羅為你說話
    </div>
    <div class="divider"></div>
    <button class="btn" onclick="goSelect()">✦ 開始抽牌 ✦</button>
  </div>

  <!-- SELECT -->
  <div class="screen" id="s-select">
    <div class="mystic-title">MYSTIC</div>
    <div class="mystic-sub">神諭塔羅坊</div>
    <div class="pick-hint">靜心凝視，依序點選 <strong>3 張</strong> 牌</div>
    <div class="positions" id="positions">
      <div class="pos-chip" id="pos0">① 過去</div>
      <div class="pos-chip" id="pos1">② 現在</div>
      <div class="pos-chip" id="pos2">③ 未來</div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- READING -->
  <div class="screen" id="s-reading">
    <div class="mystic-title">MYSTIC</div>
    <div class="mystic-sub">神諭塔羅坊</div>
    <div class="reading-wrap">
      <div class="reading-title">✦ 你的命運三牌 ✦</div>
      <div class="reading-cards" id="readingCards"></div>
      <div class="reading-summary" id="readingSummary"></div>
      <div class="cta-group">
        <button class="btn" onclick="goCTA()">預約專業塔羅解讀 →</button>
        <button class="btn-ghost" onclick="resetAll()">重新抽牌</button>
      </div>
    </div>
  </div>

</div>
<script>
/* ── Mystic BG Canvas ── */
(function () {
  var cv = document.getElementById('bg');
  var ct = cv.getContext('2d');
  var pts = [];
  function init() {
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    pts = [];
    for (var i = 0; i < 100; i++) {
      pts.push({
        x: Math.random() * cv.width, y: Math.random() * cv.height,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random() * 0.5 + 0.05,
        pa: Math.random() * 6.28, ps: Math.random() * 0.015 + 0.003,
        vx: (Math.random() - 0.5) * 0.12, vy: (Math.random() - 0.5) * 0.12
      });
    }
  }
  function draw() {
    ct.clearRect(0, 0, cv.width, cv.height);
    pts.forEach(function (p) {
      p.pa += p.ps;
      ct.beginPath(); ct.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ct.fillStyle = 'rgba(212,175,112,' + (p.a * (.6 + .4 * Math.sin(p.pa))) + ')'; ct.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = cv.width; if (p.x > cv.width) p.x = 0;
      if (p.y < 0) p.y = cv.height; if (p.y > cv.height) p.y = 0;
    });
    requestAnimationFrame(draw);
  }
  init(); draw();
  window.addEventListener('resize', init);
})();

/* ── Tarot Data ── */
var CARDS = [
  { emoji: '☀️', name: '太陽', msg: '光明降臨\n成功指日可待', summary: '光明正大的力量引導你前進' },
  { emoji: '🌙', name: '月亮', msg: '直覺覺醒\n信任內心聲音', summary: '潛意識的智慧指引你方向' },
  { emoji: '⭐', name: '星星', msg: '希望閃耀\n願望時機已至', summary: '宇宙將你的心願傳遞出去' },
  { emoji: '🦁', name: '力量', msg: '你比想像\n更加強大', summary: '內在的力量正在覺醒' },
  { emoji: '☸️', name: '命運之輪', msg: '轉機到來\n把握此刻', summary: '命運正在轉動，機會降臨' },
  { emoji: '🃏', name: '愚者', msg: '新旅程開啟\n無懼踏出第一步', summary: '純真與勇氣帶你踏上冒險' },
  { emoji: '🪄', name: '魔術師', msg: '你擁有一切\n所需工具', summary: '才能與意志集結於你手中' },
  { emoji: '🌿', name: '女祭司', msg: '靜默之中\n藏著最深智慧', summary: '安靜等待，答案自然浮現' },
  { emoji: '👑', name: '皇帝', msg: '穩定掌控\n全局在你手中', summary: '秩序與決心帶來成就' },
  { emoji: '❤️', name: '戀人', msg: '情感抉擇\n帶來蛻變', summary: '心的選擇決定你的道路' },
  { emoji: '🌍', name: '世界', msg: '圓滿完成\n新循環開展', summary: '一個階段圓滿，新篇章等待' },
  { emoji: '🔔', name: '審判', msg: '覺醒時刻\n過去化為力量', summary: '從過去汲取力量，重生前行' }
];

var POS_LABELS = ['過去', '現在', '未來'];
var POS_DESCS = ['你的來處，過去的能量', '此刻的處境與機會', '即將到來的可能'];
var SUMMARIES = [
  '牌局顯示，你的旅程蘊含深刻轉化。過去已成你的底蘊，當下正是蛻變關鍵，未來閃耀著令人期待的可能。',
  '宇宙的訊息在牌中流動。每一張都在訴說你此刻需要聽見的話語，請深呼吸，感受它的力量。',
  '三張牌構成一道完整的敘事弧線，連結你的昨日、今日與明日，指引你走向真正屬於你的道路。'
];

var shuffled = [];
var picked = []; /* indices of picked cards */
var pickedCards = []; /* card data for reading */

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function goSelect() {
  shuffled = shuffle(CARDS);
  picked = [];
  pickedCards = [];
  showScreen('s-select');
  buildGrid();
  updatePositions();
}

function buildGrid() {
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  for (var i = 0; i < 12; i++) {
    (function (idx) {
      var wrap = document.createElement('div');
      wrap.className = 'card-wrap';
      wrap.id = 'cw' + idx;
      wrap.innerHTML = '<div class="card-inner"><div class="card-face card-back-face"><div class="card-back-art">✦<small>MYSTIC</small></div></div><div class="card-face card-front-face"><div class="card-emoji"></div><div class="card-cn"></div><div class="card-pos"></div></div></div>';
      wrap.addEventListener('click', function () { pickCard(idx, wrap); });
      grid.appendChild(wrap);
    })(i);
  }
}

function pickCard(idx, wrap) {
  if (picked.indexOf(idx) !== -1) return; /* already picked */
  if (picked.length >= 3) return;
  var posIdx = picked.length;
  picked.push(idx);
  pickedCards.push(shuffled[idx]);
  /* Fill front face */
  var front = wrap.querySelector('.card-front-face');
  front.querySelector('.card-emoji').textContent = shuffled[idx].emoji;
  front.querySelector('.card-cn').textContent = shuffled[idx].name;
  front.querySelector('.card-pos').textContent = POS_LABELS[posIdx];
  wrap.classList.add('flipped');
  wrap.style.cursor = 'default';
  updatePositions();
  if (picked.length === 3) {
    setTimeout(showReading, 900);
  }
}

function updatePositions() {
  for (var i = 0; i < 3; i++) {
    var chip = document.getElementById('pos' + i);
    if (i < picked.length) {
      chip.classList.add('filled');
    } else {
      chip.classList.remove('filled');
    }
  }
}

function showReading() {
  var rc = document.getElementById('readingCards');
  rc.innerHTML = '';
  pickedCards.forEach(function (card, i) {
    var slot = document.createElement('div');
    slot.className = 'reading-slot';
    slot.style.animationDelay = (i * 0.15) + 's';
    slot.innerHTML =
      '<div class="r-card" style="animation-delay:' + (i * 0.2) + 's">' +
        '<div class="r-card-emoji">' + card.emoji + '</div>' +
        '<div class="r-card-name">' + card.name + '</div>' +
        '<div class="r-card-msg">' + card.msg.replace('\n', '<br>') + '</div>' +
      '</div>' +
      '<div class="r-slot-label">' + POS_LABELS[i] + '</div>';
    rc.appendChild(slot);
  });
  var sumIdx = Math.floor(Math.random() * SUMMARIES.length);
  var names = pickedCards.map(function (c) { return c.name; });
  document.getElementById('readingSummary').innerHTML =
    '你抽到了 <strong>' + names.join('、') + '</strong><br><br>' + SUMMARIES[sumIdx];
  showScreen('s-reading');
}

function goCTA() {
  alert('MYSTIC 神諭塔羅坊\n\n專業塔羅占卜師一對一線上解讀\n首次預約享 8 折優惠\n\n點擊確定立即填寫預約表單');
}

function resetAll() {
  goSelect();
}
</script>
<script>
  /* 防止手機連點兩下(double-tap)縮放畫面 — iOS Safari 會忽略 user-scalable=no */
  (function(){
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, { passive:false });
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
    document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  })();
</script>
</body>
</html>
